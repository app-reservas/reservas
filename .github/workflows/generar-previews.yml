name: Generar previews de WhatsApp por negocio

on:
  workflow_dispatch:       # botón "Run workflow" manual en GitHub
  schedule:
    - cron: '0 6 * * *'    # todos los días a las 06:00 UTC (03:00 hora Argentina)

jobs:
  generar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install firebase-admin

      - name: Generar archivos p-<slug>.html
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/generar-previews.js

      - name: Commitear cambios si hay archivos nuevos
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public/p-*.html
          git diff --staged --quiet || git commit -m "Auto: actualizar previews de WhatsApp por negocio"
          git push
