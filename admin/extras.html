<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extras — ReservaSystem</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/img/favicon-16x16.png">
  <link rel="shortcut icon" href="../assets/img/favicon.ico">
  <link rel="apple-touch-icon" href="../assets/img/apple-touch-icon.png">
  <link rel="stylesheet" href="../assets/css/dark.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
</head>
<body>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/helpers.js"></script>
  <script src="../assets/js/sidebar.js?v=2"></script>
  <script src="../assets/js/app.js?v=2"></script>

  <script>
    let usuarioActual = null;
    let CFG = {};

    auth.onAuthStateChanged(async user => {
      if (!user) { window.location.href = '../index.html'; return; }
      const snap = await db.collection('usuarios').doc(user.uid).get();
      if (!snap.exists || !snap.data().activo) { auth.signOut(); window.location.href = '../index.html'; return; }
      usuarioActual = { uid: user.uid, ...snap.data() };

      renderLayoutAdmin({
        titulo:        'Extras y Configuración Avanzada',
        subtitulo:     'Ajustes avanzados, integraciones y seguridad',
        nombreUsuario: usuarioActual.nombre,
        rolLabel:      usuarioActual.rol === 'superadmin' ? 'Super Administrador' : 'Gerente',
      });

      // Cargar config guardada
      try {
        const cfgSnap = await db.collection('configuracion').doc('global').get();
        CFG = cfgSnap.exists ? cfgSnap.data() : {};
      } catch(e) { CFG = {}; }

      document.getElementById('page-content').innerHTML = buildHTML();
      aplicarCFG();
    });

    function buildHTML() {
      return `
      <div class="grid-2 mb-6">

        <!-- COMPORTAMIENTO DEL SISTEMA -->
        <div class="card">
          <div class="card-title" style="margin-bottom:16px"><i class="ti ti-adjustments"></i> Comportamiento del sistema</div>
          <div style="display:flex;flex-direction:column;gap:12px">

            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
              <div>
                <div style="font-weight:600;color:var(--text-primary)">Selección automática de profesional</div>
                <div style="font-size:12px;color:var(--text-muted)">Si solo hay un profesional disponible, se selecciona automáticamente</div>
              </div>
              <label class="toggle"><input type="checkbox" id="tog-autopro"><span class="toggle-slider"></span></label>
            </div>

            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
              <div>
                <div style="font-weight:600;color:var(--text-primary)">Mostrar duración del servicio</div>
                <div style="font-size:12px;color:var(--text-muted)">En la página pública el cliente ve cuánto dura cada servicio</div>
              </div>
              <label class="toggle"><input type="checkbox" id="tog-dur"><span class="toggle-slider"></span></label>
            </div>

            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
              <div>
                <div style="font-weight:600;color:var(--text-primary)">Mostrar descripción completa</div>
                <div style="font-size:12px;color:var(--text-muted)">Muestra la descripción del servicio en la página de reserva</div>
              </div>
              <label class="toggle"><input type="checkbox" id="tog-desc"><span class="toggle-slider"></span></label>
            </div>

            <div style="padding:12px 14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
              <div style="font-weight:600;color:var(--text-primary);margin-bottom:4px">Tiempo máximo de anticipación</div>
              <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">Cuántos días hacia adelante pueden reservar los clientes (1-365)</div>
              <div style="display:flex;align-items:center;gap:10px">
                <input type="number" id="max-anticipacion" class="form-control" value="90" min="1" max="365" style="width:100px">
                <span style="font-size:13px;color:var(--text-muted)">días</span>
              </div>
            </div>
          </div>
          <button class="btn btn-primary" style="margin-top:14px" onclick="guardarComportamiento()">
            <i class="ti ti-device-floppy"></i> Guardar ajustes
          </button>
        </div>

        <!-- SEGURIDAD -->
        <div class="card">
          <div class="card-title" style="margin-bottom:16px"><i class="ti ti-shield-check"></i> Configuración de seguridad</div>
          <div style="display:flex;flex-direction:column;gap:12px">

            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
              <div>
                <div style="font-weight:600;color:var(--text-primary)">Bloquear VPN / Proxy</div>
                <div style="font-size:12px;color:var(--text-muted)">Previene reservas fraudulentas desde VPNs</div>
              </div>
              <label class="toggle"><input type="checkbox" id="tog-vpn"><span class="toggle-slider"></span></label>
            </div>

            <div style="padding:12px 14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <div>
                  <div style="font-weight:600;color:var(--text-primary)">Límite de reservas por IP</div>
                  <div style="font-size:12px;color:var(--text-muted)">Máximo de reservas pendientes por dirección IP</div>
                </div>
                <label class="toggle"><input type="checkbox" id="tog-ip"><span class="toggle-slider"></span></label>
              </div>
              <div style="display:flex;align-items:center;gap:10px">
                <input type="number" id="max-ip" class="form-control" value="3" min="1" max="20" style="width:80px">
                <span style="font-size:13px;color:var(--text-muted)">reservas máximas</span>
              </div>
            </div>

            <div style="padding:12px 14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <div>
                  <div style="font-weight:600;color:var(--text-primary)">Límite por email</div>
                  <div style="font-size:12px;color:var(--text-muted)">Máximo de reservas pendientes por correo electrónico</div>
                </div>
                <label class="toggle"><input type="checkbox" id="tog-email-lim" checked><span class="toggle-slider"></span></label>
              </div>
              <div style="display:flex;align-items:center;gap:10px">
                <input type="number" id="max-email" class="form-control" value="3" min="1" max="20" style="width:80px">
                <span style="font-size:13px;color:var(--text-muted)">reservas máximas</span>
              </div>
            </div>
          </div>
          <button class="btn btn-primary" style="margin-top:14px" onclick="guardarSeguridad()">
            <i class="ti ti-device-floppy"></i> Guardar seguridad
          </button>
        </div>
      </div>

      <!-- INTEGRACIONES -->
      <div class="card mb-6">
        <div class="card-title" style="margin-bottom:16px"><i class="ti ti-plug"></i> Integraciones</div>
        <div class="grid-2">

          <div style="padding:14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <i class="ti ti-brand-whatsapp" style="font-size:24px;color:#25d366"></i>
              <div>
                <div style="font-weight:600;color:var(--text-primary)">Notificaciones WhatsApp</div>
                <div style="font-size:11px;color:var(--text-muted)">Los clientes reciben confirmaciones por WhatsApp</div>
              </div>
              <label class="toggle" style="margin-left:auto"><input type="checkbox" id="tog-wa"><span class="toggle-slider"></span></label>
            </div>
            <input type="text" id="int-wa-key" class="form-control" placeholder="API Key de WhatsApp Business" style="font-size:12px">
          </div>

          <div style="padding:14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <i class="ti ti-brand-discord" style="font-size:24px;color:#5865f2"></i>
              <div>
                <div style="font-weight:600;color:var(--text-primary)">Discord Webhook</div>
                <div style="font-size:11px;color:var(--text-muted)">Recibí notificaciones en tu servidor de Discord</div>
              </div>
              <label class="toggle" style="margin-left:auto"><input type="checkbox" id="tog-discord"><span class="toggle-slider"></span></label>
            </div>
            <input type="text" id="int-discord-url" class="form-control" placeholder="https://discord.com/api/webhooks/..." style="font-size:12px">
          </div>

          <div style="padding:14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <i class="ti ti-brand-facebook" style="font-size:24px;color:#1877f2"></i>
              <div>
                <div style="font-weight:600;color:var(--text-primary)">Meta Pixel</div>
                <div style="font-size:11px;color:var(--text-muted)">Rastreá conversiones de Facebook/Instagram</div>
              </div>
            </div>
            <input type="text" id="int-meta-pixel" class="form-control" placeholder="Ej: 1234567890123456" style="font-size:12px">
          </div>

          <div style="padding:14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <i class="ti ti-brand-tiktok" style="font-size:24px;color:#ff0050"></i>
              <div>
                <div style="font-weight:600;color:var(--text-primary)">TikTok Pixel</div>
                <div style="font-size:11px;color:var(--text-muted)">Rastreá conversiones de TikTok Ads</div>
              </div>
            </div>
            <input type="text" id="int-tiktok-pixel" class="form-control" placeholder="Ej: C1A2B3C4D5E6F7G8H9I0" style="font-size:12px">
          </div>
        </div>
        <button class="btn btn-primary" style="margin-top:14px" onclick="guardarIntegraciones()">
          <i class="ti ti-device-floppy"></i> Guardar integraciones
        </button>
      </div>

      <!-- ACCESO EXTERNO — adaptado a Firebase/GitHub Pages -->
      <div class="card" style="background:rgba(59,91,219,0.06);border-color:rgba(59,91,219,0.25)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div class="card-title"><i class="ti ti-world"></i> Acceso externo — Firebase & GitHub Pages</div>
          <span style="font-size:12px;background:rgba(47,158,68,.18);color:#69db7c;padding:3px 10px;border-radius:20px">Guía Firebase</span>
        </div>
        <div class="grid-2">

          <div style="padding:14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
              <div style="width:30px;height:30px;border-radius:50%;background:var(--indigo-700);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--indigo-300);flex-shrink:0">1</div>
              <div style="font-weight:600;color:var(--text-primary);font-size:13px"><i class="ti ti-link" style="margin-right:4px"></i>Tu URL pública</div>
            </div>
            <div style="font-size:12px;color:var(--text-muted);line-height:1.5">Tu sistema ya está en línea en GitHub Pages. No necesitás router ni IP pública. La URL es <strong style="color:var(--indigo-300)">app-reservas.github.io/reservas</strong> y funciona desde cualquier dispositivo del mundo.</div>
          </div>

          <div style="padding:14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
              <div style="width:30px;height:30px;border-radius:50%;background:var(--indigo-700);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--indigo-300);flex-shrink:0">2</div>
              <div style="font-weight:600;color:var(--text-primary);font-size:13px"><i class="ti ti-share" style="margin-right:4px"></i>Link para clientes</div>
            </div>
            <div style="font-size:12px;color:var(--text-muted);line-height:1.5">El link que mandás por WhatsApp es: <strong style="color:var(--indigo-300)">app-reservas.github.io/reservas/public/reserva.html?negocio=TU-SLUG</strong>. Reemplazá TU-SLUG por el slug del negocio.</div>
          </div>

          <div style="padding:14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
              <div style="width:30px;height:30px;border-radius:50%;background:var(--indigo-700);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--indigo-300);flex-shrink:0">3</div>
              <div style="font-weight:600;color:var(--text-primary);font-size:13px"><i class="ti ti-refresh" style="margin-right:4px"></i>Actualizar el sistema</div>
            </div>
            <div style="font-size:12px;color:var(--text-muted);line-height:1.5">Para subir cambios: editá los archivos en GitHub y hacé commit. GitHub Pages despliega automáticamente en 1-2 minutos. No necesitás reiniciar ningún servidor.</div>
          </div>

          <div style="padding:14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
              <div style="width:30px;height:30px;border-radius:50%;background:var(--indigo-700);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--indigo-300);flex-shrink:0">4</div>
              <div style="font-weight:600;color:var(--text-primary);font-size:13px"><i class="ti ti-shield" style="margin-right:4px"></i>Dominio personalizado</div>
            </div>
            <div style="font-size:12px;color:var(--text-muted);line-height:1.5">Si querés un dominio propio (ej: reservas.tunegocio.com), compralo en cualquier registrador y configurá un CNAME en GitHub Pages → Settings → Pages → Custom domain. Es gratis configurarlo, solo pagás el dominio.</div>
          </div>
        </div>

        <div class="alert alert-info" style="margin-top:16px;margin-bottom:0;background:rgba(59,91,219,0.1);border-color:rgba(59,91,219,0.3);color:var(--indigo-300)">
          <i class="ti ti-info-circle"></i>
          <div>A diferencia de XAMPP, <strong>tu PC no necesita estar encendida</strong> para que el sistema funcione. Firebase y GitHub Pages están siempre en línea, los datos están en la nube de Google.</div>
        </div>
      </div>`;
    }

    function aplicarCFG() {
      if (!CFG) return;
      const set = (id, val) => { const el = document.getElementById(id); if(el) el.checked = !!val; };
      const setVal = (id, val) => { const el = document.getElementById(id); if(el && val !== undefined) el.value = val; };
      set('tog-autopro',    CFG.autopro ?? true);
      set('tog-dur',        CFG.mostrar_duracion ?? true);
      set('tog-desc',       CFG.mostrar_descripcion ?? false);
      setVal('max-anticipacion', CFG.max_anticipacion ?? 90);
      set('tog-vpn',        CFG.bloquear_vpn ?? false);
      set('tog-ip',         CFG.limite_ip_activo ?? false);
      setVal('max-ip',      CFG.limite_ip ?? 3);
      set('tog-email-lim',  CFG.limite_email_activo ?? true);
      setVal('max-email',   CFG.limite_email ?? 3);
      set('tog-wa',         CFG.wa_activo ?? false);
      setVal('int-wa-key',  CFG.wa_key ?? '');
      set('tog-discord',    CFG.discord_activo ?? false);
      setVal('int-discord-url', CFG.discord_url ?? '');
      setVal('int-meta-pixel',  CFG.meta_pixel ?? '');
      setVal('int-tiktok-pixel', CFG.tiktok_pixel ?? '');
    }

    function getToggle(id)  { return document.getElementById(id)?.checked ?? false; }
    function getVal(id)     { return document.getElementById(id)?.value ?? ''; }

    async function guardarComportamiento() {
      try {
        await db.collection('configuracion').doc('global').set({
          autopro:             getToggle('tog-autopro'),
          mostrar_duracion:    getToggle('tog-dur'),
          mostrar_descripcion: getToggle('tog-desc'),
          max_anticipacion:    parseInt(getVal('max-anticipacion')) || 90,
          actualizado_en:      new Date().toISOString(),
        }, { merge: true });
        Toast.success('Configuración guardada correctamente.');
      } catch(e) { Toast.error('Error al guardar: ' + e.message); }
    }

    async function guardarSeguridad() {
      try {
        await db.collection('configuracion').doc('global').set({
          bloquear_vpn:        getToggle('tog-vpn'),
          limite_ip_activo:    getToggle('tog-ip'),
          limite_ip:           parseInt(getVal('max-ip')) || 3,
          limite_email_activo: getToggle('tog-email-lim'),
          limite_email:        parseInt(getVal('max-email')) || 3,
          actualizado_en:      new Date().toISOString(),
        }, { merge: true });
        Toast.success('Configuración de seguridad guardada.');
      } catch(e) { Toast.error('Error al guardar: ' + e.message); }
    }

    async function guardarIntegraciones() {
      try {
        await db.collection('configuracion').doc('global').set({
          wa_activo:      getToggle('tog-wa'),
          wa_key:         getVal('int-wa-key'),
          discord_activo: getToggle('tog-discord'),
          discord_url:    getVal('int-discord-url'),
          meta_pixel:     getVal('int-meta-pixel'),
          tiktok_pixel:   getVal('int-tiktok-pixel'),
          actualizado_en: new Date().toISOString(),
        }, { merge: true });
        Toast.success('Integraciones guardadas.');
      } catch(e) { Toast.error('Error al guardar: ' + e.message); }
    }
  </script>
</body>
</html>
