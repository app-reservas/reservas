// ── ESTADO GLOBAL ─────────────────────────────────────────────
let NEGOCIOS_MAP   = {};  // id → {nombre, color_primario}
let SERVICIOS_MAP  = {};  // id → {negocio_id, nombre, color, duracion_min, precio, capacidad_max}
let PROF_MAP       = {};  // id → {negocio_id, nombre, servicios_ids:[]}
let MEDIOS_MAP     = {};  // negocioId → [{id, nombre}]
let editandoId     = null;
let comprobanteFile = null;
let comprobanteURL  = null;  // URL existente al editar

const ESTADOS = {
  pendiente:      { bg:'rgba(245,159,0,0.15)',  color:'#ffd43b', label:'Pendiente',       icon:'ti-clock' },
  pendiente_pago: { bg:'rgba(16,152,173,0.15)', color:'#22d3ee', label:'Pago pendiente',  icon:'ti-receipt' },
  confirmada:     { bg:'rgba(47,158,68,0.15)',  color:'#69db7c', label:'Confirmada',      icon:'ti-check' },
  completada:     { bg:'rgba(25,113,194,0.15)', color:'#74c0fc', label:'Completada',      icon:'ti-circle-check' },
  cancelada:      { bg:'rgba(224,49,49,0.15)',  color:'#ff8787', label:'Cancelada',       icon:'ti-x' },
  no_asistio:     { bg:'rgba(134,46,156,0.15)', color:'#da77f2', label:'No asistió',      icon:'ti-user-off' },
};

// ── INIT ──────────────────────────────────────────────────────
async function iniciarPagina(usuario) {
  const cont = document.getElementById('page-content');
  cont.innerHTML = renderPagina();

  // Cargar datos base en paralelo
  const [negSnap, srvSnap, profSnap] = await Promise.all([
    db.collection('negocios').where('activo','==',true).get(),
    db.collection('servicios').where('activo','==',true).get(),
    db.collection('profesionales').where('activo','==',true).get(),
  ]);

  negSnap.forEach(d => { NEGOCIOS_MAP[d.id] = { id: d.id, ...d.data() }; });
  srvSnap.forEach(d => { SERVICIOS_MAP[d.id] = { id: d.id, ...d.data() }; });
  profSnap.forEach(d => { PROF_MAP[d.id] = { id: d.id, ...d.data() }; });

  // Poblar filtro de negocios
  const fNeg = document.getElementById('f-negocio');
  if (fNeg) {
    fNeg.innerHTML = '<option value="">Todos</option>' +
      Object.values(NEGOCIOS_MAP).map(n => `<option value="${n.id}">${limpiar(n.nombre)}</option>`).join('');
  }

  await cargarKPIs();
  await cargarReservas();
}

// ── KPIs ──────────────────────────────────────────────────────
async function cargarKPIs() {
  const hoy = hoyISO();
  const snap = await db.collection('reservas').get();
  let total=0, hoyN=0, pendientes=0, confirmadas=0, completadas=0, canceladas=0;
  snap.forEach(d => {
    const r = d.data();
    total++;
    if (r.fecha === hoy) hoyN++;
    if (r.estado === 'pendiente') pendientes++;
    if (r.estado === 'confirmada') confirmadas++;
    if (r.estado === 'completada') completadas++;
    if (r.estado === 'cancelada') canceladas++;
  });
  const wrap = document.getElementById('kpi-wrap');
  if (!wrap) return;
  const kpis = [
    { icon:'ti-calendar-check', color:'indigo', val:total,       label:'Total' },
    { icon:'ti-calendar-today', color:'cyan',   val:hoyN,        label:'Hoy' },
    { icon:'ti-clock',          color:'amber',  val:pendientes,  label:'Pendientes' },
    { icon:'ti-check',          color:'green',  val:confirmadas, label:'Confirmadas' },
    { icon:'ti-circle-check',   color:'indigo', val:completadas, label:'Completadas' },
    { icon:'ti-x',              color:'red',    val:canceladas,  label:'Canceladas' },
  ];
  wrap.innerHTML = kpis.map(k => `
    <div class="kpi-card">
      <div class="kpi-icon ${k.color}"><i class="ti ${k.icon}"></i></div>
      <div><div class="kpi-value" data-counter="${k.val}">${k.val}</div><div class="kpi-label">${k.label}</div></div>
    </div>`).join('');
}

// ── CARGAR TABLA ──────────────────────────────────────────────
async function cargarReservas() {
  const tbody  = document.getElementById('tbody-reservas');
  const cont   = document.getElementById('contador-reservas');
  if (!tbody) return;
  tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:30px"><span class="spinner"></span></td></tr>`;

  const q      = document.getElementById('f-q')?.value.toLowerCase() || '';
  const fecha  = document.getElementById('f-fecha')?.value || '';
  const estado = document.getElementById('f-estado')?.value || '';
  const negId  = document.getElementById('f-negocio')?.value || '';

  let query = db.collection('reservas').orderBy('fecha','desc').limit(300);
  if (estado) query = query.where('estado','==',estado);
  if (negId)  query = query.where('negocio_id','==',negId);
  if (fecha)  query = db.collection('reservas').where('fecha','==',fecha);

  const snap = await query.get();
  let reservas = [];
  snap.forEach(d => reservas.push({ docId: d.id, ...d.data() }));

  // Filtro por búsqueda de texto (cliente_nombre, cliente_email, codigo)
  if (q) {
    reservas = reservas.filter(r =>
      (r.cliente_nombre||'').toLowerCase().includes(q) ||
      (r.cliente_email||'').toLowerCase().includes(q) ||
      (r.codigo||'').toLowerCase().includes(q)
    );
  }
  // Si hay filtro de fecha junto con estado/negocio
  if (fecha && (estado || negId)) {
    reservas = reservas.filter(r => r.fecha === fecha);
  }

  cont.textContent = reservas.length + ' resultado(s)';

  if (!reservas.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted)">
      <i class="ti ti-calendar-off" style="font-size:36px;display:block;margin-bottom:10px;opacity:0.4"></i>
      Sin reservas que coincidan con los filtros.
    </td></tr>`;
    return;
  }

  tbody.innerHTML = reservas.map(r => {
    const e   = ESTADOS[r.estado] || ESTADOS.pendiente;
    const neg = NEGOCIOS_MAP[r.negocio_id];
    const srv = SERVICIOS_MAP[r.servicio_id];
    const pro = r.profesional_id ? PROF_MAP[r.profesional_id] : null;
    const hi  = (r.hora_inicio||'').slice(0,5) || '--:--';
    const hf  = (r.hora_fin||'').slice(0,5) || '--:--';
    const menuEstados = Object.entries(ESTADOS).map(([k,v]) => `
      <button onclick="cambiarEstado('${r.docId}','${k}')"
        style="display:flex;align-items:center;gap:8px;width:100%;padding:9px 14px;background:none;border:none;color:${v.color};cursor:pointer;font-size:12px;font-weight:600;transition:background 0.15s"
        onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background='none'">
        <i class="ti ${v.icon}"></i>${v.label}
      </button>`).join('');
    return `<tr id="fila-res-${r.docId}">
      <td style="color:var(--text-muted);font-size:11px">#${(r.docId||'').slice(-6)}<br>
        <span style="font-size:10px;color:var(--indigo-300);font-family:monospace">${r.codigo||''}</span></td>
      <td>
        <div style="font-weight:600;color:var(--text-primary)">${limpiar(r.cliente_nombre)}</div>
        <div style="font-size:11px;color:var(--text-muted)">${limpiar(r.cliente_email)}</div>
        ${r.cliente_telefono ? `<div style="font-size:11px;color:var(--text-muted)">${limpiar(r.cliente_telefono)}</div>` : ''}
      </td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:4px;height:32px;border-radius:3px;background:${srv?.color||'var(--indigo-500)'}"></div>
          <div>
            <div style="font-size:12px;color:var(--text-muted)">${limpiar(neg?.nombre||'—')}</div>
            <div style="font-weight:600;font-size:13px">${limpiar(srv?.nombre||'—')}</div>
            <div style="font-size:11px;color:var(--text-muted)">${srv?.duracion_min||'—'} min</div>
          </div>
        </div>
      </td>
      <td style="color:var(--text-secondary);font-size:13px">${limpiar(pro?.nombre||'—')}</td>
      <td>
        <div style="font-weight:700;color:var(--text-primary)">${formatearFecha(r.fecha)}</div>
        <div style="font-size:12px;color:var(--indigo-300);font-weight:600">${hi} → ${hf}</div>
      </td>
      <td>
        <div style="position:relative">
          <button onclick="toggleMenuEstado('${r.docId}')"

// ── MENÚ ESTADO ───────────────────────────────────────────────
document.addEventListener('click', e => {
  if (!e.target.closest('[id^="menu-estado-"]') && !e.target.closest('[onclick*="toggleMenuEstado"]')) {
    document.querySelectorAll('[id^="menu-estado-"]').forEach(m => m.style.display='none');
  }
});
function toggleMenuEstado(id) {
  const m = document.getElementById('menu-estado-' + id);
  document.querySelectorAll('[id^="menu-estado-"]').forEach(x => { if(x!==m) x.style.display='none'; });
  m.style.display = m.style.display === 'none' ? 'block' : 'none';
}
async function cambiarEstado(docId, estado) {
  document.querySelectorAll('[id^="menu-estado-"]').forEach(m => m.style.display='none');
  try {
    await db.collection('reservas').doc(docId).update({ estado, actualizado_en: new Date().toISOString() });
    Toast.success('Estado actualizado a: ' + ESTADOS[estado].label);
    cargarReservas();
  } catch(e) { Toast.error('Error al cambiar estado'); }
}
async function validarPago(docId) {
  confirmar('¿Confirmar que el pago fue validado? Cambiará el estado a Confirmada.', async () => {
    await db.collection('reservas').doc(docId).update({ pago_validado:true, estado:'confirmada', actualizado_en:new Date().toISOString() });
    Toast.success('Pago validado. Reserva confirmada.');
    Modal.close('modal-detalle');
    cargarReservas();
  });
}

async function editarReserva(docId) {
  const snap = await db.collection('reservas').doc(docId).get();
  if (!snap.exists) { Toast.error('Reserva no encontrada'); return; }
  const r = { docId: snap.id, ...snap.data() };
  editandoId = docId;
  comprobanteFile = null;
  comprobanteURL  = r.comprobante_url || null;

  document.getElementById('modal-res-titulo').textContent = 'Editar reserva';
  document.getElementById('res-cnombre').value  = r.cliente_nombre || '';
  document.getElementById('res-cemail').value   = r.cliente_email || '';
  document.getElementById('res-ctel').value     = r.cliente_telefono || '';
  document.getElementById('res-cnotas').value   = r.cliente_notas || '';
  document.getElementById('res-notas').value    = r.notas_internas || '';
  document.getElementById('res-fecha').value    = r.fecha || '';
  document.getElementById('res-estado').value   = r.estado || 'pendiente';
  document.getElementById('res-precio').value   = r.precio_cobrado || 0;

  // Poblar select negocio
  const sel = document.getElementById('res-negocio');
  sel.innerHTML = '<option value="">— Seleccioná —</option>' +
    Object.values(NEGOCIOS_MAP).map(n => `<option value="${n.id}">${limpiar(n.nombre)}</option>`).join('');
  sel.value = r.negocio_id || '';

  cargarServiciosSelect(r.negocio_id, r.servicio_id);
  cargarProfesionalesSelect(r.negocio_id, r.profesional_id);
  cargarMetodosPago(r.negocio_id, r.metodo_pago);
  actualizarCampoPersonas(r.servicio_id);
  if (r.cantidad_personas) document.getElementById('res-personas').value = r.cantidad_personas;

  await cargarSlots(r.negocio_id, r.servicio_id, r.profesional_id, r.fecha, r.hora_inicio?.slice(0,5), docId);

  // Mostrar comprobante existente
  if (r.comprobante_url) {
    document.getElementById('comp-preview-nombre').textContent = 'Comprobante adjunto';
    document.getElementById('comp-preview-info').textContent = r.pago_validado ? '✓ Pago validado' : 'Pendiente de validación';
    const link = document.getElementById('comp-preview-link');
    link.href = r.comprobante_url; link.style.display = '';
    document.getElementById('comp-preview-wrap').style.display = 'block';
    document.getElementById('comp-dropzone').style.display = 'none';
  } else {
    resetComprobante();
  }

  Modal.open('modal-reserva');
}

// ── SLOTS ─────────────────────────────────────────────────────
async function cargarSlots(negId, srvId, profId, fecha, selHora=null, excluirId=null) {
  const ind = document.getElementById('slots-indicador');
  const sel = document.getElementById('res-hora');
  sel.innerHTML = '<option>Cargando horarios...</option>';
  ind.style.cssText = 'display:block;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;background:rgba(59,91,219,0.1);color:var(--indigo-300);border:1px solid rgba(59,91,219,0.2)';
  ind.textContent = 'Consultando disponibilidad...';

  const srv = SERVICIOS_MAP[srvId];
  if (!srv) { sel.innerHTML = '<option value="">Servicio no encontrado</option>'; ind.style.display='none'; return; }
  const dur = srv.duracion_min || 30;

  // Día de semana (0=Lunes ... 6=Domingo)
  const d = new Date(fecha + 'T12:00:00');
  const diaSemana = d.getDay(); // 0=Domingo, igual que horarios.html

  // Buscar horarios del profesional (o de cualquier prof del negocio que haga el servicio)
  let horariosSnap;
  if (profId) {
    // Traer horarios del prof para ese día (sin filtro activo en Firestore, filtrar en cliente)
    const snap1 = await db.collection('horarios')
      .where('profesional_id','==',profId)
      .where('dia_semana','==',diaSemana).get();
    // Filtrar activos en cliente
    let docs1 = []; snap1.forEach(d => { if (d.data().activo) docs1.push(d); });
    horariosSnap = { forEach: cb => docs1.forEach(cb), empty: docs1.length===0 };
  } else {
    // Buscar profesionales del negocio que hagan el servicio
    const profsValidos = Object.values(PROF_MAP).filter(p =>
      p.negocio_id === negId && Array.isArray(p.servicios_ids) && p.servicios_ids.includes(srvId)
    );
    // Si no hay profs con servicios_ids cargados, usar todos del negocio
    const profsPool = profsValidos.length > 0
      ? profsValidos
      : Object.values(PROF_MAP).filter(p => p.negocio_id === negId);
    if (!profsPool.length) {
      sel.innerHTML = '<option value="">Sin profesionales para ese servicio</option>';
      ind.textContent = 'Sin profesionales disponibles para este servicio.';
      ind.style.cssText = 'display:block;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;background:rgba(224,49,49,0.1);color:#ff8787;border:1px solid rgba(224,49,49,0.2)';
      return;
    }
    const profIds = profsPool.map(p => p.id);
    const snaps = await Promise.all(profIds.map(pid =>
      db.collection('horarios').where('profesional_id','==',pid).where('dia_semana','==',diaSemana).get()
    ));
    let docs = [];
    snaps.forEach(s => s.forEach(d => { if (d.data().activo) docs.push(d); }));
    horariosSnap = { forEach: cb => docs.forEach(cb), empty: docs.length===0 };
  }

  if (!horariosSnap || horariosSnap.empty) {
    sel.innerHTML = '<option value="">Sin horario para ese día</option>';
    ind.textContent = 'Sin horario disponible para ese día.';
    ind.style.cssText = 'display:block;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;background:rgba(224,49,49,0.1);color:#ff8787;border:1px solid rgba(224,49,49,0.2)';
    return;
  }

  // Obtener rango máximo de horarios
  let hIniMin = '23:59', hFinMax = '00:00';
  horariosSnap.forEach(doc => {
    const h = doc.data();
    if ((h.hora_inicio||'') < hIniMin) hIniMin = h.hora_inicio;
    if ((h.hora_fin||'')    > hFinMax) hFinMax  = h.hora_fin;
  });

  // Config del negocio (intervalo)
  const cfgSnap = await db.collection('configuracion').doc(negId).get();
  const intervalo = cfgSnap.exists ? (cfgSnap.data().intervalo_min || 30) : 30;

  // Reservas existentes ese día en ese negocio
  const resSnap = await db.collection('reservas')
    .where('negocio_id','==',negId)
    .where('fecha','==',fecha)
    .get();
  const reservasDelDia = [];
  resSnap.forEach(d => {
    if (d.id !== excluirId && d.data().estado !== 'cancelada') reservasDelDia.push(d.data());
  });

  // Bloqueos
  const blqSnap = await db.collection('bloqueos')
    .where('negocio_id','==',negId)
    .where('fecha_inicio','<=', fecha + 'T23:59')
    .get();
  const bloqueos = [];
  blqSnap.forEach(d => bloqueos.push(d.data()));

  // Generar slots
  const slots = [];
  const iniMs = toMinutos(hIniMin);
  const finMs = toMinutos(hFinMax);
  const ahoraMs = new Date().getHours()*60 + new Date().getMinutes();
  const esHoy = fecha === hoyISO();

  for (let t = iniMs; t + dur <= finMs; t += intervalo) {
    if (esHoy && t <= ahoraMs) continue;
    const hi = deMinutos(t);
    const hf = deMinutos(t + dur);
    // Solapamiento con reservas
    const ocupado = reservasDelDia.some(r => {
      if (profId && r.profesional_id && r.profesional_id !== profId) return false;
      const rIni = toMinutos((r.hora_inicio||'').slice(0,5));
      const rFin = toMinutos((r.hora_fin||'').slice(0,5));
      return rIni < (t+dur) && rFin > t;
    });
    // Bloqueo
    const bloqueado = bloqueos.some(b => {
      const bIni = new Date(b.fecha_inicio).getTime();
      const bFin = new Date(b.fecha_fin).getTime();
      const slotIni = new Date(`${fecha}T${hi}`).getTime();
      const slotFin = new Date(`${fecha}T${hf}`).getTime();
      return bIni < slotFin && bFin > slotIni;
    });
    slots.push({ hi, hf, disponible: !ocupado && !bloqueado });
  }

  if (!slots.length) {
    sel.innerHTML = '<option value="">Sin horarios para ese día</option>';
    ind.textContent = 'Sin disponibilidad para ese día.';
    ind.style.cssText = 'display:block;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;background:rgba(224,49,49,0.1);color:#ff8787;border:1px solid rgba(224,49,49,0.2)';
    return;
  }

  const disponibles = slots.filter(s => s.disponible);
  sel.innerHTML = '<option value="">— Elegí un horario —</option>' +
    slots.map(s => s.disponible
      ? `<option value="${s.hi}" ${selHora===s.hi?'selected':''}>${s.hi} → ${s.hf}</option>`
      : `<option disabled style="color:var(--text-muted)">${s.hi} → ${s.hf} (ocupado)</option>`
    ).join('');
  ind.textContent = `✓ ${disponibles.length} horario(s) disponible(s)`;
  ind.style.cssText = 'display:block;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;background:rgba(47,158,68,0.1);color:#69db7c;border:1px solid rgba(47,158,68,0.2)';
}

function toMinutos(hora) {
  const [h,m] = (hora||'00:00').split(':').map(Number);
  return h*60 + (m||0);
}
function deMinutos(min) {
  return String(Math.floor(min/60)).padStart(2,'0') + ':' + String(min%60).padStart(2,'0');
}

// ── COMPROBANTE ───────────────────────────────────────────────
function onSeleccionComprobante(input) {
  if (!input.files.length) return;
  mostrarPreviewComprobante(input.files[0]);
  comprobanteFile = input.files[0];
}
function onDropComprobante(e) {
  e.preventDefault();
  document.getElementById('comp-dropzone').style.borderColor = 'var(--border-strong)';
  const f = e.dataTransfer.files[0]; if (!f) return;
  const dt = new DataTransfer(); dt.items.add(f);
  document.getElementById('res-comprobante').files = dt.files;
  mostrarPreviewComprobante(f);
  comprobanteFile = f;
}
function mostrarPreviewComprobante(file) {
  document.getElementById('comp-preview-nombre').textContent = file.name;
  document.getElementById('comp-preview-info').textContent = (file.size/1024).toFixed(0) + ' KB';
  document.getElementById('comp-preview-link').style.display = 'none';
  document.getElementById('comp-preview-wrap').style.display = 'block';
  document.getElementById('comp-dropzone').style.display = 'none';
}
function quitarComprobante() {
  comprobanteFile = null; comprobanteURL = null;
  document.getElementById('res-comprobante').value = '';
  document.getElementById('comp-preview-wrap').style.display = 'none';
  document.getElementById('comp-dropzone').style.display = 'block';
}
function resetComprobante() { quitarComprobante(); }

// ── GUARDAR RESERVA ───────────────────────────────────────────
async function guardarReserva() {
  const btn = document.getElementById('btn-guardar-res');
  const cnombre = document.getElementById('res-cnombre').value.trim();
  const cemail  = document.getElementById('res-cemail').value.trim();
  const fecha   = document.getElementById('res-fecha').value;
  const horaIni = document.getElementById('res-hora').value;
  const negId   = document.getElementById('res-negocio').value;
  const srvId   = document.getElementById('res-servicio').value;

  if (!cnombre) { Toast.error('El nombre del cliente es obligatorio'); return; }
  if (!cemail)  { Toast.error('El email del cliente es obligatorio'); return; }
  if (!fecha)   { Toast.error('La fecha es obligatoria'); return; }
  if (!horaIni) { Toast.error('Seleccioná un horario'); return; }
  if (!negId)   { Toast.error('Seleccioná un negocio'); return; }
  if (!srvId)   { Toast.error('Seleccioná un servicio'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Guardando...';

  const srv = SERVICIOS_MAP[srvId];
  const dur = srv?.duracion_min || 30;
  const iniMin = toMinutos(horaIni);
  const horaFin = deMinutos(iniMin + dur);

  let compURL = comprobanteURL || null;
  // Subir comprobante a Cloudinary si hay nuevo archivo
  if (comprobanteFile) {
    try {
      const fd = new FormData();
      fd.append('file', comprobanteFile);
      fd.append('upload_preset', CLOUDINARY_PRESET);
      fd.append('folder', 'reservas/comprobantes');
      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/auto/upload`, { method:'POST', body:fd });
      const data = await res.json();
      compURL = data.secure_url || null;
    } catch(e) { Toast.warning('No se pudo subir el comprobante, se guardó sin él'); }
  }

  const profId = document.getElementById('res-profesional').value || null;
  const estado = compURL && !editandoId ? 'pendiente_pago' : document.getElementById('res-estado').value;

  const payload = {
    negocio_id:       negId,
    servicio_id:      srvId,
    profesional_id:   profId,
    cliente_nombre:   cnombre,
    cliente_email:    cemail,
    cliente_telefono: document.getElementById('res-ctel').value.trim(),
    cliente_notas:    document.getElementById('res-cnotas').value.trim(),
    fecha,
    hora_inicio:      horaIni,
    hora_fin:         horaFin,
    estado,
    precio_cobrado:   parseFloat(document.getElementById('res-precio').value) || 0,
    metodo_pago:      document.getElementById('res-medio-pago').value || 'efectivo',
    notas_internas:   document.getElementById('res-notas').value.trim(),
    cantidad_personas: parseInt(document.getElementById('res-personas').value) || 1,
    comprobante_url:  compURL,
    pago_validado:    editandoId ? (compURL ? false : false) : false,
    actualizado_en:   new Date().toISOString(),
  };

  try {
    if (editandoId) {
      await db.collection('reservas').doc(editandoId).update(payload);
      Toast.success('Reserva actualizada correctamente');
    } else {
      payload.codigo      = generarCodigo(8);
      payload.creado_en   = new Date().toISOString();
      const ref = await db.collection('reservas').add(payload);
      // Notificación interna
      await db.collection('notificaciones').add({
        negocio_id: negId,
        tipo: 'reserva_nueva',
        titulo: 'Nueva reserva: ' + cnombre,
        mensaje: `Reserva para el ${fecha} a las ${horaIni}. Servicio: ${srv?.nombre||''}`,
        leida: false,
        creado_en: new Date().toISOString(),
      });
      Toast.success('Reserva creada · Código: ' + payload.codigo);
    }
    Modal.close('modal-reserva');
    resetComprobante();
    await cargarKPIs();
    await cargarReservas();
  } catch(e) {
    Toast.error('Error al guardar: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-device-floppy"></i> Guardar reserva';
  }
}

// ── ELIMINAR ──────────────────────────────────────────────────
function eliminarRes(docId) {
  confirmar('¿Eliminar esta reserva? No se puede deshacer.', async () => {
    await db.collection('reservas').doc(docId).delete();
    Toast.success('Reserva eliminada');
    document.getElementById('fila-res-' + docId)?.remove();
    await cargarKPIs();
  });
}

// ── FILTROS ───────────────────────────────────────────────────
function limpiarFiltros() {
  ['f-q','f-fecha','f-estado','f-negocio'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  cargarReservas();
}
</script>
