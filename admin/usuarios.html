<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios — ReservaSystem</title>
  <link rel="stylesheet" href="../assets/css/dark.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
</head>
<body>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/helpers.js"></script>
  <script src="../assets/js/sidebar.js"></script>

  <script>
    let USUARIOS_CACHE = [];
    let NEGOCIOS_ACTIVOS_CACHE = [];
    let YO_UID = null;

    (async () => {
      const usuario = await requireLogin('superadmin');
      YO_UID = usuario.uid;

      renderLayoutAdmin({
        titulo: 'Usuarios',
        subtitulo: 'Gestión de Super Admins y Gerentes del sistema',
        nombreUsuario: usuario.nombre,
        rolLabel: 'Super Administrador',
        topbarActionsHTML: `
          <button class="btn btn-primary" onclick="abrirModalNuevo()">
            <i class="ti ti-user-plus"></i> Nuevo usuario
          </button>`,
      });

      await cargarUsuarios();
    })();

    // ============================================================
    //  CARGA + RENDER
    // ============================================================
    async function cargarUsuarios() {
      const cont = document.getElementById('page-content');
      cont.innerHTML = `<div style="text-align:center;padding:60px"><span class="spinner"></span></div>`;

      const [usuariosSnap, negociosSnap] = await Promise.all([
        db.collection('usuarios').get(),
        db.collection('negocios').where('activo', '==', true).get(),
      ]);

      const negociosMap = {};
      const negociosActivos = [];
      negociosSnap.forEach(d => {
        negociosMap[d.id] = d.data().nombre;
        negociosActivos.push({ id: d.id, nombre: d.data().nombre });
      });
      negociosActivos.sort((a, b) => a.nombre.localeCompare(b.nombre));
      NEGOCIOS_ACTIVOS_CACHE = negociosActivos;

      const usuarios = [];
      usuariosSnap.forEach(d => usuarios.push({
        id: d.id,
        ...d.data(),
        negocio_nombre: d.data().negocio_id ? (negociosMap[d.data().negocio_id] || null) : null,
      }));

      // ORDER BY rol ASC, nombre ASC (superadmin antes que gerente alfabéticamente, igual que PHP enum order)
      const ordenRol = { superadmin: 0, gerente: 1, cliente: 2 };
      usuarios.sort((a, b) => {
        const r = (ordenRol[a.rol] ?? 9) - (ordenRol[b.rol] ?? 9);
        if (r !== 0) return r;
        return (a.nombre || '').localeCompare(b.nombre || '');
      });

      USUARIOS_CACHE = usuarios;
      renderUsuarios(usuarios);
    }

    function renderUsuarios(usuarios) {
      const cont = document.getElementById('page-content');

      const totalSuper   = usuarios.filter(u => u.rol === 'superadmin').length;
      const totalGer     = usuarios.filter(u => u.rol === 'gerente').length;
      const totalActivos = usuarios.filter(u => u.activo !== false).length;
      const sinNegocio   = usuarios.filter(u => u.rol === 'gerente' && !u.negocio_id).length;

      const pendientes = usuarios.filter(u => u.activo === false);
      const pendientesHTML = pendientes.length === 0 ? '' : `
        <div class="alert alert-info mb-4">
          <i class="ti ti-clock"></i>
          <div>Hay <strong>${pendientes.length} cuenta(s) pendiente(s) de aprobación</strong>: ${pendientes.map(u => limpiar(u.nombre)).join(', ')}. Activalas y asignales un negocio para que puedan ingresar.</div>
        </div>`;

      const alertaSinNegocioHTML = sinNegocio > 0 ? `
        <div class="alert alert-warning mb-4">
          <i class="ti ti-alert-triangle"></i>
          <div>Hay <strong>${sinNegocio} gerente(s) sin negocio asignado</strong>. No podrán acceder correctamente a su panel. Editálos y asignales un negocio.</div>
        </div>` : '';

      const colorRol = { superadmin: 'var(--indigo-600)', gerente: '#7048e8', cliente: '#1098ad' };
      const badgeRol = {
        superadmin: { bg: 'rgba(59,91,219,0.18)', color: 'var(--indigo-300)', icono: 'ti-shield-check', label: 'Super Admin' },
        gerente:    { bg: 'rgba(112,72,232,0.18)', color: '#da77f2',           icono: 'ti-user-cog',    label: 'Gerente' },
        cliente:    { bg: 'rgba(16,152,173,0.18)', color: '#66d9e8',           icono: 'ti-user',         label: 'Cliente' },
      };

      const filasHTML = usuarios.length === 0 ? `
        <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">Sin usuarios registrados.</td></tr>
      ` : usuarios.map(u => {
        const esYo = u.id === YO_UID;
        const colorAv = colorRol[u.rol] || colorRol.gerente;
        const ini = iniciales(u.nombre);
        const br = badgeRol[u.rol] || badgeRol.gerente;
        const pendiente = u.activo === false;

        return `
        <tr data-id="${u.id}" data-rol="${u.rol}" data-nombre="${(u.nombre || '').toLowerCase()}" data-email="${(u.email || '').toLowerCase()}">
          <td style="color:var(--text-muted);font-size:12px">#${u.id.substring(0,6)}</td>

          <td>
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:38px;height:38px;border-radius:50%;background:${colorAv}22;border:2px solid ${colorAv}44;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:${colorAv};flex-shrink:0">
                ${ini}
              </div>
              <div>
                <div style="font-weight:600;color:var(--text-primary)">${limpiar(u.nombre)}</div>
                <div style="font-size:12px;color:var(--text-muted)">${limpiar(u.email)}</div>
              </div>
            </div>
          </td>

          <td>
            <span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:${br.bg};color:${br.color};font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px">
              <i class="ti ${br.icono}"></i>${br.label}
            </span>
          </td>

          <td>
            ${u.negocio_nombre ? `
              <span style="display:flex;align-items:center;gap:5px;font-size:13px">
                <i class="ti ti-building-store" style="color:var(--indigo-400)"></i>
                ${limpiar(u.negocio_nombre)}
              </span>` : u.rol === 'gerente' ? `
              <span style="color:var(--estado-pendiente);font-size:12px;display:flex;align-items:center;gap:4px">
                <i class="ti ti-alert-circle"></i> Sin asignar
              </span>` : `<span style="color:var(--text-muted);font-size:12px">—</span>`}
          </td>

          <td style="color:var(--text-secondary);font-size:13px">
            ${u.telefono ? limpiar(u.telefono) : '<span style="color:var(--text-muted)">—</span>'}
          </td>

          <td>
            ${pendiente ? `
              <span class="badge-estado estado-pendiente" style="cursor:default">
                <i class="ti ti-clock"></i> Pendiente
              </span>` : `
              <button
                onclick="${esYo ? `Toast.warning('No podés desactivarte a vos mismo.')` : `toggleUsuario('${u.id}', this)`}"
                class="badge-estado ${u.activo !== false ? 'estado-confirmada' : 'estado-cancelada'}"
                style="cursor:pointer;border:none${esYo ? ';opacity:0.6' : ''}">
                <i class="ti ${u.activo !== false ? 'ti-check' : 'ti-x'}"></i>
                ${u.activo !== false ? 'Activo' : 'Inactivo'}
              </button>`}
          </td>

          <td>
            <div style="display:flex;gap:6px;justify-content:center">
              ${pendiente ? `
              <button onclick="aprobarUsuario('${u.id}')" class="btn btn-success btn-icon btn-sm" title="Aprobar">
                <i class="ti ti-check"></i>
              </button>` : ''}
              <button onclick="editarUsuario('${u.id}')" class="btn btn-ghost btn-icon btn-sm" title="Editar">
                <i class="ti ti-edit"></i>
              </button>
              <button onclick="resetPasswordUsuario('${u.id}')" class="btn btn-ghost btn-icon btn-sm" title="Enviar email para restablecer contraseña">
                <i class="ti ti-key"></i>
              </button>
              ${(!esYo && u.rol !== 'superadmin') ? `
              <button onclick="eliminarUsuarioBtn('${u.id}', '${limpiar(u.nombre).replace(/'/g, "\\'")}')" class="btn btn-danger btn-icon btn-sm" title="Eliminar">
                <i class="ti ti-trash"></i>
              </button>` : `
              <button class="btn btn-ghost btn-icon btn-sm" disabled title="No disponible" style="opacity:0.3">
                <i class="ti ti-trash"></i>
              </button>`}
            </div>
          </td>
        </tr>`;
      }).join('');

      const opcionesNegocio = NEGOCIOS_ACTIVOS_CACHE.map(n => `<option value="${n.id}">${limpiar(n.nombre)}</option>`).join('');

      cont.innerHTML = `
        <div class="kpi-grid mb-6" style="grid-template-columns:repeat(4,1fr)">
          <div class="kpi-card">
            <div class="kpi-icon indigo"><i class="ti ti-shield-check"></i></div>
            <div><div class="kpi-value" data-counter="${totalSuper}">${totalSuper}</div><div class="kpi-label">Super Admins</div></div>
          </div>
          <div class="kpi-card">
            <div class="kpi-icon purple"><i class="ti ti-user-cog"></i></div>
            <div><div class="kpi-value" data-counter="${totalGer}">${totalGer}</div><div class="kpi-label">Gerentes</div></div>
          </div>
          <div class="kpi-card">
            <div class="kpi-icon green"><i class="ti ti-check"></i></div>
            <div><div class="kpi-value" data-counter="${totalActivos}">${totalActivos}</div><div class="kpi-label">Activos</div></div>
          </div>
          <div class="kpi-card">
            <div class="kpi-icon amber"><i class="ti ti-alert-circle"></i></div>
            <div>
              <div class="kpi-value" data-counter="${sinNegocio}">${sinNegocio}</div>
              <div class="kpi-label">Gerentes sin negocio</div>
              ${sinNegocio ? `<div class="kpi-trend down">⚠ Requiere atención</div>` : ''}
            </div>
          </div>
        </div>

        ${pendientesHTML}
        ${alertaSinNegocioHTML}

        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="ti ti-users"></i> Todos los usuarios</div>
            <div style="display:flex;gap:10px;align-items:center">
              <select id="filtro-rol" class="form-control" style="width:150px" onchange="filtrarTablaUsuarios()">
                <option value="">Todos los roles</option>
                <option value="superadmin">Super Admin</option>
                <option value="gerente">Gerente</option>
              </select>
              <div style="position:relative">
                <i class="ti ti-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:16px"></i>
                <input type="text" id="buscador" class="form-control" placeholder="Buscar..." style="padding-left:34px;width:200px" oninput="filtrarTablaUsuarios()">
              </div>
            </div>
          </div>

          <div class="table-wrap">
            <table class="tabla">
              <thead>
                <tr>
                  <th>#</th><th>Usuario</th><th>Rol</th><th>Negocio asignado</th>
                  <th>Teléfono</th><th>Estado</th><th style="text-align:center">Acciones</th>
                </tr>
              </thead>
              <tbody id="tbody-usuarios">
                ${filasHTML}
              </tbody>
            </table>
          </div>
        </div>

        <!-- ===== MODAL USUARIO ===== -->
        <div class="modal-overlay" id="modal-usuario">
          <div class="modal" style="max-width:560px">
            <div class="modal-header">
              <div class="modal-title" id="modal-usr-titulo">Nuevo usuario</div>
              <button class="btn btn-ghost btn-icon" onclick="Modal.close('modal-usuario')">
                <i class="ti ti-x"></i>
              </button>
            </div>

            <form id="form-usuario" novalidate>
              <input type="hidden" id="usr-id" value="">

              <div class="grid-2">
                <div class="form-group">
                  <label class="form-label">Nombre completo *</label>
                  <input type="text" id="usr-nombre" class="form-control" placeholder="Juan Pérez" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Email *</label>
                  <input type="email" id="usr-email" class="form-control" placeholder="juan@email.com" required>
                </div>
              </div>

              <div class="grid-2">
                <div class="form-group" id="campo-rol-wrap">
                  <label class="form-label">Rol *</label>
                  <select id="usr-rol" class="form-control" onchange="toggleNegocioField(this.value)">
                    <option value="gerente">Gerente</option>
                    <option value="superadmin">Super Admin</option>
                  </select>
                  <div id="rol-hint-nuevo" style="font-size:11px;color:var(--text-muted);margin-top:4px;display:none">
                    Las cuentas nuevas se crean como Gerente. Para Super Admin, editá el rol después de creada.
                  </div>
                </div>
                <div class="form-group" id="campo-negocio">
                  <label class="form-label">Negocio asignado *</label>
                  <select id="usr-negocio" class="form-control">
                    <option value="">— Seleccioná un negocio —</option>
                    ${opcionesNegocio}
                  </select>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Teléfono</label>
                <input type="text" id="usr-tel" class="form-control" placeholder="+54 351 123-4567">
              </div>

              <div class="divider"></div>

              <div class="grid-2" id="campo-password-wrap">
                <div class="form-group">
                  <label class="form-label" id="lbl-pass">Contraseña *</label>
                  <div style="position:relative">
                    <input type="password" id="usr-pass" class="form-control" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                    <button type="button" onclick="togglePassModal()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:17px">
                      <i class="ti ti-eye" id="pass-modal-icon"></i>
                    </button>
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">Confirmar contraseña</label>
                  <input type="password" id="usr-pass2" class="form-control" placeholder="Repetir contraseña" autocomplete="new-password">
                </div>
              </div>
              <div id="pass-hint" style="font-size:12px;color:var(--text-muted);margin-top:-10px;margin-bottom:12px;display:none">
                La contraseña de un usuario existente no se puede cambiar desde aquí. Usá el botón <i class="ti ti-key"></i> en la tabla para enviarle un email de restablecimiento.
              </div>

              <div class="form-group" style="display:flex;align-items:center;gap:10px">
                <input type="checkbox" id="usr-activo" checked
                       style="width:18px;height:18px;cursor:pointer;accent-color:var(--indigo-500)">
                <label for="usr-activo" style="cursor:pointer;color:var(--text-secondary)">Usuario activo</label>
              </div>
              <div id="activo-hint-nuevo" style="font-size:12px;color:var(--text-muted);margin-top:-10px;margin-bottom:12px;display:none">
                Por seguridad, toda cuenta nueva nace <strong>inactiva</strong>. Vas a poder activarla con el botón <i class="ti ti-check"></i> en la tabla, una vez creada.
              </div>

              <div class="divider"></div>

              <div style="display:flex;gap:10px;justify-content:flex-end">
                <button type="button" class="btn btn-ghost" onclick="Modal.close('modal-usuario')">Cancelar</button>
                <button type="submit" class="btn btn-primary" id="btn-guardar-usr">
                  <i class="ti ti-device-floppy"></i> Guardar usuario
                </button>
              </div>
            </form>
          </div>
        </div>
      `;

      document.getElementById('form-usuario').addEventListener('submit', guardarUsuario);

      document.querySelectorAll('[data-counter]').forEach(el => {
        animarContador(el, parseFloat(el.dataset.counter) || 0, el.dataset.prefix || '', el.dataset.suffix || '');
      });
    }

    // ============================================================
    //  FILTRO TABLA
    // ============================================================
    function filtrarTablaUsuarios() {
      const q   = document.getElementById('buscador').value.toLowerCase();
      const rol = document.getElementById('filtro-rol').value;
      document.querySelectorAll('#tbody-usuarios tr[data-id]').forEach(r => {
        const matchQ   = !q   || r.dataset.nombre.includes(q) || r.dataset.email.includes(q);
        const matchRol = !rol || r.dataset.rol === rol;
        r.style.display = matchQ && matchRol ? '' : 'none';
      });
    }

    // ============================================================
    //  CAMPO NEGOCIO SEGÚN ROL
    // ============================================================
    function toggleNegocioField(rol) {
      const campo = document.getElementById('campo-negocio');
      campo.style.opacity = rol === 'superadmin' ? '0.4' : '1';
      campo.style.pointerEvents = rol === 'superadmin' ? 'none' : 'auto';
      if (rol === 'superadmin') document.getElementById('usr-negocio').value = '';
    }

    function togglePassModal() {
      const i = document.getElementById('usr-pass');
      const ico = document.getElementById('pass-modal-icon');
      i.type = i.type === 'password' ? 'text' : 'password';
      ico.className = 'ti ' + (i.type === 'password' ? 'ti-eye' : 'ti-eye-off');
    }

    // ============================================================
    //  ABRIR MODAL NUEVO
    // ============================================================
    function abrirModalNuevo() {
      document.getElementById('modal-usr-titulo').textContent = 'Nuevo usuario';
      document.getElementById('form-usuario').reset();
      document.getElementById('usr-id').value = '';
      // Por seguridad, toda cuenta nueva nace inactiva y como gerente
      // (las reglas de Firestore lo exigen así). Se aprueba y se puede
      // ascender a Super Admin después, editando.
      document.getElementById('usr-activo').checked = false;
      document.getElementById('usr-activo').disabled = true;
      document.getElementById('activo-hint-nuevo').style.display = 'block';
      document.getElementById('usr-rol').value = 'gerente';
      document.getElementById('usr-rol').disabled = true;
      document.getElementById('rol-hint-nuevo').style.display = 'block';
      document.getElementById('lbl-pass').textContent = 'Contraseña *';
      document.getElementById('pass-hint').style.display = 'none';
      document.getElementById('campo-password-wrap').style.display = '';
      document.getElementById('usr-pass').disabled = false;
      document.getElementById('usr-pass2').disabled = false;
      document.getElementById('usr-email').disabled = false;
      toggleNegocioField('gerente');
      Modal.open('modal-usuario');
    }

    // ============================================================
    //  EDITAR
    // ============================================================
    function editarUsuario(id) {
      const u = USUARIOS_CACHE.find(x => x.id === id);
      if (!u) { Toast.error('No se encontró el usuario'); return; }

      document.getElementById('modal-usr-titulo').textContent = 'Editar usuario';
      document.getElementById('usr-id').value      = u.id;
      document.getElementById('usr-nombre').value  = u.nombre || '';
      document.getElementById('usr-email').value   = u.email || '';
      document.getElementById('usr-email').disabled = true; // el email es el login de Firebase Auth, no se cambia acá
      document.getElementById('usr-rol').value     = u.rol || 'gerente';
      document.getElementById('usr-rol').disabled  = false;
      document.getElementById('rol-hint-nuevo').style.display = 'none';
      document.getElementById('usr-negocio').value = u.negocio_id || '';
      document.getElementById('usr-tel').value     = u.telefono || '';
      document.getElementById('usr-activo').checked = u.activo !== false;
      document.getElementById('usr-activo').disabled = false;
      document.getElementById('activo-hint-nuevo').style.display = 'none';

      // En edición no se toca la contraseña desde aquí (limitación de Firebase Auth cliente)
      document.getElementById('campo-password-wrap').style.display = 'none';
      document.getElementById('pass-hint').style.display = 'block';
      document.getElementById('usr-pass').disabled = true;
      document.getElementById('usr-pass2').disabled = true;

      toggleNegocioField(u.rol || 'gerente');
      Modal.open('modal-usuario');
    }

    // ============================================================
    //  GUARDAR (crear nuevo con Auth secundario, o editar solo Firestore)
    // ============================================================
    async function guardarUsuario(e) {
      e.preventDefault();
      const id     = document.getElementById('usr-id').value;
      const nombre = document.getElementById('usr-nombre').value.trim();
      const email  = document.getElementById('usr-email').value.trim();
      const rol    = document.getElementById('usr-rol').value;
      const negocioId = document.getElementById('usr-negocio').value || null;
      const telefono = document.getElementById('usr-tel').value.trim();
      const activo = document.getElementById('usr-activo').checked;

      if (!nombre) { Toast.error('El nombre es obligatorio.'); return; }
      if (!email)  { Toast.error('El email es obligatorio.'); return; }
      if (rol === 'gerente' && !negocioId) { Toast.error('El gerente debe tener un negocio asignado.'); return; }

      // Email único (entre los que ya tenemos en cache, solo aplica para nuevos)
      if (!id) {
        const dup = USUARIOS_CACHE.some(u => (u.email || '').toLowerCase() === email.toLowerCase());
        if (dup) { Toast.error('Ese email ya está registrado.'); return; }
      }

      const btn = document.getElementById('btn-guardar-usr');
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span> Guardando...`;

      try {
        if (id) {
          // ── EDITAR: solo datos de Firestore (email y password no se tocan acá) ──
          await db.collection('usuarios').doc(id).update({
            nombre, rol, negocio_id: negocioId, telefono: telefono || null, activo,
          });
          Toast.success('Usuario actualizado correctamente.');
        } else {
          // ── CREAR: usuario nuevo en Auth + Firestore, sin desloguear al superadmin ──
          const pass  = document.getElementById('usr-pass').value;
          const pass2 = document.getElementById('usr-pass2').value;
          if (!pass || pass.length < 6) { Toast.error('La contraseña debe tener al menos 6 caracteres.'); btn.disabled=false; btn.innerHTML=`<i class="ti ti-device-floppy"></i> Guardar usuario`; return; }
          if (pass !== pass2) { Toast.error('Las contraseñas no coinciden.'); btn.disabled=false; btn.innerHTML=`<i class="ti ti-device-floppy"></i> Guardar usuario`; return; }

          // App secundaria de Firebase, así no perdemos la sesión del superadmin
          const nombreApp = 'secundaria-' + Date.now();
          const appSecundaria = firebase.initializeApp(FIREBASE_CONFIG, nombreApp);
          const authSecundaria = appSecundaria.auth();

          try {
            const cred = await authSecundaria.createUserWithEmailAndPassword(email, pass);
            await db.collection('usuarios').doc(cred.user.uid).set({
              nombre, email,
              rol: 'gerente',       // las reglas de Firestore exigen esto en la creación
              activo: false,        // nace inactivo siempre; se aprueba después con el botón ✓
              negocio_id: negocioId,
              telefono: telefono || null,
              creado_en: firebase.firestore.FieldValue.serverTimestamp(),
            });
            await authSecundaria.signOut();
            Toast.success('Usuario creado correctamente.');
          } finally {
            await appSecundaria.delete(); // limpiamos la app secundaria siempre
          }
        }

        Modal.close('modal-usuario');
        await cargarUsuarios();
      } catch (err) {
        console.error(err);
        Toast.error('Error al guardar: ' + tradErrorAuth(err.code) );
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="ti ti-device-floppy"></i> Guardar usuario`;
      }
    }

    function tradErrorAuth(code) {
      const map = {
        'auth/email-already-in-use': 'Ese email ya está registrado en Firebase.',
        'auth/invalid-email': 'Email inválido.',
        'auth/weak-password': 'La contraseña es muy débil.',
      };
      return map[code] || (code || 'desconocido');
    }

    // ============================================================
    //  APROBAR (cuenta auto-registrada pendiente)
    // ============================================================
    function aprobarUsuario(id) {
      editarUsuario(id);
      Toast.info('Asignale un negocio (si aplica), tildá "Usuario activo" y guardá para aprobarlo.');
    }

    // ============================================================
    //  RESET PASSWORD (email de Firebase)
    // ============================================================
    async function resetPasswordUsuario(id) {
      const u = USUARIOS_CACHE.find(x => x.id === id);
      if (!u || !u.email) { Toast.error('No se encontró el email del usuario.'); return; }
      try {
        await auth.sendPasswordResetEmail(u.email);
        Toast.success(`Email de restablecimiento enviado a ${u.email}`);
      } catch (err) {
        console.error(err);
        Toast.error('No se pudo enviar el email: ' + tradErrorAuth(err.code));
      }
    }

    // ============================================================
    //  TOGGLE ESTADO
    // ============================================================
    async function toggleUsuario(id, btnEl) {
      const u = USUARIOS_CACHE.find(x => x.id === id);
      if (!u) return;
      if (id === YO_UID) { Toast.warning('No podés desactivarte a vos mismo.'); return; }
      const nuevoEstado = !(u.activo !== false);
      try {
        await db.collection('usuarios').doc(id).update({ activo: nuevoEstado });
        u.activo = nuevoEstado;
        btnEl.className = `badge-estado ${nuevoEstado ? 'estado-confirmada' : 'estado-cancelada'}`;
        btnEl.innerHTML = `<i class="ti ${nuevoEstado ? 'ti-check' : 'ti-x'}"></i> ${nuevoEstado ? 'Activo' : 'Inactivo'}`;
        Toast.success('Estado actualizado.');
      } catch (err) {
        console.error(err);
        Toast.error('No se pudo cambiar el estado.');
      }
    }

    // ============================================================
    //  ELIMINAR
    // ============================================================
    function eliminarUsuarioBtn(id, nombre) {
      if (id === YO_UID) { Toast.warning('No podés eliminarte a vos mismo.'); return; }
      const u = USUARIOS_CACHE.find(x => x.id === id);
      if (u && u.rol === 'superadmin') { Toast.warning('No se puede eliminar un Super Admin.'); return; }

      confirmar(`¿Eliminar "${nombre}"? No se puede deshacer. (Nota: esto borra el registro de Firestore; la cuenta de inicio de sesión en Firebase Auth deberá borrarse manualmente desde la consola de Firebase si querés liberar ese email).`, async () => {
        try {
          await db.collection('usuarios').doc(id).delete();
          Toast.success('Usuario eliminado correctamente.');
          await cargarUsuarios();
        } catch (err) {
          console.error(err);
          Toast.error('Error al eliminar.');
        }
      });
    }
  </script>

  <script src="../assets/js/app.js"></script>
</body>
</html>
