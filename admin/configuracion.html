<script>
let usuarioActual = null;
let configGlobal  = {};

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = '../index.html'; return; }
  const snap = await db.collection('usuarios').doc(user.uid).get();
  if (!snap.exists || !snap.data().activo || snap.data().rol !== 'superadmin') {
    auth.signOut(); window.location.href = '../index.html'; return;
  }
  usuarioActual = { uid: user.uid, ...snap.data() };

  renderLayoutAdmin({
    titulo:        'Configuración del sistema',
    subtitulo:     'Ajustes globales de ReservaSystem',
    nombreUsuario: usuarioActual.nombre,
    rolLabel:      'Super Administrador',
  });

  document.getElementById('page-content').innerHTML =
    `<div style="text-align:center;padding:60px"><span class="spinner"></span></div>`;

  // Inyectar modales en el body ahora que el DOM está listo
  inyectarModales();

  // Cargar config y renderizar
  await cargarConfig();
  await renderPagina();
});

// ── Cargar configuración ─────────────────────────────────
async function cargarConfig() {
  try {
    const snap = await db.collection('configuracion').doc('global').get();
    configGlobal = snap.exists ? snap.data() : {};
  } catch(e) { configGlobal = {}; }
}

// ── Stats ────────────────────────────────────────────────
async function obtenerStats() {
  try {
    const [usSnap, negSnap, resSnap, srvSnap, profSnap] = await Promise.all([
      db.collection('usuarios').get(),
      db.collection('negocios').get(),
      db.collection('reservas').get(),
      db.collection('servicios').get(),
      db.collection('profesionales').get(),
    ]);
    return { usuarios: usSnap.size, negocios: negSnap.size, reservas: resSnap.size, servicios: srvSnap.size, profesionales: profSnap.size };
  } catch(e) { return { usuarios:0, negocios:0, reservas:0, servicios:0, profesionales:0 }; }
}

            <span style="font-size:12px;color:var(--text-muted)">Sidebar: <code style="color:var(--text-primary)">${configGlobal.color_sidebar||'#0d0e14'}</code></span>
          </div>
          ${logoUrl ? `<div style="margin-top:10px"><img src="${logoUrl}" style="max-height:36px;max-width:90px;border-radius:5px;border:1px solid rgba(255,255,255,0.1);background:#0d0e14;padding:3px;object-fit:contain"></div>` : ''}
        </div>

        <!-- FIRMA DEL DEV -->
        <div class="card" style="border-color:rgba(116,192,252,0.25);background:rgba(116,192,252,0.04)">
          <div class="card-header">
            <div class="card-title"><i class="ti ti-code" style="color:#74c0fc"></i> Firma del desarrollador</div>
            <button class="btn btn-ghost btn-sm" onclick="abrirFirmaDev()"><i class="ti ti-edit"></i> Editar</button>
          </div>
          ${devNombre
            ? `<div style="font-size:13px;color:var(--text-secondary)">
                 <span style="color:var(--text-muted)">Desarrollado por </span>
                 <strong style="color:var(--text-primary)">${limpiar(devNombre)}</strong>
                 ${devTel ? `<span style="color:var(--text-muted)"> · </span><i class="ti ti-brand-whatsapp" style="color:#69db7c;vertical-align:-2px"></i> ${limpiar(devTel)}` : ''}
               </div>`
            : `<div style="font-size:12px;color:var(--text-muted)">Sin firma configurada — hacé clic en Editar</div>`
          }
        </div>

      </div>
    </div>
  `;
}

// ── Guardar config general ───────────────────────────────
async function guardarConfigGeneral() {
  const nombre   = document.getElementById('cfg-nombre')?.value.trim();
  const timezone = document.getElementById('cfg-timezone')?.value;
  if (!nombre) { Toast.error('El nombre del sistema es obligatorio.'); return; }
  try {
    await db.collection('configuracion').doc('global').set({ sistema_nombre: nombre, timezone }, { merge: true });
    configGlobal.sistema_nombre = nombre;
    configGlobal.timezone       = timezone;
    Toast.success('Configuración guardada correctamente.');
  } catch(e) { Toast.error('Error: ' + e.message); }
}

// ── Cambiar contraseña ───────────────────────────────────
async function cambiarPassword() {
  const actual  = document.getElementById('pass-actual')?.value;
  const nueva   = document.getElementById('pass-nueva')?.value;
  const repetir = document.getElementById('pass-repetir')?.value;
  if (!actual || !nueva || !repetir) { Toast.error('Completá todos los campos.'); return; }
  if (nueva !== repetir) { Toast.error('Las contraseñas nuevas no coinciden.'); return; }
  if (nueva.length < 6)  { Toast.error('La contraseña debe tener al menos 6 caracteres.'); return; }
  try {
    const credential = firebase.auth.EmailAuthProvider.credential(usuarioActual.email, actual);
    await auth.currentUser.reauthenticateWithCredential(credential);
    await auth.currentUser.updatePassword(nueva);
    Toast.success('Contraseña cambiada correctamente.');
    Modal.close('modal-pass');
    ['pass-actual','pass-nueva','pass-repetir'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
  } catch(e) {
    if (e.code === 'auth/wrong-password') Toast.error('La contraseña actual es incorrecta.');
    else Toast.error('Error: ' + e.message);
  }
}

// ── Apariencia ───────────────────────────────────────────
function abrirApariencia() {
  const ac = configGlobal.color_acento  || '#4c6ef5';
  const sb = configGlobal.color_sidebar || '#0d0e14';
  document.getElementById('inp-color-acento').value  = ac;
  document.getElementById('txt-color-acento').value  = ac;
  document.getElementById('inp-color-sidebar').value = sb;
  document.getElementById('txt-color-sidebar').value = sb;
  actualizarPrevApariencia();
  const logoUrl = configGlobal.logo_url || '';
  document.getElementById('logo-preview-wrap').style.display = logoUrl ? 'flex' : 'none';
  if (logoUrl) document.getElementById('logo-preview-img').src = logoUrl;
  Modal.open('modal-apariencia');
}
async function guardarApariencia() {
  const colorAcento  = document.getElementById('txt-color-acento').value.trim();
  const colorSidebar = document.getElementById('txt-color-sidebar').value.trim();
  const hexReg = /^#[0-9a-fA-F]{6}$/;
  if (!hexReg.test(colorAcento))  { Toast.error('Color de acento inválido.'); return; }
  if (!hexReg.test(colorSidebar)) { Toast.error('Color de sidebar inválido.'); return; }
  let logoUrl = configGlobal.logo_url || '';
  const file = document.getElementById('inp-logo')?.files[0];
  if (file) {
    try {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('upload_preset', CLOUDINARY_PRESET);
      fd.append('folder', 'reservas/logos');
      const resp = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method:'POST', body:fd });
      const data = await resp.json();
      if (data.secure_url) logoUrl = data.secure_url;
      else throw new Error('Sin URL de Cloudinary');
    } catch(e) { Toast.error('Error subiendo logo: ' + e.message); return; }
  }
  try {
    await db.collection('configuracion').doc('global').set({ color_acento: colorAcento, color_sidebar: colorSidebar, logo_url: logoUrl }, { merge: true });
    configGlobal.color_acento  = colorAcento;
    configGlobal.color_sidebar = colorSidebar;
    configGlobal.logo_url      = logoUrl;
    Toast.success('Apariencia guardada.');
    Modal.close('modal-apariencia');
    await renderPagina();
  } catch(e) { Toast.error('Error: ' + e.message); }
}
async function resetearApariencia() {
  confirmar('¿Restaurar la apariencia original?', async () => {
    try {
      await db.collection('configuracion').doc('global').set({ color_acento:'#4c6ef5', color_sidebar:'#0d0e14', logo_url:'' }, { merge:true });
      Object.assign(configGlobal, { color_acento:'#4c6ef5', color_sidebar:'#0d0e14', logo_url:'' });
      Toast.success('Apariencia restaurada.');
      Modal.close('modal-apariencia');
      await renderPagina();
    } catch(e) { Toast.error('Error: ' + e.message); }
  });
}
function previewLogo(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('logo-preview-wrap').style.display = 'flex';
    document.getElementById('logo-preview-img').src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function borrarLogo() {
  document.getElementById('logo-preview-wrap').style.display = 'none';
  document.getElementById('logo-preview-img').src = '';
  document.getElementById('inp-logo').value = '';
  configGlobal.logo_url = '';
}
function sincColorPicker(cual) {
  const p = document.getElementById('inp-color-'+cual);
  const t = document.getElementById('txt-color-'+cual);
  if (t) t.value = p.value;
  actualizarPrevApariencia();
}
function sincColorTexto(cual) {
  const t = document.getElementById('txt-color-'+cual);
  const p = document.getElementById('inp-color-'+cual);
  if (/^#[0-9a-fA-F]{6}$/.test(t.value.trim())) p.value = t.value.trim();
  actualizarPrevApariencia();
}
function resetColor(cual, def) {
  document.getElementById('inp-color-'+cual).value = def;
  document.getElementById('txt-color-'+cual).value = def;
  actualizarPrevApariencia();
}
function actualizarPrevApariencia() {
  const ac = document.getElementById('inp-color-acento')?.value  || '#4c6ef5';
  const sb = document.getElementById('inp-color-sidebar')?.value || '#0d0e14';
  const bg  = document.getElementById('prev-sidebar-bg');
  const dot = document.getElementById('prev-accent-dot');
  const bar = document.getElementById('prev-bar1');
  if (bg)  bg.style.background  = sb;
  if (dot) dot.style.background = ac;
  if (bar) bar.style.background = ac + '40';
}

// ── Firma del dev ────────────────────────────────────────
function abrirFirmaDev() {
  document.getElementById('dev-nombre').value = configGlobal.dev_nombre || '';
  document.getElementById('dev-tel').value    = configGlobal.dev_tel    || '';
  actualizarPrevDev();
  Modal.open('modal-dev');
}
async function guardarFirmaDev() {
  const nombre = document.getElementById('dev-nombre').value.trim();
  const tel    = document.getElementById('dev-tel').value.trim();
  try {
    await db.collection('configuracion').doc('global').set({ dev_nombre: nombre, dev_tel: tel }, { merge:true });
    configGlobal.dev_nombre = nombre;
    configGlobal.dev_tel    = tel;
    Toast.success('Firma guardada.');
    Modal.close('modal-dev');
    await renderPagina();
  } catch(e) { Toast.error('Error: ' + e.message); }
}
function actualizarPrevDev() {
  const nombre = document.getElementById('dev-nombre')?.value || '';
  const tel    = document.getElementById('dev-tel')?.value    || '';
  const pn = document.getElementById('prev-dev-nombre');
  const pt = document.getElementById('prev-dev-tel');
  const pw = document.getElementById('prev-dev-tel-wrap');
  if (pn) pn.textContent = nombre || '—';
  if (pt) pt.textContent = tel;
  if (pw) pw.style.display = tel.trim() ? '' : 'none';
}

// ── Exportar JSON ────────────────────────────────────────
async function exportarReservas() {
  try {
    Toast.info('Preparando exportación...');
    const snap = await db.collection('reservas').get();
    const datos = [];
    snap.forEach(d => datos.push({ id: d.id, ...d.data() }));
    const blob = new Blob([JSON.stringify(datos, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `reservas_${new Date().toISOString().split('T')[0]}.json`;
    a.click(); URL.revokeObjectURL(url);
    Toast.success(`${datos.length} reservas exportadas.`);
  } catch(e) { Toast.error('Error: ' + e.message); }
}

// ── Limpiar notificaciones ───────────────────────────────
async function limpiarNotificaciones() {
  confirmar('¿Eliminar TODAS las notificaciones del sistema?', async () => {
    try {
      const snap = await db.collection('notificaciones').get();
      const batch = db.batch();
      snap.forEach(d => batch.delete(d.ref));
      await batch.commit();
      Toast.success('Notificaciones eliminadas.');
    } catch(e) { Toast.error('Error: ' + e.message); }
  });
}
</script>
