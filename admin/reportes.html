<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes — ReservaSystem</title>
  <link rel="stylesheet" href="../assets/css/dark.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
</head>
<body>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/helpers.js"></script>
  <script src="../assets/js/sidebar.js"></script>

  <script>
    let usuarioActual = null;
    let RESERVAS  = [];
    let NEGOCIOS  = [];
    let SERVICIOS = [];

    const DIAS_NOMBRES = {1:'Dom',2:'Lun',3:'Mar',4:'Mié',5:'Jue',6:'Vie',7:'Sáb'};
    const MESES_ES = {'01':'Ene','02':'Feb','03':'Mar','04':'Abr','05':'May','06':'Jun','07':'Jul','08':'Ago','09':'Sep','10':'Oct','11':'Nov','12':'Dic'};

    auth.onAuthStateChanged(async user => {
      if (!user) { window.location.href = '../index.html'; return; }
      const snap = await db.collection('usuarios').doc(user.uid).get();
      if (!snap.exists || !snap.data().activo) { auth.signOut(); window.location.href = '../index.html'; return; }
      usuarioActual = { uid: user.uid, ...snap.data() };

      renderLayoutAdmin({
        titulo:        'Reportes globales',
        subtitulo:     'Estadísticas de todos los negocios del sistema',
        nombreUsuario: usuarioActual.nombre,
        rolLabel:      usuarioActual.rol === 'superadmin' ? 'Super Administrador' : 'Gerente',
      });

      document.getElementById('page-content').innerHTML = `<div style="text-align:center;padding:60px"><span class="spinner"></span></div>`;

      // Cargar todo sin queries compuestas (evita el bug de índices de Firestore)
      const [negSnap, srvSnap, resSnap] = await Promise.all([
        db.collection('negocios').get(),
        db.collection('servicios').get(),
        (usuarioActual.rol === 'gerente' && usuarioActual.negocio_id)
          ? db.collection('reservas').where('negocio_id', '==', usuarioActual.negocio_id).get()
          : db.collection('reservas').get(),
      ]);

      NEGOCIOS  = negSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      SERVICIOS = srvSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      RESERVAS  = resSnap.docs.map(d => ({ docId: d.id, ...d.data() }));

      renderPagina();
    });

    function renderPagina() {
      const hoy     = new Date();
      const hoyStr  = hoy.toISOString().slice(0,10);
      const mesAct  = hoyStr.slice(0,7);
      const mesAntD = new Date(hoy.getFullYear(), hoy.getMonth() - 1, 1);
      const mesAnt  = mesAntD.toISOString().slice(0,7);

      const negociosMap = {};
      NEGOCIOS.forEach(n => negociosMap[n.id] = n);
      const negociosActivos = NEGOCIOS.filter(n => n.activo).length;

      const resMes    = RESERVAS.filter(r => (r.fecha||'').startsWith(mesAct));
      const resMesAnt = RESERVAS.filter(r => (r.fecha||'').startsWith(mesAnt));

      const totalReservas = resMes.length;
      const mesAntCnt     = resMesAnt.length;
      const varRes        = mesAntCnt > 0 ? Math.round(((totalReservas - mesAntCnt) / mesAntCnt) * 100) : 0;

      const ingresosMes = resMes.filter(r => ['confirmada','completada'].includes(r.estado) && r.pago_validado)
        .reduce((s,r) => s + (parseFloat(r.precio_cobrado)||0), 0);
      const ingresosAnt  = resMesAnt.filter(r => ['confirmada','completada'].includes(r.estado) && r.pago_validado)
        .reduce((s,r) => s + (parseFloat(r.precio_cobrado)||0), 0);
      const varIng        = ingresosAnt > 0 ? Math.round(((ingresosMes - ingresosAnt) / ingresosAnt) * 100) : 0;

      const pendienteCobrar = resMes.filter(r => ['pendiente','confirmada','pendiente_pago'].includes(r.estado) && !r.pago_validado)
        .reduce((s,r) => s + (parseFloat(r.precio_cobrado)||0), 0);

      const clientesUnicos = new Set(RESERVAS.map(r => r.cliente_email).filter(Boolean)).size;

      // Últimos 30 días
      const dias30 = [];
      for (let i = 29; i >= 0; i--) {
        const d = new Date(hoy); d.setDate(d.getDate() - i);
        dias30.push(d.toISOString().slice(0,10));
      }
      const cuentaPorDia = {};
      RESERVAS.forEach(r => { if (r.fecha) cuentaPorDia[r.fecha] = (cuentaPorDia[r.fecha]||0) + 1; });
      const ultimos30 = dias30.map(f => ({ fecha: f, total: cuentaPorDia[f] || 0 }));

      // Top negocios (este mes)
      const topNegocios = NEGOCIOS.map(n => {
        const resN = resMes.filter(r => r.negocio_id === n.id);
        return {
          nombre: n.nombre, color: n.color_primario || '#3B5BDB',
          total: resN.length,
          ingresos: resN.reduce((s,r) => s + (parseFloat(r.precio_cobrado)||0), 0),
        };
      }).sort((a,b) => b.total - a.total).slice(0,8);
      const maxNeg = Math.max(1, ...topNegocios.map(n => n.total));

      // Semáforo global (histórico)
      const estadosMap = {};
      RESERVAS.forEach(r => { estadosMap[r.estado] = (estadosMap[r.estado]||0) + 1; });
      const totalHist = Math.max(1, RESERVAS.length);

      // Reservas por mes (últimos 6 meses)
      const meses6 = [];
      for (let i = 5; i >= 0; i--) {
        const d = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
        meses6.push(d.toISOString().slice(0,7));
      }
      const porMes = meses6.map(m => {
        const resM = RESERVAS.filter(r => (r.fecha||'').startsWith(m));
        return { mes: m, total: resM.length };
      });
      const maxMes = Math.max(1, ...porMes.map(m => m.total));

      // Top servicios
      const serviciosMap = {}; SERVICIOS.forEach(s => serviciosMap[s.id] = s);
      const cuentaServicio = {};
      RESERVAS.forEach(r => { if (r.servicio_id) cuentaServicio[r.servicio_id] = (cuentaServicio[r.servicio_id]||0) + 1; });
      const topServicios = Object.entries(cuentaServicio)
        .map(([sid, total]) => {
          const s = serviciosMap[sid] || {};
          const neg = negociosMap[s.negocio_id] || {};
          return { nombre: s.nombre || '(eliminado)', color: s.color || '#3B5BDB', negocio: neg.nombre || '', total };
        })
        .sort((a,b) => b.total - a.total).slice(0,6);

      // Reservas por día de semana
      const diasMap = {};
      RESERVAS.forEach(r => {
        if (!r.fecha) return;
        const dia = new Date(r.fecha + 'T00:00:00').getDay() + 1; // 1=Dom...7=Sáb
        diasMap[dia] = (diasMap[dia]||0) + 1;
      });
      const maxDia = Math.max(1, ...Object.values(diasMap));

      const cont = document.getElementById('page-content');
      cont.innerHTML = `
      <!-- KPIs -->
      <div class="kpi-grid mb-6">
        <div class="kpi-card">
          <div class="kpi-icon indigo"><i class="ti ti-calendar-check"></i></div>
          <div>
            <div class="kpi-value">${totalReservas}</div>
            <div class="kpi-label">Reservas este mes</div>
            <div class="kpi-trend ${varRes>=0?'up':'down'}" style="font-size:11px;color:${varRes>=0?'#69db7c':'#ff8787'}">${varRes>=0?'↑':'↓'} ${Math.abs(varRes)}% vs mes ant.</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon green"><i class="ti ti-currency-dollar"></i></div>
          <div>
            <div class="kpi-value">$${(ingresosMes-0).toLocaleString('es-AR')}</div>
            ${pendienteCobrar>0 ? `<div style="font-size:11px;color:#ffd43b">+$${pendienteCobrar.toLocaleString('es-AR')} por cobrar</div>` : ''}
            <div class="kpi-label">Ingresos este mes</div>
            <div class="kpi-trend" style="font-size:11px;color:${varIng>=0?'#69db7c':'#ff8787'}">${varIng>=0?'↑':'↓'} ${Math.abs(varIng)}% vs mes ant.</div>
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon cyan"><i class="ti ti-building-store"></i></div>
          <div><div class="kpi-value">${negociosActivos}</div><div class="kpi-label">Negocios activos</div></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon purple"><i class="ti ti-users"></i></div>
          <div><div class="kpi-value">${clientesUnicos}</div><div class="kpi-label">Clientes únicos</div></div>
        </div>
      </div>

      <!-- Tendencia 30 días -->
      <div class="card mb-6">
        <div class="card-header"><div class="card-title"><i class="ti ti-chart-bar"></i> Tendencia global — últimos 30 días</div></div>
        ${ultimos30.every(d => d.total === 0) ? `
          <div style="text-align:center;padding:30px;color:var(--text-muted)">Sin datos en los últimos 30 días.</div>` : `
          <div style="overflow-x:auto">
            <svg viewBox="0 0 700 160" style="width:100%;height:160px">
              ${ultimos30.map((r,i) => {
                const max30 = Math.max(1, ...ultimos30.map(x=>x.total));
                const bw = Math.max(8, Math.min(20, Math.floor(680/ultimos30.length) - 3));
                const x = 10 + i * (680/ultimos30.length);
                const h = Math.max(3, Math.round((r.total/max30)*110));
                const y = 130 - h;
                const col = r.total >= max30*0.8 ? '#2f9e44' : (r.total >= max30*0.4 ? '#3B5BDB' : '#1971C2');
                const d = new Date(r.fecha+'T00:00:00');
                return `<rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="3" fill="${col}" opacity="0.85"/>
                  ${r.total>0 ? `<text x="${x+bw/2}" y="${y-4}" text-anchor="middle" font-size="9" fill="#9399a6">${r.total}</text>` : ''}
                  ${i%5===0 ? `<text x="${x+bw/2}" y="148" text-anchor="middle" font-size="9" fill="#565d6e">${d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'})}</text>` : ''}`;
              }).join('')}
              <line x1="10" y1="130" x2="690" y2="130" stroke="#22243a" stroke-width="1"/>
            </svg>
          </div>`}
      </div>

      <!-- Top negocios + Semáforo + Día de semana -->
      <div class="grid-2 mb-6">
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="ti ti-trophy"></i> Ranking de negocios</div>
            <span style="font-size:11px;color:var(--text-muted)">Este mes</span>
          </div>
          ${!topNegocios.length ? `<div style="text-align:center;padding:20px;color:var(--text-muted)">Sin datos</div>` :
            topNegocios.map((n,i) => {
              const pct = Math.round((n.total/maxNeg)*100);
              const medallas = ['🥇','🥈','🥉'];
              return `
              <div style="margin-bottom:14px">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
                  <div style="display:flex;align-items:center;gap:8px">
                    <span style="font-size:16px">${medallas[i]||'  '}</span>
                    <div style="width:10px;height:10px;border-radius:3px;background:${n.color};flex-shrink:0"></div>
                    <span style="font-size:13px;font-weight:600;color:var(--text-primary)">${limpiar(n.nombre)}</span>
                  </div>
                  <div style="text-align:right;font-size:12px">
                    <span style="font-weight:700;color:var(--text-primary)">${n.total}</span>
                    <span style="color:var(--text-muted)"> res.</span>
                    <span style="color:var(--indigo-300);margin-left:6px">$${n.ingresos.toLocaleString('es-AR')}</span>
                  </div>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${n.color}"></div></div>
              </div>`;
            }).join('')}
        </div>

        <div class="card">
          <div class="card-header"><div class="card-title"><i class="ti ti-traffic-cone"></i> Semáforo global de reservas</div></div>
          ${[
            ['pendiente','Pendientes','amber','ti-clock'],
            ['confirmada','Confirmadas','green','ti-check'],
            ['completada','Completadas','indigo','ti-circle-check'],
            ['cancelada','Canceladas','red','ti-x'],
            ['no_asistio','No asistió','red','ti-user-off'],
          ].map(([est,label,bar,ico]) => {
            const cant = estadosMap[est] || 0;
            const pct  = Math.round((cant/totalHist)*100);
            return `
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
              <span class="badge-estado estado-${est}" style="min-width:110px;justify-content:center"><i class="ti ${ico}"></i>${label}</span>
              <div style="flex:1"><div class="progress-bar"><div class="progress-fill ${bar==='amber'?'amber':bar==='red'?'red':bar==='green'?'green':''}" style="width:${pct}%"></div></div></div>
              <span style="font-weight:700;color:var(--text-primary);min-width:28px;text-align:right">${cant}</span>
              <span style="font-size:11px;color:var(--text-muted);min-width:32px">${pct}%</span>
            </div>`;
          }).join('')}
          <div class="divider"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px">
            <div style="text-align:center;padding:10px;background:var(--bg-surface);border-radius:var(--radius-md)">
              <div style="font-size:22px;font-weight:800;color:var(--indigo-400)">${RESERVAS.length}</div>
              <div style="font-size:11px;color:var(--text-muted)">Total histórico</div>
            </div>
            <div style="text-align:center;padding:10px;background:var(--bg-surface);border-radius:var(--radius-md)">
              <div style="font-size:22px;font-weight:800;color:#69db7c">${totalReservas>0 ? Math.round(((estadosMap['completada']||0)/Math.max(totalReservas,1))*100) : 0}%</div>
              <div style="font-size:11px;color:var(--text-muted)">Tasa completadas</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><div class="card-title"><i class="ti ti-chart-bar"></i> Actividad por día de semana</div></div>
          ${[2,3,4,5,6,7].map(d => {
            const cant = diasMap[d] || 0;
            const pct  = Math.round((cant/maxDia)*100);
            return `
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
              <div style="width:34px;font-size:12px;font-weight:600;color:var(--text-muted)">${DIAS_NOMBRES[d]}</div>
              <div style="flex:1"><div class="progress-bar" style="height:8px"><div class="progress-fill" style="width:${pct}%;background:var(--indigo-500)"></div></div></div>
              <span style="font-size:12px;font-weight:700;min-width:24px;text-align:right">${cant}</span>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Reservas por mes -->
      <div class="card mb-6">
        <div class="card-header"><div class="card-title"><i class="ti ti-chart-line"></i> Reservas e ingresos — últimos 6 meses</div></div>
        <div style="display:flex;gap:6px;align-items:flex-end;height:120px;margin-bottom:8px">
          ${porMes.map(m => {
            const h = Math.round((m.total/maxMes)*100);
            const label = MESES_ES[m.mes.slice(5,7)] || m.mes;
            return `
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
              <span style="font-size:10px;color:var(--text-muted);font-weight:600">${m.total}</span>
              <div style="width:100%;background:var(--indigo-500);border-radius:4px 4px 0 0;height:${Math.max(h,5)}%;min-height:6px;transition:height .3s"></div>
              <span style="font-size:11px;color:var(--text-muted)">${label}</span>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Top servicios -->
      <div class="card">
        <div class="card-header"><div class="card-title"><i class="ti ti-scissors"></i> Servicios más solicitados</div></div>
        <div class="table-wrap">
          <table class="tabla">
            <thead><tr><th>#</th><th>Servicio</th><th>Negocio</th><th>Reservas</th></tr></thead>
            <tbody>
              ${!topServicios.length ? `<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-muted)">Sin datos</td></tr>` :
                topServicios.map((s,i) => `
                <tr>
                  <td style="font-weight:700;color:var(--text-muted)">${i+1}</td>
                  <td><div style="display:flex;align-items:center;gap:8px">
                    <div style="width:10px;height:10px;border-radius:50%;background:${s.color}"></div>
                    <span style="font-weight:600">${limpiar(s.nombre)}</span>
                  </div></td>
                  <td style="color:var(--text-muted);font-size:13px">${limpiar(s.negocio)}</td>
                  <td><span class="badge-info">${s.total}</span></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
    }
  </script>
</body>
</html>
