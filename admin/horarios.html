<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horarios — ReservaSystem</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="../assets/css/dark.css">
<style>
/* ── Tabla horarios ── */
.horario-table { width:100%; border-collapse:collapse; }
.horario-table th { background:var(--bg-card); color:var(--text-muted); font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; padding:10px 14px; text-align:left; border-bottom:1px solid var(--border); }
.horario-table td { padding:10px 14px; border-bottom:1px solid var(--border); vertical-align:middle; color:var(--text-primary); font-size:14px; }
.horario-table tr:last-child td { border-bottom:none; }
.horario-table tr:hover td { background:var(--bg-hover); }
.dia-label { font-weight:600; display:flex; align-items:center; gap:8px; }
.dia-badge { width:8px; height:8px; border-radius:50%; background:var(--color-primary); flex-shrink:0; }
.dia-badge.inactivo { background:var(--text-muted); }
input[type=time] { background:var(--bg-input); border:1px solid var(--border); border-radius:8px; color:var(--text-primary); padding:6px 10px; font-size:13px; width:120px; }
input[type=time]:focus { outline:none; border-color:var(--color-primary); }
.toggle-dia { position:relative; display:inline-block; width:40px; height:22px; flex-shrink:0; }
.toggle-dia input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; inset:0; background:#3a3a4a; border-radius:22px; cursor:pointer; transition:.25s; }
.toggle-slider:before { content:''; position:absolute; width:16px; height:16px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.25s; }
.toggle-dia input:checked + .toggle-slider { background:var(--color-primary); }
.toggle-dia input:checked + .toggle-slider:before { transform:translateX(18px); }
.presets-bar { display:flex; gap:8px; flex-wrap:wrap; }
.preset-btn { background:var(--bg-input); border:1px solid var(--border); border-radius:8px; color:var(--text-secondary); font-size:12px; padding:5px 12px; cursor:pointer; transition:all .2s; }
.preset-btn:hover { background:var(--color-primary); color:#fff; border-color:var(--color-primary); }
.prof-select-wrap { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
.prof-select-wrap label { font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; }
.prof-select-wrap select { background:var(--bg-input); border:1px solid var(--border); border-radius:8px; color:var(--text-primary); padding:8px 14px; font-size:14px; min-width:240px; cursor:pointer; }
.prof-select-wrap select:focus { outline:none; border-color:var(--color-primary); }
.horario-empty { text-align:center; padding:60px 20px; color:var(--text-muted); }
.horario-empty i { font-size:48px; display:block; margin-bottom:12px; opacity:.35; }
/* Bloqueos */
.bloqueo-card { background:var(--bg-input); border:1px solid var(--border); border-radius:10px; padding:14px 16px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.bloqueo-info { flex:1; min-width:0; }
.bloqueo-titulo { font-size:14px; font-weight:600; color:var(--text-primary); margin-bottom:4px; }
.bloqueo-det { font-size:12px; color:var(--text-muted); display:flex; flex-wrap:wrap; gap:12px; margin-top:4px; }
.bloqueo-det span { display:flex; align-items:center; gap:4px; }
.scope-negocio { background:rgba(99,102,241,.18); color:#818cf8; padding:1px 7px; border-radius:20px; font-size:11px; font-weight:600; }
.scope-prof { background:rgba(245,158,11,.18); color:#fbbf24; padding:1px 7px; border-radius:20px; font-size:11px; font-weight:600; }
</style>
</head>
<body>

<!-- Modal bloqueo -->
<div class="modal-overlay" id="modal-bloqueo">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <div class="modal-title" id="modal-bloqueo-titulo">Nuevo bloqueo</div>
      <button class="modal-close" onclick="Modal.close('modal-bloqueo')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="bloqueo-id">
      <div class="form-group">
        <label class="form-label">Negocio <span style="color:#ff8787">*</span></label>
        <select id="bloqueo-negocio" class="form-control" onchange="cargarProfsBloqueo()">
          <option value="">Seleccionar negocio...</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Profesional (opcional)</label>
        <select id="bloqueo-prof" class="form-control">
          <option value="">— Todo el negocio —</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label">Fecha y hora inicio <span style="color:#ff8787">*</span></label>
          <input type="datetime-local" id="bloqueo-inicio" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Fecha y hora fin <span style="color:#ff8787">*</span></label>
          <input type="datetime-local" id="bloqueo-fin" class="form-control">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Motivo</label>
        <input type="text" id="bloqueo-motivo" class="form-control" placeholder="Ej: Feriado, Vacaciones...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('modal-bloqueo')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarBloqueo()"><i class="ti ti-device-floppy"></i> Guardar</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="../assets/js/firebase-config.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/helpers.js"></script>
<script src="../assets/js/sidebar.js"></script>
<script>
const DIAS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

let usuarioActual = null;
let rolActual = null;
let negocioActual = null;
let negocios = {};
let todosLosProfesionales = [];
let profsFiltradas = [];
let profSeleccionada = null;
let horarioData = {};
let bloqueos = [];

// ── AUTH ─────────────────────────────────────────────────
auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = '../index.html'; return; }
  const snap = await db.collection('usuarios').doc(user.uid).get();
  if (!snap.exists || !snap.data().activo) { auth.signOut(); window.location.href = '../index.html'; return; }
  usuarioActual = { uid: user.uid, ...snap.data() };
  rolActual = usuarioActual.rol;
  if (rolActual === 'gerente') negocioActual = usuarioActual.negocio_id;

  renderLayoutAdmin({
    titulo: 'Horarios',
    subtitulo: 'Configurá la disponibilidad de cada profesional',
    nombreUsuario: usuarioActual.nombre,
    rolLabel: rolActual === 'superadmin' ? 'Super Administrador' : 'Gerente',
  });

  const cont = document.getElementById('page-content');
  cont.innerHTML = buildHTML();

  await cargarNegocios();
  initUI();
});

// ── HTML ──────────────────────────────────────────────────
function buildHTML() {
  return `
  <!-- Layout dos columnas igual que XAMPP -->
  <div style="display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start">

    <!-- Columna izquierda: horarios semanales -->
    <div class="card">
      <div class="card-header">
        <div class="card-title"><i class="ti ti-clock" style="color:var(--color-primary)"></i> Horarios semanales</div>
      </div>
      <div class="card-body">

        <!-- Selector negocio (solo superadmin) -->
        <div id="wrap-negocio" style="display:none;margin-bottom:16px">
          <div class="prof-select-wrap">
            <label>Negocio</label>
            <select id="sel-negocio" onchange="onNegocioChange()">
              <option value="">— Seleccioná un negocio —</option>
            </select>
          </div>
        </div>

        <!-- Selector profesional -->
        <div class="prof-select-wrap">
          <label>Seleccioná un profesional</label>
          <select id="sel-prof" onchange="onProfChange()">
            <option value="">— Elegí un profesional —</option>
          </select>
          <button class="btn btn-primary btn-sm" onclick="guardarHorarios()" id="btn-guardar" style="display:none">
            <i class="ti ti-device-floppy"></i> Guardar horarios
          </button>
        </div>

        <!-- Presets (se muestran cuando hay prof seleccionada) -->
        <div id="wrap-presets" style="display:none;margin-bottom:16px">
          <div class="presets-bar">
            <button class="preset-btn" onclick="aplicarPreset('lun-vie')">Lun–Vie</button>
            <button class="preset-btn" onclick="aplicarPreset('lun-sab')">Lun–Sáb</button>
            <button class="preset-btn" onclick="aplicarPreset('todos')">Todos</button>
            <button class="preset-btn" onclick="aplicarPreset('ninguno')">Ninguno</button>
            <button class="preset-btn" onclick="aplicarPreset('manana')">☀ Mañana 9–13</button>
            <button class="preset-btn" onclick="aplicarPreset('tarde')">🌙 Tarde 14–20</button>
          </div>
        </div>

        <!-- Tabla de días -->
        <div id="horario-panel" style="display:none">
          <table class="horario-table">
            <thead>
              <tr>
                <th style="width:130px">Día</th>
                <th style="width:70px">Activo</th>
                <th>Hora inicio</th>
                <th>Hora fin</th>
                <th style="width:90px">Copiar</th>
              </tr>
            </thead>
            <tbody id="horario-tbody"></tbody>
          </table>
        </div>

        <!-- Estado vacío -->
        <div id="horario-empty" class="horario-empty">
          <i class="ti ti-clock"></i>
          <p>Seleccioná un profesional para configurar sus horarios.</p>
        </div>

      </div>
    </div>

    <!-- Columna derecha: bloqueos -->
    <div class="card">
      <div class="card-header" style="display:flex;align-items:center;justify-content:space-between">
        <div class="card-title"><i class="ti ti-calendar-off"></i> Bloqueos</div>
        <button class="btn btn-primary btn-sm" onclick="abrirModalBloqueo()">
          <i class="ti ti-plus"></i> Nuevo
        </button>
      </div>
      <div class="card-body" style="padding:0">
        <div id="bloqueos-lista" style="display:flex;flex-direction:column;gap:10px;padding:16px">
          <p style="text-align:center;color:var(--text-muted);font-size:13px;padding:20px 0">Sin bloqueos registrados.</p>
        </div>
      </div>
    </div>

  </div>`;
}

// ── INIT ──────────────────────────────────────────────────
async function cargarNegocios() {
  const snap = await db.collection('negocios').where('activo','==',true).get();
  snap.forEach(d => { negocios[d.id] = { id:d.id, ...d.data() }; });
}

function initUI() {
  const selNeg = document.getElementById('sel-negocio');
  const wrapNeg = document.getElementById('wrap-negocio');

  if (rolActual === 'superadmin') {
    wrapNeg.style.display = '';
    Object.values(negocios).sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(n => {
      selNeg.innerHTML += `<option value="${n.id}">${n.nombre}</option>`;
    });
    // Select negocio del modal
    const selMB = document.getElementById('bloqueo-negocio');
    Object.values(negocios).sort((a,b)=>a.nombre.localeCompare(b.nombre)).forEach(n => {
      selMB.innerHTML += `<option value="${n.id}">${n.nombre}</option>`;
    });
  } else {
    // Gerente: pre-cargar su negocio
    const neg = negocios[negocioActual];
    const selMB = document.getElementById('bloqueo-negocio');
    if (neg) selMB.innerHTML += `<option value="${neg.id}">${neg.nombre}</option>`;
    cargarProfesionales(negocioActual);
  }
  cargarBloqueos();
}

// ── PROFESIONALES ─────────────────────────────────────────
async function onNegocioChange() {
  const negId = document.getElementById('sel-negocio').value;
  document.getElementById('sel-prof').innerHTML = '<option value="">— Elegí un profesional —</option>';
  profSeleccionada = null;
  horarioData = {};
  document.getElementById('horario-panel').style.display = 'none';
  document.getElementById('horario-empty').style.display = '';
  document.getElementById('wrap-presets').style.display = 'none';
  document.getElementById('btn-guardar').style.display = 'none';
  if (!negId) return;
  await cargarProfesionales(negId);
}

async function cargarProfesionales(negId) {
  if (!negId) return;
  const snap = await db.collection('profesionales').where('negocio_id','==',negId).where('activo','==',true).get();
  profsFiltradas = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  const sel = document.getElementById('sel-prof');
  sel.innerHTML = '<option value="">— Elegí un profesional —</option>';
  profsFiltradas.forEach(p => {
    sel.innerHTML += `<option value="${p.id}">${p.nombre}</option>`;
  });
}

async function onProfChange() {
  const profId = document.getElementById('sel-prof').value;
  if (!profId) {
    profSeleccionada = null;
    document.getElementById('horario-panel').style.display = 'none';
    document.getElementById('horario-empty').style.display = '';
    document.getElementById('wrap-presets').style.display = 'none';
    document.getElementById('btn-guardar').style.display = 'none';
    return;
  }
  profSeleccionada = profsFiltradas.find(p => p.id === profId);
  await cargarHorario();
}

// ── HORARIO ───────────────────────────────────────────────
async function cargarHorario() {
  if (!profSeleccionada) return;
  horarioData = {};
  const snap = await db.collection('horarios').where('profesional_id','==',profSeleccionada.id).get();
  snap.forEach(d => {
    const data = d.data();
    horarioData[data.dia_semana] = { docId: d.id, ...data };
  });
  renderTabla();
  document.getElementById('horario-panel').style.display = '';
  document.getElementById('horario-empty').style.display = 'none';
  document.getElementById('wrap-presets').style.display = '';
  document.getElementById('btn-guardar').style.display = '';
}

function renderTabla() {
  const tbody = document.getElementById('horario-tbody');
  tbody.innerHTML = '';
  for (let d = 0; d < 7; d++) {
    const h = horarioData[d] || { activo: false, hora_inicio: '09:00', hora_fin: '18:00' };
    const activo = h.activo ?? false;
    tbody.innerHTML += `
    <tr>
      <td><div class="dia-label">
        <span class="dia-badge ${activo?'':'inactivo'}" id="badge-${d}"></span>
        <strong>${DIAS[d]}</strong>
      </div></td>
      <td><label class="toggle-dia">
        <input type="checkbox" id="activo-${d}" ${activo?'checked':''} onchange="onToggle(${d})">
        <span class="toggle-slider"></span>
      </label></td>
      <td><input type="time" id="inicio-${d}" value="${h.hora_inicio||'09:00'}" ${!activo?'disabled':''}></td>
      <td><input type="time" id="fin-${d}" value="${h.hora_fin||'18:00'}" ${!activo?'disabled':''}></td>
      <td><button class="btn btn-ghost btn-sm" onclick="copiarDia(${d})" title="Copiar a días activos"><i class="ti ti-copy"></i></button></td>
    </tr>`;
  }
}

function onToggle(d) {
  const ok = document.getElementById('activo-'+d).checked;
  document.getElementById('inicio-'+d).disabled = !ok;
  document.getElementById('fin-'+d).disabled = !ok;
  document.getElementById('badge-'+d).classList.toggle('inactivo', !ok);
}

function copiarDia(d) {
  const ini = document.getElementById('inicio-'+d).value;
  const fin = document.getElementById('fin-'+d).value;
  for (let i = 0; i < 7; i++) {
    if (i === d) continue;
    if (document.getElementById('activo-'+i).checked) {
      document.getElementById('inicio-'+i).value = ini;
      document.getElementById('fin-'+i).value = fin;
    }
  }
  Toast.info('Horario copiado a los días activos');
}

function aplicarPreset(p) {
  const mapa = {
    'lun-vie': [false,true,true,true,true,true,false],
    'lun-sab': [false,true,true,true,true,true,true],
    'todos':   [true,true,true,true,true,true,true],
    'ninguno': [false,false,false,false,false,false,false],
  };
  if (p === 'manana' || p === 'tarde') {
    const ini = p==='manana'?'09:00':'14:00', fin = p==='manana'?'13:00':'20:00';
    for (let d=0;d<7;d++) {
      if (document.getElementById('activo-'+d).checked) {
        document.getElementById('inicio-'+d).value = ini;
        document.getElementById('fin-'+d).value = fin;
      }
    }
    Toast.info('Horario aplicado a días activos');
    return;
  }
  mapa[p].forEach((v,d) => {
    document.getElementById('activo-'+d).checked = v;
    onToggle(d);
  });
  Toast.info('Preset aplicado');
}

async function guardarHorarios() {
  if (!profSeleccionada) return;
  for (let d=0;d<7;d++) {
    const activo = document.getElementById('activo-'+d).checked;
    const ini = document.getElementById('inicio-'+d).value;
    const fin = document.getElementById('fin-'+d).value;
    if (activo && ini >= fin) { Toast.error(`${DIAS[d]}: hora inicio debe ser menor a hora fin`); return; }
  }
  try {
    const batch = db.batch();
    for (let d=0;d<7;d++) {
      const activo = document.getElementById('activo-'+d).checked;
      const hora_inicio = document.getElementById('inicio-'+d).value;
      const hora_fin = document.getElementById('fin-'+d).value;
      const existing = horarioData[d];
      if (existing?.docId) {
        batch.update(db.collection('horarios').doc(existing.docId), { activo, hora_inicio, hora_fin });
      } else {
        batch.set(db.collection('horarios').doc(), {
          profesional_id: profSeleccionada.id,
          negocio_id: profSeleccionada.negocio_id,
          dia_semana: d, activo, hora_inicio, hora_fin
        });
      }
    }
    await batch.commit();
    Toast.success('Horarios guardados correctamente');
    await cargarHorario();
  } catch(e) { Toast.error('Error: ' + e.message); }
}

// ── BLOQUEOS ──────────────────────────────────────────────
async function cargarBloqueos() {
  let q = db.collection('bloqueos').orderBy('fecha_inicio','desc');
  if (negocioActual) q = q.where('negocio_id','==',negocioActual);
  try {
    const snap = await q.get();
    bloqueos = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  } catch(e) { bloqueos = []; }
  renderBloqueos();
}

function renderBloqueos() {
  const lista = document.getElementById('bloqueos-lista');
  if (!bloqueos.length) {
    lista.innerHTML = `<p style="text-align:center;color:var(--text-muted);font-size:13px;padding:20px 0">Sin bloqueos registrados.</p>`;
    return;
  }
  const now = new Date();
  lista.innerHTML = bloqueos.map(b => {
    const neg = negocios[b.negocio_id];
    const ini = b.fecha_inicio?.toDate ? b.fecha_inicio.toDate() : new Date(b.fecha_inicio);
    const fin = b.fecha_fin?.toDate ? b.fecha_fin.toDate() : new Date(b.fecha_fin);
    const pasado = fin < now;
    const fmt = d => d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' + d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    return `<div class="bloqueo-card" style="${pasado?'opacity:.5':''}">
      <div class="bloqueo-info">
        <div class="bloqueo-titulo">${b.motivo||'Sin motivo'}</div>
        <div class="bloqueo-det">
          <span><i class="ti ti-calendar"></i> ${fmt(ini)}</span>
          <span><i class="ti ti-arrow-right"></i> ${fmt(fin)}</span>
          ${neg?`<span><i class="ti ti-building"></i> ${neg.nombre}</span>`:''}
          ${b.profesional_id
            ? `<span class="scope-prof"><i class="ti ti-user"></i> Profesional</span>`
            : `<span class="scope-negocio"><i class="ti ti-building"></i> Todo el negocio</span>`}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
        <button class="btn btn-ghost btn-sm" onclick="editarBloqueo('${b.id}')"><i class="ti ti-pencil"></i></button>
        <button class="btn btn-danger btn-sm" onclick="eliminarBloqueo('${b.id}','${(b.motivo||'bloqueo').replace(/'/g,'&apos;')}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

async function cargarProfsBloqueo() {
  const negId = document.getElementById('bloqueo-negocio').value;
  const sel = document.getElementById('bloqueo-prof');
  sel.innerHTML = '<option value="">— Todo el negocio —</option>';
  if (!negId) return;
  const snap = await db.collection('profesionales').where('negocio_id','==',negId).where('activo','==',true).get();
  snap.forEach(d => { sel.innerHTML += `<option value="${d.id}">${d.data().nombre}</option>`; });
}

function abrirModalBloqueo() {
  document.getElementById('bloqueo-id').value = '';
  document.getElementById('bloqueo-negocio').value = negocioActual || '';
  document.getElementById('bloqueo-prof').innerHTML = '<option value="">— Todo el negocio —</option>';
  document.getElementById('bloqueo-inicio').value = '';
  document.getElementById('bloqueo-fin').value = '';
  document.getElementById('bloqueo-motivo').value = '';
  document.getElementById('modal-bloqueo-titulo').textContent = 'Nuevo bloqueo';
  if (negocioActual) cargarProfsBloqueo();
  Modal.open('modal-bloqueo');
}

async function editarBloqueo(id) {
  const snap = await db.collection('bloqueos').doc(id).get();
  if (!snap.exists) return;
  const b = snap.data();
  document.getElementById('bloqueo-id').value = id;
  document.getElementById('bloqueo-negocio').value = b.negocio_id||'';
  await cargarProfsBloqueo();
  document.getElementById('bloqueo-prof').value = b.profesional_id||'';
  const toLocal = ts => { const d = ts?.toDate?ts.toDate():new Date(ts); return d.toISOString().slice(0,16); };
  document.getElementById('bloqueo-inicio').value = toLocal(b.fecha_inicio);
  document.getElementById('bloqueo-fin').value = toLocal(b.fecha_fin);
  document.getElementById('bloqueo-motivo').value = b.motivo||'';
  document.getElementById('modal-bloqueo-titulo').textContent = 'Editar bloqueo';
  Modal.open('modal-bloqueo');
}

async function guardarBloqueo() {
  const id = document.getElementById('bloqueo-id').value;
  const negocio_id = document.getElementById('bloqueo-negocio').value;
  const profesional_id = document.getElementById('bloqueo-prof').value;
  const fecha_inicio = document.getElementById('bloqueo-inicio').value;
  const fecha_fin = document.getElementById('bloqueo-fin').value;
  const motivo = document.getElementById('bloqueo-motivo').value.trim();
  if (!negocio_id) { Toast.error('Seleccioná un negocio'); return; }
  if (!fecha_inicio || !fecha_fin) { Toast.error('Completá las fechas'); return; }
  if (fecha_inicio >= fecha_fin) { Toast.error('Inicio debe ser menor a fin'); return; }
  try {
    const data = { negocio_id, profesional_id: profesional_id||null, fecha_inicio: new Date(fecha_inicio), fecha_fin: new Date(fecha_fin), motivo: motivo||null };
    if (id) { await db.collection('bloqueos').doc(id).update(data); Toast.success('Bloqueo actualizado'); }
    else { data.creado_en = new Date(); await db.collection('bloqueos').add(data); Toast.success('Bloqueo creado'); }
    Modal.close('modal-bloqueo');
    cargarBloqueos();
  } catch(e) { Toast.error('Error: ' + e.message); }
}

async function eliminarBloqueo(id, motivo) {
  confirmar(`¿Eliminar "${motivo}"?`, async () => {
    await db.collection('bloqueos').doc(id).delete();
    Toast.success('Bloqueo eliminado');
    cargarBloqueos();
  });
}
</script>
