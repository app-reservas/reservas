<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0d0e14">
  <title>Reservar turno</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/img/favicon-16x16.png">
  <link rel="shortcut icon" href="../assets/img/favicon.ico">
  <link rel="apple-touch-icon" href="../assets/img/apple-touch-icon.png">
  <meta name="color-scheme" content="dark">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#0d0e14!important;color:#e8eaed!important;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;-webkit-text-size-adjust:100%}
    :root{--c:#3B5BDB;--c-dim:#3B5BDB33;--c-mid:#3B5BDB88;--bg:#0d0e14;--bg2:#13141d;--bg3:#1a1b27;--border:rgba(255,255,255,0.08);--text:#e8eaed;--muted:#9399a6;--faint:#565d6e}
    body{background:var(--bg);background-image:radial-gradient(ellipse at 20% 0%,var(--c-dim) 0%,transparent 55%),radial-gradient(ellipse at 80% 90%,var(--c-dim) 0%,transparent 50%);min-height:100vh}
    .wrap{max-width:540px;margin:0 auto;padding:20px 16px 70px}
    .neg-header{text-align:center;margin-bottom:24px}
    .neg-logo{width:68px;height:68px;border-radius:18px;background:var(--c-dim);border:2px solid var(--c-mid);display:inline-flex;align-items:center;justify-content:center;font-size:30px;color:var(--c);margin-bottom:14px;overflow:hidden}
    .neg-logo img{width:68px;height:68px;object-fit:cover}
    .neg-nombre{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
    .neg-desc{font-size:13px;color:var(--muted)}
    .steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:24px;flex-wrap:nowrap;overflow:hidden}
    .step{display:flex;flex-direction:column;align-items:center;gap:3px}
    .step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--bg2);border:2px solid var(--border);color:var(--muted);transition:all .3s}
    .step.active .step-num{background:var(--c);border-color:var(--c);color:#fff}
    .step.done .step-num{background:#2f9e44;border-color:#2f9e44;color:#fff}
    .step-label{font-size:8px;color:var(--faint);font-weight:600;text-transform:uppercase}
    .step.active .step-label{color:var(--c)}
    .step.done .step-label{color:#2f9e44}
    .step-line{height:2px;width:18px;background:var(--border);margin:0 2px;position:relative;top:-8px;flex-shrink:0}
    .card-pub{background:rgba(26,27,39,.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;margin-bottom:14px}
    .card-title-pub{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:8px}
    .card-title-pub i{color:var(--c)}
    .card-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
    .srv-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:380px){.srv-grid{grid-template-columns:1fr}}
    .srv-card{background:var(--bg2);border:2px solid var(--border);border-radius:12px;padding:14px 12px;cursor:pointer;transition:all .2s;text-align:center}
    .srv-card:hover,.srv-card.sel{border-color:var(--c);background:var(--c-dim)}
    .srv-img{width:100%;height:70px;object-fit:cover;border-radius:8px;margin-bottom:8px}
    .srv-ico{font-size:26px;margin-bottom:8px}
    .srv-nom{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
    .srv-desc{font-size:11px;color:var(--muted);margin-bottom:4px;line-height:1.4}
    .srv-dur{font-size:11px;color:var(--muted)}
    .srv-pre{font-size:15px;font-weight:800;color:var(--c);margin-top:6px}
    .srv-anticipo{font-size:10px;color:#ffd43b;margin-top:2px}
    .prof-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
    .prof-card{background:var(--bg2);border:2px solid var(--border);border-radius:12px;padding:12px 8px;cursor:pointer;transition:all .2s;text-align:center}
    .prof-card:hover,.prof-card.sel{border-color:var(--c);background:var(--c-dim)}
    .prof-card.oculto{display:none}
    .prof-av{width:42px;height:42px;border-radius:50%;background:var(--c-dim);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--c);margin:0 auto 8px;overflow:hidden}
    .prof-av img{width:42px;height:42px;object-fit:cover}
    .prof-nom{font-size:11px;font-weight:700;color:var(--text)}
    .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .cal-mes{font-size:14px;font-weight:700;color:var(--text)}
    .cal-btn{width:30px;height:30px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
    .cal-btn:hover{background:var(--bg3);color:var(--text)}
    .cal-dias-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
    .cal-dh{text-align:center;font-size:10px;font-weight:700;color:var(--faint);padding:4px 0}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
    .cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text);transition:all .15s;-webkit-tap-highlight-color:transparent}
    .cal-day:hover:not(.dis):not(.pas){border-color:var(--c);color:var(--c)}
    .cal-day.hoy{border-color:var(--c-mid);color:var(--c);font-weight:800}
    .cal-day.sel{background:var(--c);color:#fff!important;border-color:var(--c)}
    .cal-day.dis,.cal-day.pas{opacity:.2;cursor:not-allowed;pointer-events:none}
    .slots-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
    @media(max-width:340px){.slots-grid{grid-template-columns:repeat(3,1fr)}}
    .slot-btn{padding:9px 4px;border:1px solid var(--border);border-radius:8px;background:var(--bg2);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
    .slot-btn:hover,.slot-btn:active{border-color:var(--c);color:var(--c);background:var(--c-dim)}
    .slot-btn.sel{background:var(--c);color:#fff;border-color:var(--c)}
    .slot-btn:disabled{opacity:.25;cursor:not-allowed;text-decoration:line-through}
    .form-group{margin-bottom:12px}
    .form-label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
    .form-input{width:100%;background:var(--bg2)!important;border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:var(--text)!important;padding:11px 13px;font-size:14px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
    .form-input:focus{border-color:var(--c);box-shadow:0 0 0 3px var(--c-dim)}
    .form-input::placeholder{color:var(--faint)!important}
    textarea.form-input{resize:vertical;min-height:72px}
    .btn-pub{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .15s;-webkit-tap-highlight-color:transparent;text-decoration:none}
    .btn-primary{background:var(--c);color:#fff;border-color:var(--c)}
    .btn-primary:hover{filter:brightness(1.15)}
    .btn-ghost{background:var(--bg2);color:var(--muted);border-color:var(--border)}
    .btn-ghost:hover{background:var(--bg3);color:var(--text)}
    .btn-full{width:100%}
    .btns-row{display:flex;gap:10px;margin-top:16px}
    .btns-row .btn-ghost{flex-shrink:0}
    .btns-row .btn-primary{flex:1}
    .resumen-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
    .resumen-item:last-child{border-bottom:none}
    .resumen-ico{width:34px;height:34px;border-radius:8px;background:var(--c-dim);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--c);flex-shrink:0}
    .resumen-lbl{font-size:10px;color:var(--faint);font-weight:600;text-transform:uppercase}
    .resumen-val{font-size:14px;color:var(--text);font-weight:600}
    .metodo-card{background:var(--bg2);border:2px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px;margin-bottom:10px}
    .metodo-card:hover,.metodo-card.sel{border-color:var(--c);background:var(--c-dim)}
    .metodo-ico{font-size:24px;flex-shrink:0}
    .metodo-info{flex:1}
    .metodo-nom{font-size:14px;font-weight:700;color:var(--text)}
    .metodo-desc{font-size:11px;color:var(--muted);margin-top:2px}
    .metodo-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;transition:all .2s}
    .metodo-card.sel .metodo-check{background:var(--c);border-color:var(--c);display:flex;align-items:center;justify-content:center}
    .metodo-card.sel .metodo-check::after{content:'✓';font-size:11px;color:#fff;font-weight:900}
    .pago-info-box{border-radius:12px;padding:16px;margin-top:10px;display:none}
    .pago-info-box.visible{display:block}
    .pago-info-box.tipo-transferencia{background:rgba(116,192,252,.08);border:1px solid rgba(116,192,252,.2)}
    .pago-info-box.tipo-billetera{background:rgba(218,119,242,.06);border:1px solid rgba(218,119,242,.2)}
    .pago-info-tit{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
    .pago-info-tit.tipo-transferencia{color:#74c0fc}
    .pago-info-tit.tipo-billetera{color:#da77f2}
    .transf-dato{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.06)}
    .transf-dato:last-child{border-bottom:none}
    .transf-key{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase}
    .transf-val{font-size:13px;color:var(--text);font-weight:700;font-family:monospace}
    .btn-copiar{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;padding:3px 8px;cursor:pointer;transition:all .15s}
    .btn-copiar:hover{background:var(--bg3);color:var(--text)}
    .anticipo-box{background:rgba(255,212,59,.08);border:1px solid rgba(255,212,59,.3);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:none;align-items:center;gap:12px}
    .upload-zona{border:2px dashed rgba(116,192,252,.3);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(116,192,252,.04);margin-top:12px}
    .upload-zona:hover{border-color:var(--c);background:var(--c-dim)}
    .upload-zona.con-img{border-color:#2f9e44;background:rgba(47,158,68,.05)}
    .upload-preview{max-width:100%;max-height:180px;border-radius:10px;margin-top:10px;display:none}
    .panel-paso{display:none}
    .panel-paso.activo{display:block}
    .spinner-pub{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--c);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast-pub{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1b27;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:10px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:fadeIn .3s ease;max-width:320px}
    @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    #toast-container{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:9999}
  </style>
</head>
<body>
<div class="wrap">
  <div class="neg-header" id="neg-header">
    <div style="text-align:center;padding:40px"><span class="spinner-pub"></span></div>
  </div>

  <div class="steps" id="steps-wrap" style="display:none"></div>

  <div id="pasos-wrap">
    <!-- pasos se inyectan dinámicamente -->
  </div>
</div>
<div id="toast-container"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIA_SEM = ['Lu','Ma','Mi','Ju','Vi','Sá','Do'];
const COLOR_METODO = {efectivo:'#69db7c',transferencia:'#74c0fc',billetera:'#da77f2',mercadopago:'#009ee3'};
const ICO_METODO   = {efectivo:'ti-cash',transferencia:'ti-building-bank',billetera:'ti-device-mobile',mercadopago:'ti-brand-mastercard'};

// ── STATE ────────────────────────────────────────────────
let NEGOCIO = null, SERVICIOS = [], PROFESIONALES = [], PROF_SERVICIOS = {}, METODOS_PAGO = [], CONFIG = {};
let sel = { srvId:0,srvNom:'',srvDur:30,srvPre:0,srvCol:'#3B5BDB',srvAnticipo:0,srvDesc:'',srvIco:'ti-scissors',profId:0,profNom:'Sin preferencia',fecha:'',hora:'',horaFin:'',metodoId:'',metodoTipo:'',compFile:null,reqComp:false };
let calAnio=new Date().getFullYear(), calMes=new Date().getMonth();
let pasoActual=1, TOTAL_PASOS=5, HAY_PROFS=true, UN_METODO=false;

// ── TOAST ────────────────────────────────────────────────
function showToast(msg,tipo='info'){
  const cols={success:'#69db7c',error:'#ff8787',info:'#748ffc',warning:'#ffd43b'};
  const t=document.createElement('div');
  t.className='toast-pub';
  t.innerHTML=`<span style="color:${cols[tipo]||'#748ffc'};font-size:18px">●</span><span style="flex:1;font-size:13px;color:#e8eaed">${msg}</span>`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>t.remove(),3500);
}

// ── INIT ─────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('negocio') || params.get('slug') || '';
  if (!slug) { mostrarError('No se especificó el negocio.'); return; }

  try {
    // Buscar negocio por slug
    const negSnap = await db.collection('negocios').where('slug','==',slug).where('activo','==',true).get();
    if (negSnap.empty) { mostrarError('Negocio no encontrado o inactivo.'); return; }
    negSnap.forEach(d => NEGOCIO = { id:d.id, ...d.data() });

    // Aplicar color del negocio
    const col = NEGOCIO.color_primario || '#3B5BDB';
    document.documentElement.style.setProperty('--c', col);
    document.documentElement.style.setProperty('--c-dim', col+'33');
    document.documentElement.style.setProperty('--c-mid', col+'88');
    document.body.style.backgroundImage = `radial-gradient(ellipse at 20% 0%,${col}33 0%,transparent 55%),radial-gradient(ellipse at 80% 90%,${col}18 0%,transparent 50%)`;

    // Cargar todo en paralelo
    const [srvSnap, profSnap, cfgSnap, mpSnap] = await Promise.all([
      db.collection('servicios').where('negocio_id','==',NEGOCIO.id).where('activo','==',true).get(),
      db.collection('profesionales').where('negocio_id','==',NEGOCIO.id).where('activo','==',true).get(),
      db.collection('configuracion').doc(NEGOCIO.id).get(),
      db.collection('medios_pago_negocio').where('negocio_id','==',NEGOCIO.id).where('activo','==',true).get(),
    ]);

    srvSnap.forEach(d => SERVICIOS.push({id:d.id,...d.data()}));
    profSnap.forEach(d => {
      const p = {id:d.id,...d.data()};
      PROFESIONALES.push(p);
      // Mapa prof_id → servicios_ids[]
      PROF_SERVICIOS[p.id] = p.servicios_ids || [];
    });
    CONFIG = cfgSnap.exists ? cfgSnap.data() : { intervalo_min:30,anticipacion_min:60,anticipacion_max:30 };

    // Medios de pago
    const tiposSnap = await db.collection('medios_pago_tipos').get();
    const tiposMap = {};
    tiposSnap.forEach(d => tiposMap[d.id] = d.data());

    mpSnap.forEach(d => {
      const m = d.data();
      const tipo = tiposMap[m.medio_id] || {};
      METODOS_PAGO.push({
        id: d.id,
        tipo: tipo.tipo || 'efectivo',
        label: tipo.nombre || 'Efectivo',
        desc: tipo.descripcion || '',
        ico: tipo.icono || ICO_METODO[tipo.tipo] || 'ti-cash',
        color: COLOR_METODO[tipo.tipo] || '#748ffc',
        datos: {
          titular: m.titular || '',
          cbu:     m.cbu     || '',
          cvu:     m.cvu     || '',
          alias:   m.alias   || '',
          banco:   m.banco   || '',
        },
        anticipo_activo: !!m.anticipo_activo,
        anticipo_tipo:   m.anticipo_tipo   || 'fijo',
        anticipo_monto:  parseFloat(m.anticipo_monto) || 0,
        anticipo_porc:   parseFloat(m.anticipo_porc)  || 0,
        notas_cliente:   m.notas_cliente   || '',
      });
    });

    // Si no hay medios configurados → fallback efectivo
    if (!METODOS_PAGO.length) {
      METODOS_PAGO.push({ id:'efectivo', tipo:'efectivo', label:'Efectivo / Presencial', desc:'Pagás cuando llegás al local', ico:'ti-cash', color:'#69db7c', datos:{} });
    }

    HAY_PROFS = PROFESIONALES.length > 0;
    // Con la regla de seña obligatoria, el paso de pago siempre tiene algo que mostrar
    // (datos bancarios + comprobante), salvo que el negocio no tenga ningún medio
    // bancario configurado y solo un único método sin datos (ahí no hay nada que pedir).
    const hayMedioBancario = METODOS_PAGO.some(m => m.datos && Object.keys(m.datos).some(k => m.datos[k]));
    UN_METODO = METODOS_PAGO.length === 1 && !hayMedioBancario;
    TOTAL_PASOS = (HAY_PROFS ? 6 : 5) - (UN_METODO ? 1 : 0);

    renderHeader();
    renderSteps();
    renderPasos();

  } catch(e) {
    mostrarError('Error al cargar: ' + e.message);
  }
}

function mostrarError(msg) {
  document.getElementById('neg-header').innerHTML = `
    <div style="text-align:center;padding:60px 20px">
      <i class="ti ti-alert-circle" style="font-size:48px;color:#ff8787;display:block;margin-bottom:16px"></i>
      <div style="color:#ff8787;font-size:16px;font-weight:700">${msg}</div>
    </div>`;
}

// ── RENDER HEADER ────────────────────────────────────────
function renderHeader() {
  const col = NEGOCIO.color_primario || '#3B5BDB';
  document.title = `Reservar — ${NEGOCIO.nombre}`;
  document.getElementById('neg-header').innerHTML = `
    <div style="text-align:center">
      <div class="neg-logo" style="border-color:${col}88">
        ${NEGOCIO.logo ? `<img src="${NEGOCIO.logo}" alt="${limpiar(NEGOCIO.nombre)}">` : `<i class="ti ti-building-store" style="color:${col}"></i>`}
      </div>
      <div class="neg-nombre">${limpiar(NEGOCIO.nombre)}</div>
      ${NEGOCIO.descripcion ? `<div class="neg-desc">${limpiar(NEGOCIO.descripcion)}</div>` : ''}
    </div>`;
}

function limpiar(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── RENDER STEPS ─────────────────────────────────────────
function renderSteps() {
  const labels = HAY_PROFS
    ? ['Servicio','Profesional','Fecha','Datos','Pago','Confirmar']
    : ['Servicio','Fecha','Datos','Pago','Confirmar'];
  const labs = UN_METODO ? labels.filter(l=>l!=='Pago') : labels;
  const sw = document.getElementById('steps-wrap');
  sw.style.display = 'flex';
  sw.innerHTML = labs.map((l,i)=>{
    const n = i+1;
    return `${i>0?'<div class="step-line"></div>':''}
    <div class="step active" id="step-ind-${n}">
      <div class="step-num">${n}</div>
      <div class="step-label">${l}</div>
    </div>`;
  }).join('');
  actualizarSteps();
}

function actualizarSteps() {
  for(let i=1;i<=TOTAL_PASOS;i++){
    const el=document.getElementById('step-ind-'+i);
    if(!el) continue;
    el.classList.remove('active','done');
    if(i===pasoActual) el.classList.add('active');
    if(i<pasoActual)   el.classList.add('done');
  }
}

// ── RENDER PASOS ─────────────────────────────────────────
function renderPasos() {
  const pasoPago  = HAY_PROFS ? 5 : 4;
  const pasoConf  = TOTAL_PASOS;

// ── SERVICIO ─────────────────────────────────────────────
function calcularAnticipo() {
  // Prioridad: si el medio de pago elegido tiene seña propia activa, esa gana.
  // Si no, cae al anticipo fijo del servicio (si lo tiene).
  const metodo = METODOS_PAGO.find(m => m.id === sel.metodoId);
  if (metodo && metodo.anticipo_activo) {
    if (metodo.anticipo_tipo === 'porcentaje' && metodo.anticipo_porc > 0) {
      return Math.round(sel.srvPre * (metodo.anticipo_porc / 100));
    }
    if (metodo.anticipo_tipo === 'fijo' && metodo.anticipo_monto > 0) {
      return metodo.anticipo_monto;
    }
  }
  return sel.srvAnticipo || 0;
}

function actualizarAnticipoBox() {
  const ab = document.getElementById('anticipo-box');
  if (!ab) return;
  const monto = calcularAnticipo();
  const metodo = METODOS_PAGO.find(m => m.id === sel.metodoId);
  const notaMedio = (metodo && metodo.anticipo_activo && metodo.notas_cliente) ? metodo.notas_cliente : '';
  if (monto > 0) {
    ab.style.display = 'flex';
    document.getElementById('anticipo-monto-txt').textContent = '$' + parseFloat(monto).toLocaleString('es-AR');
    const notaEl = document.getElementById('anticipo-nota-txt');
    if (notaEl) notaEl.textContent = notaMedio || 'El resto lo abonás cuando llegás';
  } else {
    ab.style.display = 'none';
  }
}

function selServicio(id,nom,dur,pre,col,anticipo,desc,ico) {
  document.querySelectorAll('.srv-card').forEach(c=>c.classList.remove('sel'));

  Object.assign(sel, {srvId:id,srvNom:nom,srvDur:dur,srvPre:pre,srvCol:col,srvAnticipo:anticipo||0,srvDesc:desc||'',srvIco:ico||'ti-scissors'});
  // Anticipo (provisorio: todavía no se eligió método de pago)
  actualizarAnticipoBox();
  // Filtrar profesionales
  if(HAY_PROFS) {
    document.querySelectorAll('.prof-card[data-prof-id]').forEach(card=>{
      const pid=card.dataset.profId;
      const servs=PROF_SERVICIOS[pid]||[];

// ── CALENDARIO ───────────────────────────────────────────
function renderCal() {
  const tit=document.getElementById('cal-mes-tit');
  if(tit) tit.textContent=MESES[calMes]+' '+calAnio;
  const grid=document.getElementById('cal-pub-grid');
  if(!grid) return;
  grid.innerHTML='';
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const primer=new Date(calAnio,calMes,1);
  const dias=new Date(calAnio,calMes+1,0).getDate();
  let ini=primer.getDay(); ini=ini===0?6:ini-1;
  for(let i=0;i<ini;i++){const d=document.createElement('div');d.className='cal-day dis';grid.appendChild(d);}
  for(let d=1;d<=dias;d++){
    const f=`${calAnio}-${String(calMes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const fo=new Date(calAnio,calMes,d);
    const esHoy=fo.getTime()===hoy.getTime();
    const esPas=fo<hoy;
    const div=document.createElement('div');
    div.className='cal-day'+(esHoy?' hoy':'')+(esPas?' pas':'');
    div.textContent=d;
    if(!esPas) div.onclick=()=>selFecha(f,div);
    grid.appendChild(div);
  }
}
function cambiarMes(d){
  calMes+=d;
  if(calMes>11){calMes=0;calAnio++;}
  if(calMes<0){calMes=11;calAnio--;}
  renderCal();
  const sw=document.getElementById('slots-wrap');
  if(sw) sw.style.display='none';
  const btn=document.getElementById('btn-fecha-cont');
  if(btn){btn.disabled=true;btn.style.opacity='.4';}
  sel.fecha=''; sel.hora='';
}

async function selFecha(fecha,div) {
  if(!sel.srvId){showToast('Seleccioná un servicio primero','warning');return;}
  document.querySelectorAll('.cal-day').forEach(d=>d.classList.remove('sel'));
  div.classList.add('sel');
  sel.fecha=fecha; sel.hora=''; sel.horaFin='';
  const btn=document.getElementById('btn-fecha-cont');
  if(btn){btn.disabled=true;btn.style.opacity='.4';}
  const sw=document.getElementById('slots-wrap');
  const sc=document.getElementById('slots-contenido');
  if(!sw||!sc) return;
  sw.style.display='block';
  sc.innerHTML=`<div style="grid-column:span 4;text-align:center;padding:12px"><span class="spinner-pub"></span></div>`;
  try {
    const slots = await calcularSlots(fecha);
    if(!slots.length){
      sc.innerHTML=`<div style="grid-column:span 4;text-align:center;padding:14px;color:#ff8787">Sin horarios para este día.</div>`;
      return;
    }
    const disp=slots.filter(s=>s.disponible);
    if(!disp.length){
      sc.innerHTML=`<div style="grid-column:span 4;text-align:center;padding:14px;color:#ff8787"><i class="ti ti-calendar-off"></i> Sin disponibilidad. Probá otro día.</div>`;
      return;
    }
    sc.innerHTML=slots.map(s=>s.disponible
      ?`<button class="slot-btn" onclick="selSlot('${s.hora}','${s.horaFin}',this)">${s.hora}</button>`
      :`<button class="slot-btn" disabled>${s.hora}</button>`
    ).join('');
  } catch(e) {
    console.error('Error cargando horarios:', e);
    sc.innerHTML=`<div style="grid-column:span 4;text-align:center;color:#ff8787;font-size:11px;padding:8px">Error: ${e.code||''} ${e.message||e}</div>`;
  }
}

async function calcularSlots(fecha) {
  const diaSem = new Date(fecha+'T12:00:00').getDay(); // 0=Dom, 1=Lun...
  const negId = NEGOCIO.id;
  const profId = sel.profId && sel.profId !== '0' ? sel.profId : null;
  const durMin = sel.srvDur || 30;

  // Traer horarios del día
  let horSnap;
  if(profId) {
    horSnap = await db.collection('horarios').where('profesional_id','==',profId).where('dia_semana','==',diaSem).get();
  } else {
    // Cualquier profesional que atienda ese día
    horSnap = await db.collection('horarios').where('negocio_id','==',negId).where('dia_semana','==',diaSem).where('activo','==',true).get();
  }

  const horarios = [];
  horSnap.forEach(d => horarios.push(d.data()));
  const activos = horarios.filter(h => h.activo);
  if(!activos.length) return [];

  // Usar el primer horario activo disponible
  const hor = activos[0];
  const ini = hor.hora_inicio || '09:00';
  const fin = hor.hora_fin    || '18:00';

  // Reservas del día para ese negocio (colección pública, sin datos personales)
  const resSnap = await db.collection('disponibilidad')
    .where('negocio_id','==',negId)
    .where('fecha','==',fecha)
    .get();
  const reservadas = [];
  resSnap.forEach(d => {
    const r = d.data();
    reservadas.push(r.hora_inicio);
  });

  // Bloqueos
  const bloqSnap = await db.collection('bloqueos').where('negocio_id','==',negId).get();
  const bloqueos = [];
  bloqSnap.forEach(d => {
    const b = d.data();
    const fi = b.fecha_inicio?.split('T')[0] || '';
    const ff = b.fecha_fin?.split('T')[0]   || fi;
    if(fecha >= fi && fecha <= ff) bloqueos.push(b);
  });

  // Generar slots
  const slots = [];
  const intervalo = parseInt(CONFIG.intervalo_min||30);
  let [hH,hM] = ini.split(':').map(Number);
  const [fH,fM] = fin.split(':').map(Number);
  const finMin = fH*60+fM;

  while(true) {
    const totMin = hH*60+hM;
    if(totMin+durMin > finMin) break;
    const hora = `${String(hH).padStart(2,'0')}:${String(hM).padStart(2,'0')}`;
    const finSlotMin = totMin+durMin;
    const horaFin = `${String(Math.floor(finSlotMin/60)).padStart(2,'0')}:${String(finSlotMin%60).padStart(2,'0')}`;
    const ocupado = reservadas.includes(hora) || bloqueos.some(b=>{
      if(b.profesional_id && profId && b.profesional_id !== profId) return false;
      const bi=b.hora_inicio?.slice(0,5)||'00:00', bf=b.hora_fin?.slice(0,5)||'23:59';
      return hora>=bi && hora<bf;
    });
    slots.push({hora,horaFin,disponible:!ocupado});
    hM+=intervalo; if(hM>=60){hH+=Math.floor(hM/60);hM%=60;}
  }
  return slots;
}

function selSlot(ini,fin,btn) {
  document.querySelectorAll('.slot-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  sel.hora=ini; sel.horaFin=fin;
  const bt=document.getElementById('btn-fecha-cont');
  if(bt){bt.disabled=false;bt.style.opacity='1';}
}

  document.querySelectorAll('.metodo-card').forEach(c=>c.classList.remove('sel'));
  document.getElementById('met-'+id)?.classList.add('sel');
  sel.metodoId=id;
  const cfg=METODOS_PAGO.find(m=>m.id===id)||{};
  sel.metodoTipo=cfg.tipo||'efectivo';
  // Regla: siempre hace falta señar/pagar por un medio bancario y subir comprobante,
  // incluso si el cliente eligió "Efectivo presencial" como forma de pago del total.
  sel.reqComp=true;
  actualizarAnticipoBox();
  const box=document.getElementById('pago-info-dinamico');
  if(!box) return;
  box.innerHTML='';
  const btn=document.getElementById('btn-pago-cont');

  // Si el método elegido YA es bancario (transferencia/billetera), usamos sus propios datos.
  // Si es efectivo (o cualquier otro sin CBU/alias propio), buscamos el primer medio bancario
  // activo del negocio para mostrar como "dónde depositar la seña".
  let medioParaDatos = cfg;
  let esSenaDeEfectivo = false;
  if (!cfg.datos || !Object.keys(cfg.datos).some(k => cfg.datos[k])) {
    const bancario = METODOS_PAGO.find(m => (m.tipo==='transferencia'||m.tipo==='billetera') && m.datos && Object.keys(m.datos).some(k=>m.datos[k]));
    if (bancario) { medioParaDatos = bancario; esSenaDeEfectivo = true; }
  }

  const d = medioParaDatos.datos || {};
  const tieneDatos = Object.keys(d).some(k => d[k]);

  if (!tieneDatos) {
    // No hay ningún medio bancario configurado en el negocio: no podemos pedir comprobante.
    box.innerHTML = `
      <div class="pago-info-box tipo-transferencia visible">
        <div class="pago-info-tit tipo-transferencia"><i class="ti ti-alert-triangle"></i> Seña no disponible</div>
        <div style="font-size:13px;color:var(--muted)">Este negocio todavía no configuró un medio para señar la reserva. Contactalo directamente para coordinar el turno.</div>
      </div>`;
    sel.reqComp=false;
    if(btn){btn.disabled=true;btn.style.opacity='.5';btn.innerHTML='No disponible';}
    return;
  }

  const esTrans = medioParaDatos.tipo === 'transferencia';
  const colClass = esTrans ? 'tipo-transferencia' : 'tipo-billetera';
  let rows='';
  if(d.titular) rows+=`<div class="transf-dato"><span class="transf-key">Titular</span><span class="transf-val">${d.titular}</span></div>`;
  if(d.cbu) rows+=`<div class="transf-dato"><span class="transf-key">CBU</span><div style="display:flex;align-items:center;gap:8px"><span class="transf-val" style="font-size:11px">${d.cbu}</span><button class="btn-copiar" onclick="copiarDato('${d.cbu}','CBU')">Copiar</button></div></div>`;
  if(d.cvu) rows+=`<div class="transf-dato"><span class="transf-key">CVU</span><div style="display:flex;align-items:center;gap:8px"><span class="transf-val" style="font-size:11px">${d.cvu}</span><button class="btn-copiar" onclick="copiarDato('${d.cvu}','CVU')">Copiar</button></div></div>`;
  if(d.alias) rows+=`<div class="transf-dato"><span class="transf-key">Alias</span><div style="display:flex;align-items:center;gap:8px"><span class="transf-val">${d.alias}</span><button class="btn-copiar" onclick="copiarDato('${d.alias}','Alias')">Copiar</button></div></div>`;
  if(d.banco) rows+=`<div class="transf-dato"><span class="transf-key">Banco</span><span class="transf-val">${d.banco}</span></div>`;
  box.innerHTML=`
    <div class="pago-info-box ${colClass} visible">
      <div class="pago-info-tit ${colClass}"><i class="ti ${esTrans?'ti-building-bank':'ti-device-mobile'}"></i> ${esSenaDeEfectivo?'Datos para señar (el resto lo pagás en efectivo)':(esTrans?'Datos para transferir':medioParaDatos.label)}</div>
      ${esSenaDeEfectivo?`<div style="font-size:12px;color:var(--muted);margin-bottom:10px">Para asegurar tu turno necesitás depositar la seña por este medio. El resto del pago lo hacés en efectivo cuando llegás al local.</div>`:''}
      ${rows}
      <div style="margin-top:14px">
        <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px">📎 Subí el comprobante <strong style="color:#ff8787">*obligatorio</strong></div>
        <div class="upload-zona" id="zona-comp" onclick="document.getElementById('inp-comp').click()">
          <i class="ti ti-upload" style="font-size:24px;color:var(--muted);display:block;margin-bottom:6px"></i>
          <div style="font-size:12px;color:var(--muted)">Tocá para subir foto del comprobante</div>
          <img id="preview-comp" class="upload-preview">
        </div>
      </div>
    </div>`;
  actualizarBtnPago();
}

function actualizarBtnPago() {
  const btn=document.getElementById('btn-pago-cont');
  if(!btn) return;
  if(sel.reqComp&&!sel.compFile){btn.disabled=true;btn.style.opacity='.5';btn.innerHTML='<i class="ti ti-upload"></i> Subí el comprobante para continuar';}
  else{btn.disabled=false;btn.style.opacity='1';btn.innerHTML='Ver resumen <i class="ti ti-arrow-right"></i>';}
}
function copiarDato(txt,nom){navigator.clipboard.writeText(txt).then(()=>showToast(nom+' copiado','success'));}
function previewComp(inp){
  if(!inp.files[0]) return;
  sel.compFile=inp.files[0];
  if(inp.files[0].type.startsWith('image/')){const r=new FileReader();r.onload=e=>{const img=document.getElementById('preview-comp');if(img){img.src=e.target.result;img.style.display='block';}};r.readAsDataURL(inp.files[0]);}
  const z=document.getElementById('zona-comp');if(z) z.classList.add('con-img');
  showToast('Comprobante listo','success');actualizarBtnPago();
}

// ── RESUMEN ──────────────────────────────────────────────
function irAlResumen() {
  const nom=document.getElementById('pub-nombre')?.value.trim();
  const mail=document.getElementById('pub-email')?.value.trim();
  if(!nom||!mail){showToast('Completá tus datos primero','error');return;}
  if(!sel.metodoId&&!UN_METODO){showToast('Elegí un método de pago','error');return;}
  if(sel.reqComp&&!sel.compFile){showToast('Subí el comprobante para continuar','error');return;}
  const [y,m,d]=sel.fecha.split('-');
  const metodo=UN_METODO?METODOS_PAGO[0]:METODOS_PAGO.find(x=>x.id===sel.metodoId)||METODOS_PAGO[0];
  const montoAnticipo=calcularAnticipo();
  const montoMostrar=montoAnticipo>0?montoAnticipo:sel.srvPre;
  document.getElementById('resumen-contenido').innerHTML=`
    <div class="resumen-item"><div class="resumen-ico"><i class="ti ${sel.srvIco}"></i></div><div><div class="resumen-lbl">Servicio</div><div class="resumen-val">${sel.srvNom} · ${sel.srvDur} min</div></div></div>
    ${HAY_PROFS&&sel.profId&&sel.profId!=='0'?`<div class="resumen-item"><div class="resumen-ico"><i class="ti ti-user-check"></i></div><div><div class="resumen-lbl">Profesional</div><div class="resumen-val">${sel.profNom}</div></div></div>`:''}
    <div class="resumen-item"><div class="resumen-ico"><i class="ti ti-calendar"></i></div><div><div class="resumen-lbl">Fecha y hora</div><div class="resumen-val">${d}/${m}/${y} · ${sel.hora}</div></div></div>
    <div class="resumen-item"><div class="resumen-ico"><i class="ti ti-user"></i></div><div><div class="resumen-lbl">Cliente</div><div class="resumen-val">${nom}<br><span style="font-size:11px;color:var(--muted)">${mail}</span></div></div></div>
    <div class="resumen-item"><div class="resumen-ico"><i class="ti ${metodo.ico}"></i></div><div><div class="resumen-lbl">Método de pago</div><div class="resumen-val">${metodo.label}</div></div></div>
    ${montoMostrar>0?`<div class="resumen-item"><div class="resumen-ico"><i class="ti ti-currency-dollar"></i></div><div><div class="resumen-lbl">${montoAnticipo>0?'Seña a abonar':'Precio total'}</div><div class="resumen-val" style="font-size:18px;font-weight:800;color:var(--c)">$${parseFloat(montoMostrar).toLocaleString('es-AR')}</div></div></div>`:''}
    ${sel.compFile?`<div class="resumen-item"><div class="resumen-ico" style="background:rgba(47,158,68,.15)"><i class="ti ti-file-check" style="color:#69db7c"></i></div><div><div class="resumen-lbl">Comprobante</div><div class="resumen-val" style="color:#69db7c">✓ Adjuntado</div></div></div>`:''}
  `;
  irPaso(TOTAL_PASOS);
}

// ── CONFIRMAR ─────────────────────────────────────────────
async function confirmarReserva() {
  const btn=document.getElementById('btn-confirmar');
  btn.disabled=true; btn.innerHTML=`<span class="spinner-pub"></span> Procesando...`;
  try {
    const nom=document.getElementById('pub-nombre').value.trim();
    const mail=document.getElementById('pub-email').value.trim();
    const tel=document.getElementById('pub-tel')?.value.trim()||'';
    const notas=document.getElementById('pub-notas')?.value.trim()||'';
    const metodo=UN_METODO?METODOS_PAGO[0]:METODOS_PAGO.find(x=>x.id===sel.metodoId)||METODOS_PAGO[0];
    const estado=sel.compFile?'pendiente_pago':'pendiente';

    // Subir comprobante si hay
    let compUrl='';
    if(sel.compFile) {
      try {
        const fd=new FormData();
        fd.append('file',sel.compFile);
        fd.append('upload_preset',CLOUDINARY_PRESET);
        fd.append('folder','reservas/comprobantes');
        const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`,{method:'POST',body:fd});
        const data=await r.json();
        if(data.secure_url) compUrl=data.secure_url;
      } catch(e){ /* ignorar error de comprobante, igual guarda la reserva */ }
    }

    // Generar código único
    const codigo='R-'+Date.now().toString(36).toUpperCase().slice(-6);

    // Guardar en Firestore
    const reservaData = {
      negocio_id: NEGOCIO.id,
      negocio_slug: NEGOCIO.slug,
      servicio_id: sel.srvId,
      servicio_nombre: sel.srvNom,
      servicio_color: sel.srvCol,
      profesional_id: (sel.profId&&sel.profId!=='0')?sel.profId:null,
      profesional_nombre: (sel.profId&&sel.profId!=='0')?sel.profNom:null,
      fecha: sel.fecha,
      hora_inicio: sel.hora,
      hora_fin: sel.horaFin,
      estado: estado,
      cliente_nombre: nom,
      cliente_email: mail,
      cliente_telefono: tel,
      cliente_notas: notas,
      precio_cobrado: (calcularAnticipo()>0?calcularAnticipo():sel.srvPre),
      metodo_pago: metodo.tipo,
      metodo_pago_label: metodo.label,
      pago_validado: false,
      comprobante_url: compUrl,
      notas_internas: '',
      codigo: codigo,
      creado_en: new Date().toISOString(),
    };
    const reservaRef = await db.collection('reservas').add(reservaData);

    // Documento liviano público (sin datos personales) para que el calendario
    // público pueda saber qué horarios están ocupados sin necesitar login.
    try {
      await db.collection('disponibilidad').add({
        negocio_id: NEGOCIO.id,
        reserva_id: reservaRef.id,
        fecha: sel.fecha,
        hora_inicio: sel.hora,
        hora_fin: sel.horaFin,
      });
    } catch(e) { console.error('Error creando disponibilidad:', e); }

    // Crear notificación para el negocio
    try {
      await db.collection('notificaciones').add({
        negocio_id: NEGOCIO.id,
        tipo: 'reserva_nueva',
        titulo: 'Nueva reserva',
        mensaje: `${nom} reservó ${sel.srvNom} para el ${sel.fecha} a las ${sel.hora}`,
        leida: false,
        creado_en: new Date().toISOString(),
      });
    } catch(e) { /* ignorar */ }

    // Pantalla de éxito
    document.getElementById('codigo-valor').textContent = codigo;
    const [y,m,d]=sel.fecha.split('-');
    document.getElementById('exito-detalle').innerHTML=`<strong>${sel.srvNom}</strong><br>${d}/${m}/${y} · ${sel.hora}${(HAY_PROFS&&sel.profId&&sel.profId!=='0')?' · '+sel.profNom:''}`;
    if(metodo.tipo==='transferencia'||metodo.tipo==='billetera'){
      if(sel.compFile){
        document.getElementById('titulo-exito').textContent='¡Reserva enviada!';
        document.getElementById('subtitulo-exito').textContent='Recibirás confirmación cuando validemos tu pago.';
        document.getElementById('exito-pago-info').innerHTML=`<div style="background:rgba(47,158,68,.08);border:1px solid rgba(47,158,68,.25);border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px;color:#69db7c"><i class="ti ti-check"></i> Comprobante recibido — lo revisamos a la brevedad</div>`;
      } else {
        document.getElementById('titulo-exito').textContent='¡Reserva pendiente!';
        document.getElementById('subtitulo-exito').textContent='Enviá el comprobante de pago para confirmar tu turno.';
        document.getElementById('exito-pago-info').innerHTML=`<div style="background:rgba(255,212,59,.08);border:1px solid rgba(255,212,59,.25);border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px;color:#ffd43b"><i class="ti ti-alert-triangle"></i> Recordá enviar el comprobante al negocio</div>`;
      }
    } else {
      document.getElementById('titulo-exito').textContent='¡Reserva confirmada!';
      document.getElementById('subtitulo-exito').textContent='Tu turno quedó registrado exitosamente.';
    }
    irPasoExito();
  } catch(e) {
    btn.disabled=false;
    btn.innerHTML=`<i class="ti ti-calendar-check"></i> ¡Confirmar reserva!`;
    showToast('Error al confirmar: '+e.message,'error');
  }
}

// ── ARRANCAR ─────────────────────────────────────────────
init();
</script>
