<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservar turno</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/reserva.css">
</head>
<body class="reserva-page">

  <!-- HEADER DEL NEGOCIO -->
  <header class="neg-header" id="neg-header">
    <div class="neg-header-inner">
      <div id="neg-logo-wrap"></div>
      <div class="neg-header-info">
        <h1 id="neg-titulo">Cargando...</h1>
        <p  id="neg-descripcion"></p>
      </div>
    </div>
  </header>

  <!-- STEPPER -->
  <div class="stepper-wrap" id="stepper-wrap">
    <div class="stepper">
      <div class="step active" id="st-1"><span>1</span> Servicio</div>
      <div class="step-line"></div>
      <div class="step" id="st-2"><span>2</span> Profesional</div>
      <div class="step-line"></div>
      <div class="step" id="st-3"><span>3</span> Fecha y hora</div>
      <div class="step-line"></div>
      <div class="step" id="st-4"><span>4</span> Tus datos</div>
    </div>
  </div>

  <main class="reserva-main" id="reserva-main">

    <!-- ══ PASO 1: SERVICIO ══════════════════════════════ -->
    <section id="paso-1" class="paso active">
      <h2 class="paso-title">¿Qué servicio necesitás?</h2>
      <div id="lista-srv" class="srv-list"></div>
    </section>

    <!-- ══ PASO 2: PROFESIONAL ══════════════════════════ -->
    <section id="paso-2" class="paso hidden">
      <button class="btn-volver" onclick="irPaso(1)">← Volver</button>
      <h2 class="paso-title">Elegí un profesional</h2>
      <div id="lista-profs-pub" class="profs-pub-list"></div>
    </section>

    <!-- ══ PASO 3: FECHA Y HORA ══════════════════════════ -->
    <section id="paso-3" class="paso hidden">
      <button class="btn-volver" onclick="irPaso(2)">← Volver</button>
      <h2 class="paso-title">Elegí fecha y hora</h2>
      <div class="fecha-hora-wrap">
        <div class="calendario-wrap">
          <div class="cal-nav">
            <button id="btn-mes-ant" class="btn-cal-nav">‹</button>
            <span id="cal-mes-label"></span>
            <button id="btn-mes-sig" class="btn-cal-nav">›</button>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
        </div>
        <div class="horarios-pub-wrap">
          <p id="horarios-pub-hint" class="horarios-hint">← Seleccioná una fecha</p>
          <div id="horarios-pub-lista" class="horarios-pub-lista hidden"></div>
        </div>
      </div>
    </section>

    <!-- ══ PASO 4: DATOS DEL CLIENTE ═══════════════════ -->
    <section id="paso-4" class="paso hidden">
      <button class="btn-volver" onclick="irPaso(3)">← Volver</button>
      <h2 class="paso-title">Tus datos</h2>

      <div class="resumen-reserva" id="resumen-reserva"></div>

      <div class="form-cliente">
        <div class="form-row">
          <div class="form-group">
            <label>Nombre completo *</label>
            <input type="text" id="cli-nombre" placeholder="Juan García">
          </div>
          <div class="form-group">
            <label>Email *</label>
            <input type="email" id="cli-email" placeholder="tu@email.com">
          </div>
        </div>
        <div class="form-group">
          <label>Teléfono / WhatsApp</label>
          <input type="tel" id="cli-telefono" placeholder="+54 9 351 ...">
        </div>
        <div class="form-group">
          <label>Notas adicionales</label>
          <textarea id="cli-notas" rows="2" placeholder="Preferencias, consultas..."></textarea>
        </div>
        <div id="form-error" class="msg-error hidden"></div>
        <button class="btn-confirmar" id="btn-confirmar-reserva">Confirmar reserva</button>
      </div>
    </section>

    <!-- ══ CONFIRMACIÓN ══════════════════════════════════ -->
    <section id="paso-ok" class="paso hidden">
      <div class="confirmacion-wrap">
        <div class="confirmacion-icon">✅</div>
        <h2>¡Turno reservado!</h2>
        <p id="conf-mensaje"></p>
        <div id="conf-detalle" class="conf-detalle"></div>
        <div id="conf-codigo" class="conf-codigo"></div>
        <button class="btn-primary" onclick="location.reload()">Hacer otra reserva</button>
      </div>
    </section>

  </main>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script>
// ════════════════════════════════════════════════════════════
//  ESTADO
// ════════════════════════════════════════════════════════════
let negocio       = null;   // { id, ...data }
let config        = {};
let serviciosData = {};
let profsData     = {};

let selServicio    = null;  // { id, ...data }
let selProfesional = null;  // { id, ...data } | { id: '__cualquiera__' }
let selFecha       = null;  // 'YYYY-MM-DD'
let selHora        = null;  // 'HH:MM'

let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth();

const DIAS_SEMANA = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ════════════════════════════════════════════════════════════
//  INIT — leer slug de la URL
// ════════════════════════════════════════════════════════════
(async () => {
  const params = new URLSearchParams(location.search);
  const slug   = params.get('negocio');
  if (!slug) { mostrarError404('Falta el parámetro ?negocio=slug en la URL.'); return; }
  await cargarNegocio(slug);
})();

async function cargarNegocio(slug) {
  const snap = await db.collection('negocios').where('slug','==',slug).where('activo','==',true).limit(1).get();
  if (snap.empty) { mostrarError404('Negocio no encontrado o inactivo.'); return; }
  negocio = { id: snap.docs[0].id, ...snap.docs[0].data() };

  // Header
  document.title = negocio.nombre + ' — Reservar turno';
  document.getElementById('neg-titulo').textContent = negocio.nombre;
  document.getElementById('neg-descripcion').textContent = negocio.descripcion || '';
  if (negocio.logo) {
    document.getElementById('neg-logo-wrap').innerHTML = `<img src="${negocio.logo}" class="neg-logo" alt="logo">`;
  }
  // Color primario dinámico
  document.documentElement.style.setProperty('--primary', negocio.color_primario || '#3B5BDB');
  document.getElementById('neg-header').style.borderBottom = `4px solid ${negocio.color_primario || '#3B5BDB'}`;

  // Cargar config
  const cfgSnap = await db.collection('negocios').doc(negocio.id).collection('configuracion').doc('config').get();
  config = cfgSnap.exists ? cfgSnap.data() : {};

  // Cargar servicios y profesionales en paralelo
  const [srvSnap, profSnap] = await Promise.all([
    db.collection('negocios').doc(negocio.id).collection('servicios')
      .where('activo','==',true).where('visible_publico','==',true).get(),
    db.collection('negocios').doc(negocio.id).collection('profesionales')
      .where('activo','==',true).get()
  ]);

  srvSnap.forEach(d  => serviciosData[d.id]  = d.data());
  profSnap.forEach(d => profsData[d.id]      = d.data());

  renderServicios();
}

// ════════════════════════════════════════════════════════════
//  PASO 1 — SERVICIOS
// ════════════════════════════════════════════════════════════
function renderServicios() {
  const cont = document.getElementById('lista-srv');
  const entries = Object.entries(serviciosData);
  if (!entries.length) { cont.innerHTML = '<p class="empty-pub">No hay servicios disponibles.</p>'; return; }
  cont.innerHTML = '';
  entries.forEach(([id, s]) => {
    const card = document.createElement('div');
    card.className = 'srv-pub-card';
    card.style.borderLeft = `5px solid ${s.color || '#3B5BDB'}`;
    card.innerHTML = `
      <div class="srv-pub-info">
        <strong>${s.nombre}</strong>
        <span>${s.duracion_min} min${s.descripcion ? ' · ' + s.descripcion : ''}</span>
      </div>
      <div class="srv-pub-precio">
        ${s.precio > 0 ? `<span class="precio">$${Number(s.precio).toLocaleString('es-AR')}</span>` : ''}
        ${s.anticipo > 0 ? `<span class="anticipo">Anticipo $${Number(s.anticipo).toLocaleString('es-AR')}</span>` : ''}
      </div>
      <button class="btn-elegir">Elegir →</button>`;
    card.querySelector('.btn-elegir').addEventListener('click', () => elegirServicio(id, s));
    cont.appendChild(card);
  });
}

function elegirServicio(id, s) {
  selServicio = { id, ...s };
  renderProfesionales();
  irPaso(2);
}

// ════════════════════════════════════════════════════════════
//  PASO 2 — PROFESIONALES
// ════════════════════════════════════════════════════════════
function renderProfesionales() {
  const cont = document.getElementById('lista-profs-pub');
  cont.innerHTML = '';

  // Filtrar profesionales que hacen este servicio
  const disponibles = Object.entries(profsData).filter(([id, p]) =>
    !p.servicios_ids?.length || p.servicios_ids.includes(selServicio.id)
  );

  // Opción "cualquiera" si hay más de uno
  if (disponibles.length > 1) {
    const card = crearCardProf('__cualquiera__', {
      nombre: 'Sin preferencia',
      especialidad: 'Asignación automática',
      foto: null
    });
    cont.appendChild(card);
  }

  if (!disponibles.length) {
    cont.innerHTML = '<p class="empty-pub">No hay profesionales disponibles para este servicio.</p>';
    return;
  }

  disponibles.forEach(([id, p]) => cont.appendChild(crearCardProf(id, p)));
}

function crearCardProf(id, p) {
  const card = document.createElement('div');
  card.className = 'prof-pub-card';
  card.innerHTML = `
    ${p.foto
      ? `<img src="${p.foto}" class="prof-pub-avatar" alt="${p.nombre}">`
      : `<div class="prof-pub-avatar prof-pub-placeholder">${p.nombre.charAt(0)}</div>`}
    <div class="prof-pub-info">
      <strong>${p.nombre}</strong>
      ${p.especialidad ? `<span>${p.especialidad}</span>` : ''}
    </div>
    <button class="btn-elegir">Elegir →</button>`;
  card.querySelector('.btn-elegir').addEventListener('click', () => {
    selProfesional = { id, ...p };
    resetCalendario();
    irPaso(3);
  });
  return card;
}

// ════════════════════════════════════════════════════════════
//  PASO 3 — CALENDARIO
// ════════════════════════════════════════════════════════════
function resetCalendario() {
  const hoy = new Date();
  calYear  = hoy.getFullYear();
  calMonth = hoy.getMonth();
  selFecha = null;
  selHora  = null;
  document.getElementById('horarios-pub-lista').classList.add('hidden');
  document.getElementById('horarios-pub-hint').classList.remove('hidden');
  renderCalendario();
}

function renderCalendario() {
  document.getElementById('cal-mes-label').textContent = `${MESES[calMonth]} ${calYear}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Cabecera días
  DIAS_SEMANA.forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-dia-header';
    h.textContent = d;
    grid.appendChild(h);
  });

  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const antMin  = (config.anticipacion_min  || 1) * 60 * 60 * 1000;   // en ms
  const antMax  = (config.anticipacion_max_dias || 90) * 24 * 60 * 60 * 1000;
  const minDate = new Date(Date.now() + antMin);
  const maxDate = new Date(Date.now() + antMax);

  const primerDia = new Date(calYear, calMonth, 1).getDay();
  const diasMes   = new Date(calYear, calMonth + 1, 0).getDate();

  // Espacios vacíos iniciales
  for (let i = 0; i < primerDia; i++) {
    const v = document.createElement('div'); v.className = 'cal-celda vacia';
    grid.appendChild(v);
  }

  for (let d = 1; d <= diasMes; d++) {
    const fecha = new Date(calYear, calMonth, d);
    const fechaStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const celda = document.createElement('div');
    celda.className = 'cal-celda';
    celda.textContent = d;

    const pasado  = fecha < minDate;
    const lejano  = fecha > maxDate;
    const esHoy   = fecha.toDateString() === hoy.toDateString();

    if (pasado || lejano) {
      celda.classList.add('deshabilitado');
    } else {
      if (esHoy) celda.classList.add('hoy');
      if (fechaStr === selFecha) celda.classList.add('seleccionado');
      celda.addEventListener('click', () => elegirFecha(fechaStr, celda));
    }
    grid.appendChild(celda);
  }
}

document.getElementById('btn-mes-ant').addEventListener('click', () => {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendario();
});
document.getElementById('btn-mes-sig').addEventListener('click', () => {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendario();
});

async function elegirFecha(fechaStr, celda) {
  selFecha = fechaStr;
  selHora  = null;
  // Marcar seleccionado
  document.querySelectorAll('.cal-celda').forEach(c => c.classList.remove('seleccionado'));
  celda.classList.add('seleccionado');

  document.getElementById('horarios-pub-hint').classList.add('hidden');
  const listaEl = document.getElementById('horarios-pub-lista');
  listaEl.classList.remove('hidden');
  listaEl.innerHTML = '<p class="cargando">Calculando disponibilidad...</p>';

  const slots = await calcularSlots(fechaStr);
  if (!slots.length) {
    listaEl.innerHTML = '<p class="empty-pub">No hay horarios disponibles para este día.</p>';
    return;
  }
  listaEl.innerHTML = '';
  slots.forEach(hora => {
    const btn = document.createElement('button');
    btn.className = 'slot-btn';
    btn.textContent = hora;
    btn.addEventListener('click', () => {
      selHora = hora;
      document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('activo'));
      btn.classList.add('activo');
      // Avanzar automáticamente
      setTimeout(() => {
        renderResumen();
        irPaso(4);
      }, 300);
    });
    listaEl.appendChild(btn);
  });
}

// ════════════════════════════════════════════════════════════
//  CÁLCULO DE SLOTS DISPONIBLES
// ════════════════════════════════════════════════════════════
async function calcularSlots(fechaStr) {
  const fecha  = new Date(fechaStr + 'T00:00:00');
  const diaSem = fecha.getDay();  // 0=Dom ... 6=Sáb

  // Si profesional = __cualquiera__, buscar en todos los compatibles
  const profIds = selProfesional.id === '__cualquiera__'
    ? Object.entries(profsData)
        .filter(([, p]) => !p.servicios_ids?.length || p.servicios_ids.includes(selServicio.id))
        .map(([id]) => id)
    : [selProfesional.id];

  // Para cada prof, obtener horarios del día
  const [bloqueoSnap, reservasSnap] = await Promise.all([
    db.collection('negocios').doc(negocio.id).collection('bloqueos').get(),
    db.collection('negocios').doc(negocio.id).collection('reservas')
      .where('fecha','==',fechaStr)
      .where('estado','in',['pendiente','pendiente_pago','confirmada'])
      .get()
  ]);

  const bloqueos = [];
  bloqueoSnap.forEach(d => bloqueos.push(d.data()));

  const reservas = [];
  reservasSnap.forEach(d => reservas.push(d.data()));

  const duracion = selServicio.duracion_min;
  const intervalo = config.intervalo_min || duracion;
  const slotsSet = new Set();

  for (const profId of profIds) {
    // Horario del día para este profesional
    const horSnap = await db.collection('negocios').doc(negocio.id)
                             .collection('profesionales').doc(profId)
                             .collection('horarios').doc(String(diaSem)).get();
    if (!horSnap.exists) continue;
    const hor = horSnap.data();
    if (!hor.activo || !hor.hora_inicio || !hor.hora_fin) continue;

    const [hIni, mIni] = hor.hora_inicio.split(':').map(Number);
    const [hFin, mFin] = hor.hora_fin.split(':').map(Number);
    const minInicio = hIni * 60 + mIni;
    const minFin    = hFin * 60 + mFin;

    // Bloqueos que afectan a este profesional en esta fecha
    const bloqueosActivos = bloqueos.filter(b => {
      const desde = b.fecha_inicio?.toDate ? b.fecha_inicio.toDate() : new Date(b.fecha_inicio);
      const hasta  = b.fecha_fin?.toDate    ? b.fecha_fin.toDate()    : new Date(b.fecha_fin);
      const afecta = !b.profesional_id || b.profesional_id === profId;
      return afecta && desde <= new Date(fechaStr + 'T23:59:59') && hasta >= new Date(fechaStr + 'T00:00:00');
    });

    // Reservas de este profesional
    const reservasProf = reservas.filter(r => r.profesional_id === profId);

    // Generar slots
    for (let t = minInicio; t + duracion <= minFin; t += intervalo) {
      const tFin = t + duracion;
      const horaStr = `${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;

      // Anticipación mínima (no permitir slots en el pasado/muy cerca)
      const slotDateTime = new Date(fechaStr + 'T' + horaStr + ':00');
      const antMinMs = (config.anticipacion_min || 1) * 60 * 60 * 1000;
      if (slotDateTime.getTime() - Date.now() < antMinMs) continue;

      // Verificar bloqueos
      let bloqueado = false;
      for (const b of bloqueosActivos) {
        const desde = b.fecha_inicio?.toDate ? b.fecha_inicio.toDate() : new Date(b.fecha_inicio);
        const hasta  = b.fecha_fin?.toDate    ? b.fecha_fin.toDate()    : new Date(b.fecha_fin);
        const slotIni = new Date(fechaStr + `T${horaStr}:00`);
        const slotFin = new Date(fechaStr + `T${String(Math.floor(tFin/60)).padStart(2,'0')}:${String(tFin%60).padStart(2,'0')}:00`);
        if (slotIni < hasta && slotFin > desde) { bloqueado = true; break; }
      }
      if (bloqueado) continue;

      // Verificar colisión con reservas existentes
      let ocupado = false;
      for (const r of reservasProf) {
        const [rHi, rMi] = r.hora_inicio.split(':').map(Number);
        const [rHf, rMf] = r.hora_fin.split(':').map(Number);
        const rIni = rHi * 60 + rMi;
        const rFin = rHf * 60 + rMf;
        if (t < rFin && tFin > rIni) { ocupado = true; break; }
      }
      if (ocupado) continue;

      slotsSet.add(horaStr);
    }
  }

  return [...slotsSet].sort();
}

// ════════════════════════════════════════════════════════════
//  PASO 4 — DATOS + CONFIRMAR
// ════════════════════════════════════════════════════════════
function renderResumen() {
  const el = document.getElementById('resumen-reserva');
  const [y, m, d] = selFecha.split('-');
  const fechaLeg = `${d}/${m}/${y}`;
  const profNombre = selProfesional.id === '__cualquiera__' ? 'Sin preferencia' : selProfesional.nombre;
  el.innerHTML = `
    <div class="resumen-item"><span>Servicio</span><strong>${selServicio.nombre}</strong></div>
    <div class="resumen-item"><span>Profesional</span><strong>${profNombre}</strong></div>
    <div class="resumen-item"><span>Fecha</span><strong>${fechaLeg}</strong></div>
    <div class="resumen-item"><span>Hora</span><strong>${selHora}hs</strong></div>
    ${selServicio.precio > 0 ? `<div class="resumen-item"><span>Precio</span><strong>$${Number(selServicio.precio).toLocaleString('es-AR')}</strong></div>` : ''}
    ${selServicio.anticipo > 0 ? `<div class="resumen-item anticipo-row"><span>Anticipo requerido</span><strong>$${Number(selServicio.anticipo).toLocaleString('es-AR')}</strong></div>` : ''}`;
}

document.getElementById('btn-confirmar-reserva').addEventListener('click', async () => {
  const nombre   = document.getElementById('cli-nombre').value.trim();
  const email    = document.getElementById('cli-email').value.trim();
  const telefono = document.getElementById('cli-telefono').value.trim();
  const notas    = document.getElementById('cli-notas').value.trim();

  if (!nombre || !email) {
    document.getElementById('form-error').textContent = 'Nombre y email son obligatorios.';
    document.getElementById('form-error').classList.remove('hidden');
    return;
  }
  if (!validarEmail(email)) {
    document.getElementById('form-error').textContent = 'Ingresá un email válido.';
    document.getElementById('form-error').classList.remove('hidden');
    return;
  }
  document.getElementById('form-error').classList.add('hidden');
  document.getElementById('btn-confirmar-reserva').disabled = true;
  document.getElementById('btn-confirmar-reserva').textContent = 'Reservando...';

  // Calcular hora_fin
  const [h, m] = selHora.split(':').map(Number);
  const totalMin = h * 60 + m + selServicio.duracion_min;
  const horaFin  = `${String(Math.floor(totalMin/60)).padStart(2,'0')}:${String(totalMin%60).padStart(2,'0')}`;

  // Si selProfesional = cualquiera, asignar el primero disponible
  let profAsignado = selProfesional.id;
  let profNombreAsignado = selProfesional.nombre;
  if (selProfesional.id === '__cualquiera__') {
    // Recalcular slots para encontrar quién tiene libre ese slot
    const slots = await calcularSlotsConProf(selFecha, selHora);
    if (slots.length) {
      profAsignado = slots[0].profId;
      profNombreAsignado = profsData[profAsignado]?.nombre || '';
    } else {
      document.getElementById('form-error').textContent = 'El horario ya no está disponible. Elegí otro.';
      document.getElementById('form-error').classList.remove('hidden');
      document.getElementById('btn-confirmar-reserva').disabled = false;
      document.getElementById('btn-confirmar-reserva').textContent = 'Confirmar reserva';
      return;
    }
  }

  const codigo = generarCodigo();
  const estado = selServicio.anticipo > 0 ? 'pendiente_pago' : 'pendiente';

  await db.collection('negocios').doc(negocio.id).collection('reservas').add({
    negocio_id:       negocio.id,
    servicio_id:      selServicio.id,
    servicio_nombre:  selServicio.nombre,
    profesional_id:   profAsignado,
    profesional_nombre: profNombreAsignado,
    cliente_nombre:   nombre,
    cliente_email:    email,
    cliente_telefono: telefono,
    cliente_notas:    notas,
    fecha:            selFecha,
    hora_inicio:      selHora,
    hora_fin:         horaFin,
    duracion_min:     selServicio.duracion_min,
    precio_cobrado:   selServicio.precio || 0,
    anticipo:         selServicio.anticipo || 0,
    metodo_pago:      'efectivo',
    estado,
    codigo,
    creado_en: firebase.firestore.FieldValue.serverTimestamp(),
  });

  // Mostrar confirmación
  const [y, mo, d] = selFecha.split('-');
  document.getElementById('conf-mensaje').textContent = config.mensaje_confirmacion || '¡Tu turno fue registrado!';
  document.getElementById('conf-detalle').innerHTML = `
    <p><strong>Servicio:</strong> ${selServicio.nombre}</p>
    <p><strong>Profesional:</strong> ${profNombreAsignado}</p>
    <p><strong>Fecha:</strong> ${d}/${mo}/${y} a las ${selHora}hs</p>
    ${negocio.telefono ? `<p><strong>Consultas:</strong> <a href="https://wa.me/${negocio.telefono.replace(/\D/g,'')}" target="_blank">WhatsApp</a></p>` : ''}`;
  document.getElementById('conf-codigo').innerHTML = `<span>Código de reserva:</span><strong>${codigo}</strong>`;
  irPaso('ok');
});

// Versión de calcularSlots que devuelve qué profId tiene libre el slot
async function calcularSlotsConProf(fechaStr, horaTarget) {
  const fecha  = new Date(fechaStr + 'T00:00:00');
  const diaSem = fecha.getDay();
  const profIds = Object.entries(profsData)
    .filter(([, p]) => !p.servicios_ids?.length || p.servicios_ids.includes(selServicio.id))
    .map(([id]) => id);

  const [bloqueoSnap, reservasSnap] = await Promise.all([
    db.collection('negocios').doc(negocio.id).collection('bloqueos').get(),
    db.collection('negocios').doc(negocio.id).collection('reservas')
      .where('fecha','==',fechaStr)
      .where('estado','in',['pendiente','pendiente_pago','confirmada']).get()
  ]);
  const bloqueos = []; bloqueoSnap.forEach(d => bloqueos.push(d.data()));
  const reservas = []; reservasSnap.forEach(d => reservas.push(d.data()));
  const duracion = selServicio.duracion_min;
  const result = [];

  for (const profId of profIds) {
    const horSnap = await db.collection('negocios').doc(negocio.id)
                             .collection('profesionales').doc(profId)
                             .collection('horarios').doc(String(diaSem)).get();
    if (!horSnap.exists) continue;
    const hor = horSnap.data();
    if (!hor.activo) continue;
    const [hI, mI] = hor.hora_inicio.split(':').map(Number);
    const [hF, mF] = hor.hora_fin.split(':').map(Number);
    const [hT, mT] = horaTarget.split(':').map(Number);
    const t    = hT * 60 + mT;
    const tFin = t + duracion;
    const minI = hI * 60 + mI;
    const minF = hF * 60 + mF;
    if (t < minI || tFin > minF) continue;

    let bloqueado = bloqueos.some(b => {
      const afecta = !b.profesional_id || b.profesional_id === profId;
      if (!afecta) return false;
      const desde = b.fecha_inicio?.toDate ? b.fecha_inicio.toDate() : new Date(b.fecha_inicio);
      const hasta  = b.fecha_fin?.toDate    ? b.fecha_fin.toDate()    : new Date(b.fecha_fin);
      const sI = new Date(fechaStr + `T${horaTarget}:00`);
      const sF = new Date(fechaStr + `T${String(Math.floor(tFin/60)).padStart(2,'0')}:${String(tFin%60).padStart(2,'0')}:00`);
      return sI < hasta && sF > desde;
    });
    if (bloqueado) continue;

    let ocupado = reservas.filter(r => r.profesional_id === profId).some(r => {
      const [rHi, rMi] = r.hora_inicio.split(':').map(Number);
      const [rHf, rMf] = r.hora_fin.split(':').map(Number);
      return t < (rHf*60+rMf) && tFin > (rHi*60+rMi);
    });
    if (ocupado) continue;

    result.push({ profId });
  }
  return result;
}

// ════════════════════════════════════════════════════════════
//  STEPPER / NAVEGACIÓN
// ════════════════════════════════════════════════════════════
function irPaso(n) {
  document.querySelectorAll('.paso').forEach(p => { p.classList.add('hidden'); p.classList.remove('active'); });
  const id = n === 'ok' ? 'paso-ok' : `paso-${n}`;
  document.getElementById(id).classList.remove('hidden');
  document.getElementById(id).classList.add('active');
  if (typeof n === 'number') {
    for (let i = 1; i <= 4; i++) {
      const st = document.getElementById(`st-${i}`);
      st.classList.remove('active','done');
      if (i < n)  st.classList.add('done');
      if (i === n) st.classList.add('active');
    }
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
