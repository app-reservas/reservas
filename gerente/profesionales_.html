<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profesionales — ReservaSystem</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/img/favicon-16x16.png">
  <link rel="shortcut icon" href="../assets/img/favicon.ico">
  <link rel="apple-touch-icon" href="../assets/img/apple-touch-icon.png">
  <link rel="stylesheet" href="../assets/css/dark.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
</head>
<body>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/helpers.js"></script>
  <script src="../assets/js/sidebar.js"></script>
  <script src="../assets/js/app.js"></script>

  <script>
    let PROFESIONALES_CACHE = [];
    let NEGOCIO_ACTUAL = null;
    let SERVICIOS_TODOS_CACHE = [];

    (async () => {
      const usuario = await requireLogin('gerente');

      NEGOCIO_ACTUAL = usuario.negocio;
      renderLayoutAdmin({
        titulo: 'Profesionales',
        subtitulo: 'Profesionales de tu negocio',
        nombreUsuario: usuario.nombre,
        rolLabel: 'Gerente',
        rol: 'gerente',
        negocio: NEGOCIO_ACTUAL,
        topbarActionsHTML: `
          <button class="btn btn-primary" onclick="abrirModalNuevo()">
            <i class="ti ti-user-plus"></i> Nuevo profesional
          </button>`,
      });

      await cargarProfesionales();
    })();

    // ============================================================
    //  CARGA + RENDER
    // ============================================================
    async function cargarProfesionales() {
      const cont = document.getElementById('page-content');
      if (!cont) return;
      cont.innerHTML = `<div style="text-align:center;padding:60px"><span class="spinner"></span></div>`;

      if (!NEGOCIO_ACTUAL) {
        cont.innerHTML = `<div style="color:var(--text-muted);text-align:center;padding:40px">Error: negocio no cargado. Recargá la página.</div>`;
        return;
      }
      const negId = NEGOCIO_ACTUAL.id;

      let profSnap, serviciosSnap, reservasSnap;
      try {
        [profSnap, serviciosSnap, reservasSnap] = await Promise.all([
          db.collection('profesionales').where('negocio_id', '==', negId).get(),
          db.collection('servicios').where('negocio_id', '==', negId).get(),
          db.collection('reservas').where('negocio_id', '==', negId).get(),
        ]);
      } catch(err) {
        console.error('cargarProfesionales error:', err);
        cont.innerHTML = `<div style="color:#ff8787;text-align:center;padding:40px">Error al cargar: ${err.message}</div>`;
        return;
      }

      const negociosMap = { [negId]: NEGOCIO_ACTUAL.nombre };
      const negociosActivos = [NEGOCIO_ACTUAL];

      const serviciosTodos = [];
      const serviciosMap = {};
      serviciosSnap.forEach(d => {
        const s = { id: d.id, ...d.data() };
        serviciosTodos.push(s);
        serviciosMap[d.id] = s;
      });
      SERVICIOS_TODOS_CACHE = serviciosTodos;

      const reservasPorProf = {};
      const reservasFuturasPorProf = {};
      const hoy = hoyISO();
      reservasSnap.forEach(d => {
        const r = d.data();
        if (!r.profesional_id) return;
        reservasPorProf[r.profesional_id] = (reservasPorProf[r.profesional_id] || 0) + 1;
        if (r.fecha >= hoy) reservasFuturasPorProf[r.profesional_id] = (reservasFuturasPorProf[r.profesional_id] || 0) + 1;
      });

      const profesionales = [];
      profSnap.forEach(d => {
        const p = { id: d.id, ...d.data() };
        const serviciosIds = p.servicios_ids || [];
        const nombresServicios = serviciosIds.map(sid => serviciosMap[sid]?.nombre).filter(Boolean).sort();
        profesionales.push({
          ...p,
          negocio_nombre: negociosMap[p.negocio_id] || '(negocio eliminado)',
          servicios_nombres: nombresServicios.join(', '),
          total_reservas: reservasPorProf[p.id] || 0,
          reservas_futuras: reservasFuturasPorProf[p.id] || 0,
        });
      });

      profesionales.sort((a, b) => {
        const n = (a.negocio_nombre || '').localeCompare(b.negocio_nombre || '');
        if (n !== 0) return n;
        return (a.nombre || '').localeCompare(b.nombre || '');
      });

      PROFESIONALES_CACHE = profesionales;
      renderProfesionales(profesionales);
    }

    function renderProfesionales(profesionales) {
      const cont = document.getElementById('page-content');

      const total = profesionales.length;
      const activos = profesionales.filter(p => p.activo !== false).length;
      const totalReservas = profesionales.reduce((acc, p) => acc + p.total_reservas, 0);

      const filasHTML = profesionales.length === 0 ? `
        <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">
          Sin profesionales.<button class="btn btn-primary btn-sm" style="margin-left:10px" onclick="abrirModalNuevo()"><i class="ti ti-plus"></i> Agregar</button>
        </td></tr>` : profesionales.map(p => {
          const ini = iniciales(p.nombre);
          const foto = p.foto
            ? `<img src="${p.foto}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0">`
            : `<div style="width:40px;height:40px;border-radius:50%;background:rgba(112,72,232,0.2);border:2px solid rgba(112,72,232,0.4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#da77f2;flex-shrink:0">${ini}</div>`;
          return `
        <tr data-id="${p.id}" data-neg="${p.negocio_id || ''}" data-nombre="${(p.nombre || '').toLowerCase()}">
          <td style="color:var(--text-muted);font-size:12px">#${p.id.substring(0,6)}</td>
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              ${foto}
              <div>
                <div style="font-weight:600;color:var(--text-primary)">${limpiar(p.nombre)}</div>
                ${p.email ? `<div style="font-size:12px;color:var(--text-muted)">${limpiar(p.email)}</div>` : ''}
              </div>
            </div>
          </td>
          
          <td>
            ${p.servicios_nombres ? `
              <div style="font-size:12px;color:var(--text-secondary);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${limpiar(p.servicios_nombres)}">
                ${limpiar(p.servicios_nombres)}
              </div>` : `<span style="font-size:12px;color:var(--text-muted)">Sin servicios asignados</span>`}
          </td>
          <td><span style="font-weight:600">${p.total_reservas}</span> <span style="font-size:11px;color:var(--text-muted)">reservas</span></td>
          <td>
            <button onclick="toggleProfesional('${p.id}', this)" class="badge-estado ${p.activo !== false ? 'estado-confirmada' : 'estado-cancelada'}" style="cursor:pointer;border:none">
              <i class="ti ${p.activo !== false ? 'ti-check' : 'ti-x'}"></i>${p.activo !== false ? 'Activo' : 'Inactivo'}
            </button>
          </td>
          <td>
            <div style="display:flex;gap:6px;justify-content:center">
              <button onclick="editarProfesional('${p.id}')" class="btn btn-ghost btn-icon btn-sm" title="Editar"><i class="ti ti-edit"></i></button>
              <button onclick="eliminarProfesionalBtn('${p.id}', '${limpiar(p.nombre).replace(/'/g, "\\'")}')" class="btn btn-danger btn-icon btn-sm" title="Eliminar"><i class="ti ti-trash"></i></button>
            </div>
          </td>
        </tr>`;
        }).join('');

      cont.innerHTML = `
        <div class="kpi-grid mb-6" style="grid-template-columns:repeat(3,1fr)">
          <div class="kpi-card"><div class="kpi-icon purple"><i class="ti ti-users"></i></div>
            <div><div class="kpi-value" data-counter="${total}">${total}</div><div class="kpi-label">Total profesionales</div></div></div>
          <div class="kpi-card"><div class="kpi-icon green"><i class="ti ti-check"></i></div>
            <div><div class="kpi-value" data-counter="${activos}">${activos}</div><div class="kpi-label">Activos</div></div></div>
          <div class="kpi-card"><div class="kpi-icon indigo"><i class="ti ti-calendar-check"></i></div>
            <div><div class="kpi-value" data-counter="${totalReservas}">${totalReservas}</div><div class="kpi-label">Total reservas atendidas</div></div></div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="ti ti-user-check"></i> Staff / Profesionales</div>
            <div style="display:flex;gap:10px">
              <div style="position:relative">
                <i class="ti ti-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
                <input type="text" id="buscador" class="form-control" placeholder="Buscar..." style="padding-left:34px;width:180px" oninput="filtrarProfesionales()">
              </div>
            </div>
          </div>

          <div class="table-wrap">
            <table class="tabla">
              <thead>
                <tr><th>#</th><th>Profesional</th><th>Servicios que realiza</th><th>Reservas</th><th>Estado</th><th style="text-align:center">Acciones</th></tr>
              </thead>
              <tbody id="tbody-prof">
                ${filasHTML}
              </tbody>
            </table>
          </div>
        </div>

        <!-- MODAL PROFESIONAL -->
        <div class="modal-overlay" id="modal-prof">
          <div class="modal" style="max-width:560px">
            <div class="modal-header">
              <div class="modal-title" id="modal-prof-titulo">Nuevo profesional</div>
              <button class="btn btn-ghost btn-icon" onclick="Modal.close('modal-prof')"><i class="ti ti-x"></i></button>
            </div>
            <form id="form-prof" novalidate>
              <input type="hidden" id="prof-id" value="">

              <div class="grid-2">
                <div class="form-group">
                  <label class="form-label">Nombre *</label>
                  <input type="text" id="prof-nombre" class="form-control" placeholder="Carlos López" required>
                </div>
                <input type="hidden" id="prof-negocio" value="">

              <div class="grid-2">
                <div class="form-group">
                  <label class="form-label">Email</label>
                  <input type="email" id="prof-email" class="form-control" placeholder="carlos@negocio.com">
                </div>
                <div class="form-group">
                  <label class="form-label">Teléfono</label>
                  <input type="text" id="prof-tel" class="form-control" placeholder="+54 351...">
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Foto</label>
                <div style="display:flex;gap:12px;align-items:center">
                  <img id="prof-foto-preview" src="" style="width:54px;height:54px;border-radius:50%;object-fit:cover;border:1px solid var(--border-strong);display:none">
                  <input type="file" id="prof-foto-file" accept="image/*" class="form-control" style="flex:1">
                  <input type="hidden" id="prof-foto-url" value="">
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Descripción / Especialidad</label>
                <textarea id="prof-desc" class="form-control" rows="2" placeholder="Ej: Especialista en cortes modernos y coloración..."></textarea>
              </div>

              <div class="form-group">
                <label class="form-label">Servicios que realiza</label>
                <div id="checkboxes-servicios" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:160px;overflow-y:auto;padding:10px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border-strong)">
                  <div style="color:var(--text-muted);font-size:12px;grid-column:span 2">Seleccioná primero un negocio.</div>
                </div>
              </div>

              <div class="form-group" style="display:flex;align-items:center;gap:10px">
                <input type="checkbox" id="prof-activo" checked style="width:18px;height:18px;cursor:pointer;accent-color:var(--indigo-500)">
                <label for="prof-activo" style="cursor:pointer;color:var(--text-secondary)">Profesional activo</label>
              </div>

              <div class="divider"></div>
              <div style="display:flex;gap:10px;justify-content:flex-end">
                <button type="button" class="btn btn-ghost" onclick="Modal.close('modal-prof')">Cancelar</button>
                <button type="submit" class="btn btn-primary" id="btn-guardar-prof"><i class="ti ti-device-floppy"></i> Guardar</button>
              </div>
            </form>
          </div>
        </div>
      `;

      document.getElementById('form-prof').addEventListener('submit', guardarProfesional);

      document.querySelectorAll('[data-counter]').forEach(el => {
        animarContador(el, parseFloat(el.dataset.counter) || 0, el.dataset.prefix || '', el.dataset.suffix || '');
      });
    }

    // ============================================================
    //  FILTRO
    // ============================================================
    function filtrarProfesionales() {
      const q = document.getElementById('buscador').value.toLowerCase();
      const neg = '';  // gerente: sin filtro de negocio
      document.querySelectorAll('#tbody-prof tr[data-id]').forEach(r => {
        const mq = !q || r.dataset.nombre.includes(q);
        const mn = !neg || r.dataset.neg === neg;
        r.style.display = mq && mn ? '' : 'none';
      });
    }

    // ============================================================
    //  CHECKBOXES DE SERVICIOS SEGÚN NEGOCIO
    // ============================================================
    function cargarServiciosDelNegocio(negocioId, seleccionados = []) {
      const cont = document.getElementById('checkboxes-servicios');
      const filtrados = SERVICIOS_TODOS_CACHE.filter(s => s.negocio_id === negocioId);
      if (!filtrados.length) {
        cont.innerHTML = `<div style="color:var(--text-muted);font-size:12px;grid-column:span 2">Este negocio no tiene servicios. Creálos primero.</div>`;
        return;
      }
      cont.innerHTML = filtrados.map(s => {
        const color = s.color || '#3B5BDB';
        const checked = seleccionados.includes(s.id) ? 'checked' : '';
        return `
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 8px;border-radius:6px;border:1px solid ${seleccionados.includes(s.id) ? color : 'var(--border)'};background:var(--bg-card)">
          <input type="checkbox" value="${s.id}" ${checked}
                 style="accent-color:${color}" onchange="this.closest('label').style.borderColor=this.checked?'${color}':'var(--border)'">
          <span style="font-size:12px;color:var(--text-primary)">${limpiar(s.nombre)}</span>
        </label>`;
      }).join('');
    }

    // ============================================================
    //  ABRIR MODAL NUEVO
    // ============================================================
    function abrirModalNuevo() {
      document.getElementById('modal-prof-titulo').textContent = 'Nuevo profesional';
      document.getElementById('form-prof').reset();
      document.getElementById('prof-id').value = '';
      document.getElementById('prof-negocio').value = NEGOCIO_ACTUAL ? NEGOCIO_ACTUAL.id : '';
      document.getElementById('prof-activo').checked = true;
      document.getElementById('prof-foto-preview').style.display = 'none';
      document.getElementById('prof-foto-url').value = '';
      document.getElementById('checkboxes-servicios').innerHTML = `<div style="color:var(--text-muted);font-size:12px;grid-column:span 2">Seleccioná primero un negocio.</div>`;
      Modal.open('modal-prof');
    }

    // ============================================================
    //  EDITAR
    // ============================================================
    function editarProfesional(id) {
      const p = PROFESIONALES_CACHE.find(x => x.id === id);
      if (!p) { Toast.error('No se encontró el profesional'); return; }

      document.getElementById('modal-prof-titulo').textContent = 'Editar profesional';
      document.getElementById('prof-id').value      = p.id;
      document.getElementById('prof-nombre').value  = p.nombre || '';
      document.getElementById('prof-negocio').value = p.negocio_id || '';
      document.getElementById('prof-email').value   = p.email || '';
      document.getElementById('prof-tel').value     = p.telefono || '';
      document.getElementById('prof-desc').value    = p.descripcion || '';
      document.getElementById('prof-activo').checked = p.activo !== false;

      document.getElementById('prof-foto-url').value = p.foto || '';
      const preview = document.getElementById('prof-foto-preview');
      if (p.foto) { preview.src = p.foto; preview.style.display = ''; }
      else preview.style.display = 'none';

      cargarServiciosDelNegocio(p.negocio_id, p.servicios_ids || []);
      Modal.open('modal-prof');
    }

    // ============================================================
    //  SUBIDA DE FOTO A CLOUDINARY
    // ============================================================
    async function subirFotoProfesional(file) {
      const url = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`;
      const fd = new FormData();
      fd.append('file', file);
      fd.append('upload_preset', CLOUDINARY_PRESET);
      fd.append('folder', 'reservas/profesionales');
      const res = await fetch(url, { method: 'POST', body: fd });
      if (!res.ok) throw new Error('Error subiendo imagen a Cloudinary');
      const data = await res.json();
      return data.secure_url;
    }

    // ============================================================
    //  GUARDAR
    // ============================================================
    async function guardarProfesional(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-guardar-prof');
      const id = document.getElementById('prof-id').value;

      const nombre = document.getElementById('prof-nombre').value.trim();
      const negocioId = document.getElementById('prof-negocio').value;
      if (!nombre)    { Toast.error('El nombre es obligatorio.'); return; }
      if (!negocioId) { Toast.error('Seleccioná un negocio.'); return; }

      const serviciosIds = Array.from(document.querySelectorAll('#checkboxes-servicios input[type=checkbox]:checked')).map(cb => cb.value);

      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span> Guardando...`;

      try {
        let fotoUrl = document.getElementById('prof-foto-url').value || null;
        const fotoFile = document.getElementById('prof-foto-file').files[0];
        if (fotoFile) fotoUrl = await subirFotoProfesional(fotoFile);

        const payload = {
          nombre,
          negocio_id: negocioId,
          email: document.getElementById('prof-email').value.trim() || null,
          telefono: document.getElementById('prof-tel').value.trim() || null,
          descripcion: document.getElementById('prof-desc').value.trim() || null,
          foto: fotoUrl,
          servicios_ids: serviciosIds,
          activo: document.getElementById('prof-activo').checked,
        };

        if (id) {
          await db.collection('profesionales').doc(id).update(payload);
          Toast.success('Profesional actualizado correctamente.');
        } else {
          payload.creado_en = firebase.firestore.FieldValue.serverTimestamp();
          await db.collection('profesionales').add(payload);
          Toast.success('Profesional creado correctamente.');
        }

        Modal.close('modal-prof');
        await cargarProfesionales();
      } catch (err) {
        console.error(err);
        Toast.error('Error al guardar: ' + (err.message || 'desconocido'));
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="ti ti-device-floppy"></i> Guardar`;
      }
    }

    // ============================================================
    //  TOGGLE ESTADO
    // ============================================================
    async function toggleProfesional(id, btnEl) {
      const p = PROFESIONALES_CACHE.find(x => x.id === id);
      if (!p) return;
      const nuevoEstado = !(p.activo !== false);
      try {
        await db.collection('profesionales').doc(id).update({ activo: nuevoEstado });
        p.activo = nuevoEstado;
        btnEl.className = `badge-estado ${nuevoEstado ? 'estado-confirmada' : 'estado-cancelada'}`;
        btnEl.innerHTML = `<i class="ti ${nuevoEstado ? 'ti-check' : 'ti-x'}"></i>${nuevoEstado ? 'Activo' : 'Inactivo'}`;
        Toast.success('Estado actualizado.');
      } catch (err) {
        console.error(err);
        Toast.error('No se pudo cambiar el estado.');
      }
    }

    // ============================================================
    //  ELIMINAR (con chequeo de reservas futuras, igual que PHP)
    // ============================================================
    function eliminarProfesionalBtn(id, nombre) {
      const p = PROFESIONALES_CACHE.find(x => x.id === id);
      if (p && p.reservas_futuras > 0) {
        Toast.error(`No se puede eliminar: tiene ${p.reservas_futuras} reserva(s) futura(s) asignada(s).`);
        return;
      }
      confirmar(`¿Eliminar "${nombre}"? No se puede deshacer.`, async () => {
        try {
          await db.collection('profesionales').doc(id).delete();
          Toast.success('Profesional eliminado correctamente.');
          await cargarProfesionales();
        } catch (err) {
          console.error(err);
          Toast.error('Error al eliminar.');
        }
      });
    }
  </script>

  
</body>
</html>
