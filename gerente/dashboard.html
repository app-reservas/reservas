<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Panel Gerente</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/img/favicon-16x16.png">
  <link rel="shortcut icon" href="../assets/img/favicon.ico">
  <link rel="apple-touch-icon" href="../assets/img/apple-touch-icon.png">
  <link rel="stylesheet" href="../assets/css/dark.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
</head>
<body>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/helpers.js"></script>
  <script src="../assets/js/sidebar.js"></script>

  <script>
    let NEGOCIO_ACTUAL = null;

    (async () => {
      const usuario = await requireLogin('gerente');
      NEGOCIO_ACTUAL = usuario.negocio;

      renderLayoutAdmin({
        titulo: 'Dashboard',
        subtitulo: limpiar(NEGOCIO_ACTUAL.nombre) + ' · ' + new Date().toLocaleString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }),
        nombreUsuario: usuario.nombre,
        rolLabel: 'Gerente',
        rol: 'gerente',
        negocio: NEGOCIO_ACTUAL,
        topbarActionsHTML: `<a href="reservas.html" class="btn btn-primary"><i class="ti ti-plus"></i> Nueva reserva</a>`,
      });

      await cargarDashboard();
    })();

    async function cargarDashboard() {
      const cont = document.getElementById('page-content');
      cont.innerHTML = `<div style="text-align:center;padding:60px"><span class="spinner"></span></div>`;

      try {
        const negId = NEGOCIO_ACTUAL.id;
        const hoy = hoyISO();
        const inicioSemana = inicioSemanaISO();
        const inicioMes = hoy.substring(0, 7) + '-01';

        const [reservasSnap, serviciosSnap, profesionalesSnap] = await Promise.all([
          db.collection('reservas').where('negocio_id', '==', negId).get(),
          db.collection('servicios').where('negocio_id', '==', negId).get(),
          db.collection('profesionales').where('negocio_id', '==', negId).get(),
        ]);

        const serviciosMap = {};     serviciosSnap.forEach(d => serviciosMap[d.id] = d.data());
        const profesionalesMap = {}; profesionalesSnap.forEach(d => profesionalesMap[d.id] = d.data());

        const reservas = [];
        reservasSnap.forEach(d => reservas.push({ id: d.id, ...d.data() }));

        // Intentamos traer devoluciones de este negocio (colección opcional, puede no existir aún)
        let devolucionesMes = 0;
        try {
          const devSnap = await db.collection('devoluciones').where('negocio_id', '==', negId).get();
          devSnap.forEach(d => {
            const dv = d.data();
            const fechaDv = dv.creado_en?.toDate ? dv.creado_en.toDate() : (dv.creado_en ? new Date(dv.creado_en) : null);
            const fechaISO = fechaDv ? fechaDv.toISOString().substring(0, 10) : null;
            if (dv.estado === 'completada' && fechaISO && fechaISO >= inicioMes && fechaISO <= hoy) {
              devolucionesMes += Number(dv.monto || 0);
            }
          });
        } catch (e) { /* colección opcional */ }

        // ── KPIs ──────────────────────────────────────────────
        const reservasHoy    = reservas.filter(r => r.fecha === hoy).length;
        const reservasSemana = reservas.filter(r => r.fecha >= inicioSemana && r.fecha <= hoy).length;
        const reservasMes    = reservas.filter(r => r.fecha >= inicioMes && r.fecha <= hoy).length;

        const hoyMas90 = new Date(); hoyMas90.setDate(hoyMas90.getDate() + 90);
        const hoyMas90ISO = hoyMas90.toISOString().substring(0, 10);
        const ingresosMes = reservas
          .filter(r => ['confirmada','completada'].includes(r.estado) && r.pago_validado === true && r.fecha >= inicioMes && r.fecha <= hoyMas90ISO)
          .reduce((acc, r) => acc + Number(r.precio_cobrado || 0), 0);

        const pendienteCobro = reservas
          .filter(r => ['pendiente','confirmada','pendiente_pago'].includes(r.estado) && r.pago_validado !== true && r.fecha >= hoy)
          .reduce((acc, r) => acc + Number(r.precio_cobrado || 0), 0);

        const ingresosNeto = ingresosMes - devolucionesMes;
        const clientesUnicos = new Set(reservas.map(r => r.cliente_email).filter(Boolean)).size;
        const pendientes = reservas.filter(r => r.estado === 'pendiente' && r.fecha >= hoy).length;
        const totalProfesionales = Object.values(profesionalesMap).filter(p => p.activo !== false).length;
        const totalServicios = Object.values(serviciosMap).filter(s => s.activo !== false).length;

        // ── Semáforo ──────────────────────────────────────────
        const porEstado = {};
        reservas.forEach(r => { porEstado[r.estado] = (porEstado[r.estado] || 0) + 1; });

        // ── Últimas 6 reservas (por fecha de creación) ───────
        const ultimas = [...reservas].sort((a, b) => {
          const ta = a.creado_en?.seconds || 0, tb = b.creado_en?.seconds || 0;
          return tb - ta;
        }).slice(0, 6).map(r => ({
          ...r,
          servicio: serviciosMap[r.servicio_id]?.nombre || '(servicio eliminado)',
          srv_color: serviciosMap[r.servicio_id]?.color || '#3B5BDB',
          profesional: r.profesional_id ? (profesionalesMap[r.profesional_id]?.nombre || null) : null,
        }));

        // ── Turnos de hoy (pendiente/confirmada) ─────────────
        const hoyTurnos = reservas
          .filter(r => r.fecha === hoy && ['pendiente','confirmada'].includes(r.estado))
          .sort((a, b) => (a.hora_inicio || '').localeCompare(b.hora_inicio || ''))
          .map(r => ({
            ...r,
            servicio: serviciosMap[r.servicio_id]?.nombre || '(servicio eliminado)',
            profesional: r.profesional_id ? (profesionalesMap[r.profesional_id]?.nombre || null) : null,
          }));

        // ── Próximos 7 días (ocupación) ───────────────────────
        const mapa7 = {};
        reservas.forEach(r => {
          if (r.estado === 'cancelada') return;
          if (r.fecha >= hoy) {
            const dias = Math.round((new Date(r.fecha) - new Date(hoy)) / 86400000);
            if (dias >= 0 && dias <= 7) mapa7[r.fecha] = (mapa7[r.fecha] || 0) + 1;
          }
        });
        const max7 = Math.max(1, ...Object.values(mapa7));

        // ── Recomendaciones automáticas ───────────────────────
        const recomendaciones = [];
        if (pendientes > 3) recomendaciones.push({ ico: 'ti-clock', color: '#ffd43b', txt: `Tenés <strong>${pendientes} reservas pendientes</strong> sin confirmar. Confirmálas para que el cliente reciba su turno.` });
        if (totalProfesionales === 0) recomendaciones.push({ ico: 'ti-user-plus', color: '#ff8787', txt: '<strong>Sin profesionales cargados.</strong> Agregá al menos uno para que el sistema pueda asignar turnos.' });
        if (totalServicios === 0) recomendaciones.push({ ico: 'ti-list-check', color: '#ff8787', txt: '<strong>Sin servicios cargados.</strong> Los clientes no pueden reservar sin servicios definidos.' });
        if (pendienteCobro > 0) recomendaciones.push({ ico: 'ti-clock', color: '#ffd43b', txt: `Tenés <strong>${formatearPrecio(pendienteCobro)}</strong> en reservas confirmadas pendientes de cobro.` });
        if (recomendaciones.length === 0) recomendaciones.push({ ico: 'ti-circle-check', color: '#69db7c', txt: '<strong>¡Todo en orden!</strong> Tu negocio está funcionando correctamente.' });

        const metaMes = 100;
        const pctMes = Math.min(100, Math.round((reservasMes / metaMes) * 100));

        renderDashboard({
          reservasHoy, pendientes, ingresosNeto, devolucionesMes, pendienteCobro, clientesUnicos,
          porEstado, reservasMes, metaMes, pctMes, mapa7, max7, recomendaciones,
          totalProfesionales, totalServicios, hoyTurnos, ultimas, hoy,
        });
      } catch (err) {
        console.error(err);
        cont.innerHTML = `<div class="alert alert-warning"><i class="ti ti-alert-triangle"></i><div>No se pudo cargar el dashboard: ${err.message || 'error desconocido'}</div></div>`;
      }
    }

    function renderDashboard(d) {
      const cont = document.getElementById('page-content');

      const sem = [
        { est: 'pendiente',  label: 'Pendientes',  icono: 'ti-clock',        bar: 'amber' },
        { est: 'confirmada', label: 'Confirmadas', icono: 'ti-check',        bar: 'green' },
        { est: 'completada', label: 'Completadas', icono: 'ti-circle-check', bar: '' },
        { est: 'cancelada',  label: 'Canceladas',  icono: 'ti-x',            bar: 'red' },
        { est: 'no_asistio', label: 'No asistió',  icono: 'ti-user-off',     bar: 'red' },
      ];
      const totalSem = Object.values(d.porEstado).reduce((a, b) => a + b, 0) || 1;
      const semaforoHTML = sem.map(info => {
        const cant = d.porEstado[info.est] || 0;
        const pct = Math.round((cant / totalSem) * 100);
        return `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <span class="badge-estado estado-${info.est}" style="min-width:108px;justify-content:center">
            <i class="ti ${info.icono}"></i>${info.label}
          </span>
          <div style="flex:1"><div class="progress-bar"><div class="progress-fill ${info.bar}" style="width:${pct}%"></div></div></div>
          <span style="font-weight:700;color:var(--text-primary);min-width:24px;text-align:right">${cant}</span>
          <span style="font-size:11px;color:var(--text-muted);min-width:30px">${pct}%</span>
        </div>`;
      }).join('');

      const diasNombres = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
      let proximos7HTML = '';
      for (let i = 0; i < 7; i++) {
        const f = new Date(d.hoy);
        f.setDate(f.getDate() + i);
        const fISO = f.toISOString().substring(0, 10);
        const cant = d.mapa7[fISO] || 0;
        const pct7 = d.max7 > 0 ? Math.round((cant / d.max7) * 100) : 0;
        const esHoy = fISO === d.hoy;
        proximos7HTML += `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div style="width:50px;text-align:center">
            <div style="font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase">${diasNombres[f.getDay()]}</div>
            <div style="font-size:14px;font-weight:800;color:${esHoy ? 'var(--indigo-400)' : 'var(--text-primary)'}">${String(f.getDate()).padStart(2,'0')}</div>
          </div>
          <div style="flex:1">
            <div class="progress-bar" style="height:8px">
              <div class="progress-fill" style="width:${pct7}%;background:${esHoy ? 'var(--indigo-500)' : (cant > 5 ? '#69db7c' : (cant > 0 ? 'var(--indigo-400)' : 'var(--bg-hover)'))}"></div>
            </div>
          </div>
          <span style="font-size:13px;font-weight:700;color:var(--text-primary);min-width:20px;text-align:right">${cant}</span>
        </div>`;
      }

      const recomendacionesHTML = d.recomendaciones.map(r => `
        <div class="recomendacion" style="border-color:${r.color}33;background:${r.color}0d">
          <i class="ti ${r.ico}" style="color:${r.color}"></i>
          <div class="recomendacion-texto">${r.txt}</div>
        </div>`).join('');

      const hoyTurnosHTML = d.hoyTurnos.length === 0 ? '' : `
        <div class="card mb-6">
          <div class="card-header">
            <div class="card-title"><i class="ti ti-calendar-today" style="color:#ffd43b"></i> Turnos de hoy (${d.hoyTurnos.length})</div>
            <a href="reservas.html" class="btn btn-ghost btn-sm">Ver todos</a>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px">
            ${d.hoyTurnos.map(t => `
            <div style="padding:12px 14px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--bg-surface);border-left:3px solid ${colorEstado(t.estado)}">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                <span style="font-size:16px;font-weight:800;color:var(--indigo-300)">${formatearHora(t.hora_inicio)}</span>
                <span class="badge-estado estado-${t.estado}"><i class="ti ${iconoEstado(t.estado)}"></i>${etiquetaEstado(t.estado)}</span>
              </div>
              <div style="font-weight:600;color:var(--text-primary)">${limpiar(t.cliente_nombre)}</div>
              <div style="font-size:12px;color:var(--text-muted)">${limpiar(t.servicio)}${t.profesional ? ' · ' + limpiar(t.profesional) : ''}</div>
            </div>`).join('')}
          </div>
        </div>`;

      const ultimasHTML = d.ultimas.length === 0 ? `
        <tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted)">
          Sin reservas aún. <a href="reservas.html" style="color:var(--indigo-300)">Creá la primera</a>
        </td></tr>` : d.ultimas.map(r => `
        <tr>
          <td>
            <div style="font-weight:600">${limpiar(r.cliente_nombre)}</div>
            <div style="font-size:11px;color:var(--text-muted)">${limpiar(r.cliente_email)}</div>
          </td>
          <td>
            <div style="display:flex;align-items:center;gap:6px">
              <div style="width:4px;height:28px;border-radius:3px;background:${r.srv_color}"></div>
              <span style="font-size:13px">${limpiar(r.servicio)}</span>
            </div>
          </td>
          <td style="color:var(--text-secondary);font-size:13px">${r.profesional ? limpiar(r.profesional) : '—'}</td>
          <td>
            <div style="font-weight:600">${formatearFecha(r.fecha)}</div>
            <div style="font-size:12px;color:var(--indigo-300)">${formatearHora(r.hora_inicio)}</div>
          </td>
          <td><span class="badge-estado estado-${r.estado}"><i class="ti ${iconoEstado(r.estado)}"></i>${etiquetaEstado(r.estado)}</span></td>
          <td>
            <div style="display:flex;gap:5px;justify-content:center">
              <a href="reservas.html?ver=${r.id}" class="btn btn-ghost btn-icon btn-sm"><i class="ti ti-eye"></i></a>
              <a href="reservas.html?editar=${r.id}" class="btn btn-ghost btn-icon btn-sm"><i class="ti ti-edit"></i></a>
            </div>
          </td>
        </tr>`).join('');

      cont.innerHTML = `
        <div class="kpi-grid mb-6" style="grid-template-columns:repeat(4,1fr)">
          <div class="kpi-card">
            <div class="kpi-icon indigo"><i class="ti ti-calendar-today"></i></div>
            <div><div class="kpi-value" data-counter="${d.reservasHoy}">${d.reservasHoy}</div><div class="kpi-label">Reservas hoy</div></div>
          </div>
          <div class="kpi-card">
            <div class="kpi-icon amber"><i class="ti ti-clock"></i></div>
            <div>
              <div class="kpi-value" data-counter="${d.pendientes}">${d.pendientes}</div>
              <div class="kpi-label">Pendientes</div>
              ${d.pendientes > 0 ? `<div class="kpi-trend down">⚠ Confirmar</div>` : ''}
            </div>
          </div>
          <div class="kpi-card" style="${d.devolucionesMes > 0 ? 'border-color:rgba(255,135,135,0.3)' : ''}">
            <div class="kpi-icon green"><i class="ti ti-cash"></i></div>
            <div style="flex:1">
              <div class="kpi-value" style="color:${d.ingresosNeto > 0 ? '#69db7c' : 'var(--text-primary)'}">${formatearPrecio(d.ingresosNeto)}</div>
              <div class="kpi-label">Ingresos cobrados (neto)</div>
              ${d.devolucionesMes > 0 ? `<div style="font-size:11px;color:#ff8787;margin-top:2px"><i class="ti ti-arrow-back-up" style="font-size:10px"></i> -${formatearPrecio(d.devolucionesMes)} devuelto</div>` : ''}
              ${d.pendienteCobro > 0 ? `<div style="font-size:11px;color:#ffd43b;margin-top:2px"><i class="ti ti-clock" style="font-size:10px"></i> ${formatearPrecio(d.pendienteCobro)} por cobrar</div>` : ''}
            </div>
          </div>
          <div class="kpi-card">
            <div class="kpi-icon cyan"><i class="ti ti-users"></i></div>
            <div><div class="kpi-value" data-counter="${d.clientesUnicos}">${d.clientesUnicos}</div><div class="kpi-label">Clientes únicos</div></div>
          </div>
        </div>

        <div class="grid-2 mb-6">
          <div class="card">
            <div class="card-header">
              <div class="card-title"><i class="ti ti-traffic-cone"></i> Semáforo de reservas</div>
              <a href="reservas.html" class="btn btn-ghost btn-sm">Ver todas</a>
            </div>
            ${semaforoHTML}
          </div>

          <div style="display:flex;flex-direction:column;gap:14px">
            <div class="card" style="background:rgba(59,91,219,0.08);border-color:rgba(59,91,219,0.25)">
              <div class="card-title" style="margin-bottom:10px"><i class="ti ti-brand-whatsapp" style="color:#25d366"></i> Link de reservas para clientes</div>
              <div style="display:flex;gap:8px;align-items:center">
                <code id="link-display" style="flex:1;font-size:11px;background:var(--bg-surface);padding:8px 10px;border-radius:8px;border:1px solid var(--border);color:var(--indigo-300);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
                  ${limpiar(window.LINK_PUBLICO_NEGOCIO || '')}
                </code>
                <button onclick="copiarLinkPublicoNegocio()" class="btn btn-primary btn-sm"><i class="ti ti-copy"></i> Copiar</button>
              </div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:6px">Compartí este link por WhatsApp para que tus clientes reserven solos.</div>
            </div>

            <div class="card">
              <div class="card-header" style="margin-bottom:10px">
                <div class="card-title"><i class="ti ti-target"></i> Meta mensual</div>
                <span style="font-size:12px;color:var(--text-muted)">${d.reservasMes}/${d.metaMes}</span>
              </div>
              <div class="progress-bar" style="height:10px;margin-bottom:6px">
                <div class="progress-fill ${d.pctMes>=80?'green':(d.pctMes>=50?'':'amber')}" style="width:${d.pctMes}%"></div>
              </div>
              <div style="display:flex;justify-content:space-between;font-size:12px">
                <span style="color:var(--text-muted)">Este mes</span>
                <span style="font-weight:700;color:${d.pctMes>=80?'#69db7c':(d.pctMes>=50?'var(--indigo-400)':'#ffd43b')}">${d.pctMes}%</span>
              </div>
            </div>
          </div>
        </div>

        <div class="grid-2 mb-6">
          <div class="card">
            <div class="card-header"><div class="card-title"><i class="ti ti-calendar-week"></i> Próximos 7 días</div></div>
            ${proximos7HTML}
          </div>

          <div class="card">
            <div class="card-header"><div class="card-title"><i class="ti ti-bulb"></i> Recomendaciones</div></div>
            ${recomendacionesHTML}
            <div class="divider"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div style="text-align:center;padding:10px;background:var(--bg-surface);border-radius:var(--radius-md)">
                <div style="font-size:22px;font-weight:800;color:var(--indigo-400)">${d.totalProfesionales}</div>
                <div style="font-size:11px;color:var(--text-muted)">Profesionales</div>
              </div>
              <div style="text-align:center;padding:10px;background:var(--bg-surface);border-radius:var(--radius-md)">
                <div style="font-size:22px;font-weight:800;color:var(--indigo-400)">${d.totalServicios}</div>
                <div style="font-size:11px;color:var(--text-muted)">Servicios activos</div>
              </div>
            </div>
          </div>
        </div>

        ${hoyTurnosHTML}

        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="ti ti-list"></i> Últimas reservas</div>
            <a href="reservas.html" class="btn btn-primary btn-sm"><i class="ti ti-plus"></i> Nueva</a>
          </div>
          <div class="table-wrap">
            <table class="tabla">
              <thead>
                <tr><th>Cliente</th><th>Servicio</th><th>Profesional</th><th>Fecha / Hora</th><th>Estado</th><th style="text-align:center">Acciones</th></tr>
              </thead>
              <tbody>${ultimasHTML}</tbody>
            </table>
          </div>
        </div>
      `;

      document.querySelectorAll('[data-counter]').forEach(el => {
        animarContador(el, parseFloat(el.dataset.counter) || 0, el.dataset.prefix || '', el.dataset.suffix || '');
      });
    }
  </script>

  <script src="../assets/js/app.js"></script>
</body>
</html>
