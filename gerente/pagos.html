<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medios de Pago — Panel Gerente</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/img/favicon-16x16.png">
  <link rel="shortcut icon" href="../assets/img/favicon.ico">
  <link rel="apple-touch-icon" href="../assets/img/apple-touch-icon.png">
  <link rel="stylesheet" href="../assets/css/dark.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
</head>
<body>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/helpers.js"></script>
  <script src="../assets/js/sidebar.js"></script>
  <script src="../assets/js/app.js"></script>

  <script>
    let NEGOCIO_ID   = '';
    let mediosCache  = [];

    const COLORES = { efectivo:'#69db7c', transferencia:'#74c0fc', billetera:'#ffd43b', mercadopago:'#009ee3', otro:'#c9c9c9' };
    const LABELS  = { efectivo:'Efectivo', transferencia:'Transferencia', billetera:'Billetera virtual', mercadopago:'MercadoPago', otro:'Otro' };

    (async () => {
      const usuario = await requireLogin('gerente');
      NEGOCIO_ID = usuario.negocio.id;

      renderLayoutAdmin({
        titulo: 'Medios de Pago',
        rol: 'gerente',
        negocio: usuario.negocio,
        subtitulo: 'Activá y configurá los métodos de pago de tu negocio',
        nombreUsuario: usuario.nombre,
        rolLabel: 'Gerente',
      });

      document.getElementById('page-content').innerHTML = `<div style="text-align:center;padding:60px"><span class="spinner"></span></div>`;

      try {
        await renderEsqueleto();
        await cargarMedios();
        await cargarComprobantes();
      } catch(e) {
        document.getElementById('page-content').innerHTML = `
          <div class="card" style="text-align:center;padding:40px;color:#ff8787">
            <i class="ti ti-alert-circle" style="font-size:36px;display:block;margin-bottom:10px"></i>
            <div style="font-weight:700;margin-bottom:6px">Error al cargar Medios de Pago</div>
            <div style="font-size:13px;color:var(--text-muted)">${e.message}</div>
          </div>`;
        console.error('Error en gerente/pagos.html:', e);
      }
    })();

    // ── KPIs ──────────────────────────────────────────────────
    async function calcularKPIs() {
      const snap = await db.collection('reservas').where('negocio_id','==',NEGOCIO_ID).get();
      const reservas = snap.docs.map(d => d.data());
      const pendientes = reservas.filter(r => r.comprobante_url && !r.pago_validado).length;
      const validados   = reservas.filter(r => r.pago_validado).length;
      const ingresos     = reservas.filter(r => r.pago_validado).reduce((a,r) => a + (parseFloat(r.precio_cobrado)||0), 0);
      return { pendientes, validados, ingresos };
    }

    async function renderEsqueleto() {
      const { pendientes, validados, ingresos } = await calcularKPIs();
      const cont = document.getElementById('page-content');
      cont.innerHTML = `
      <div class="kpi-grid mb-6" style="grid-template-columns:repeat(3,minmax(0,1fr))">
        <div class="kpi-card">
          <div class="kpi-icon amber"><i class="ti ti-clock"></i></div>
          <div>
            <div class="kpi-value" id="kpi-pendientes">${pendientes}</div>
            <div class="kpi-label">Comprobantes pendientes</div>
            ${pendientes > 0 ? `<div class="kpi-trend down">⚠ Requieren atención</div>` : ''}
          </div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon green"><i class="ti ti-circle-check"></i></div>
          <div><div class="kpi-value" id="kpi-validados">${validados}</div><div class="kpi-label">Pagos validados</div></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon indigo"><i class="ti ti-currency-dollar"></i></div>
          <div><div class="kpi-value" id="kpi-ingresos">$${ingresos.toLocaleString('es-AR')}</div><div class="kpi-label">Ingresos validados</div></div>
        </div>
      </div>

      ${pendientes > 0 ? `
      <div class="alert" style="border-color:rgba(245,159,0,0.4);background:rgba(245,159,0,0.06);margin-bottom:16px">
        <i class="ti ti-alert-circle" style="color:#ffd43b;font-size:20px"></i>
        <div>
          <strong style="color:#ffd43b">Tenés ${pendientes} comprobante${pendientes>1?'s':''} pendiente${pendientes>1?'s':''} de validar.</strong>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">Revisalos más abajo para confirmar o rechazar los pagos.</div>
        </div>
      </div>` : ''}

      <div style="display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:16px;align-items:flex-start">

        <div>
          <div class="card">
            <div class="card-header">
              <div class="card-title"><i class="ti ti-credit-card"></i> Métodos de pago disponibles</div>
            </div>
            <div class="alert alert-info mb-4" style="font-size:13px">
              <i class="ti ti-info-circle"></i>
              <div>Activá los métodos que querés ofrecer y completá los datos de tu cuenta para cada uno. Tus clientes verán solo los que tengas activos al reservar.</div>
            </div>
            <div id="lista-medios-gerente"><div style="text-align:center;padding:40px"><span class="spinner"></span></div></div>
          </div>

          <div class="card mt-4" id="card-comprobantes">
            <div class="card-header">
              <div class="card-title" id="titulo-comprobantes"><i class="ti ti-file-check"></i> Comprobantes pendientes</div>
              <select id="f-estado-comp" class="form-control" style="width:130px" onchange="cargarComprobantes()">
                <option value="pendiente">Pendientes</option>
                <option value="aprobado">Aprobados</option>
                <option value="">Todos</option>
              </select>
            </div>
            <div id="lista-comprobantes"><div style="text-align:center;padding:20px"><span class="spinner"></span></div></div>
          </div>
        </div>

        <div id="panel-config-medio" style="display:none">
          <div class="card" style="position:sticky;top:80px">
            <div class="card-header">
              <div class="card-title" id="panel-config-titulo"><i class="ti ti-settings"></i> Configurar medio</div>
              <button class="btn btn-ghost btn-icon btn-sm" onclick="cerrarPanelConfig()"><i class="ti ti-x"></i></button>
            </div>

            <div style="margin-bottom:14px">
              <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:12px;border-radius:8px;background:var(--bg-surface);border:1px solid var(--border)">
                <input type="checkbox" id="cfg-activo" style="accent-color:var(--indigo-500);width:20px;height:20px">
                <div>
                  <div style="font-weight:700;color:var(--text-primary);font-size:14px">Activar este medio</div>
                  <div style="font-size:12px;color:var(--text-muted)">Los clientes lo verán al reservar</div>
                </div>
              </label>
            </div>

            <div id="cfg-campos-dinamicos"></div>

            <div style="padding:14px;background:rgba(59,91,219,0.06);border-radius:var(--radius-md);border:1px solid rgba(59,91,219,0.2);margin-bottom:14px">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
                <div style="font-size:12px;font-weight:700;color:var(--indigo-300);text-transform:uppercase"><i class="ti ti-coin"></i> Anticipo / Seña</div>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text-secondary)">
                  <input type="checkbox" id="cfg-ant-activo" onchange="toggleAnticipo()" style="accent-color:var(--indigo-500)">
                  Habilitar
                </label>
              </div>
              <div id="cfg-anticipo-campos" style="display:none">
                <div class="form-group">
                  <label class="form-label">Tipo de anticipo</label>
                  <select id="cfg-ant-tipo" class="form-control" onchange="toggleAnticipo()">
                    <option value="fijo">Monto fijo ($)</option>
                    <option value="porcentaje">Porcentaje del precio (%)</option>
                  </select>
                </div>
                <div class="form-group" id="cfg-monto-wrap">
                  <label class="form-label">Monto de anticipo ($)</label>
                  <input type="number" id="cfg-ant-monto" class="form-control" value="0" min="0" step="0.01">
                </div>
                <div class="form-group" id="cfg-porc-wrap" style="display:none">
                  <label class="form-label">Porcentaje (%)</label>
                  <input type="number" id="cfg-ant-porc" class="form-control" value="0" min="0" max="100" step="0.5">
                </div>
                <div class="form-group" style="margin-bottom:0">
                  <label class="form-label">Nota para el cliente</label>
                  <input type="text" id="cfg-notas" class="form-control" placeholder="ej: Se requiere 30% de seña para confirmar">
                </div>
              </div>
            </div>

            <div style="display:flex;gap:8px">
              <button type="button" class="btn btn-ghost" style="flex:1" onclick="cerrarPanelConfig()">Cancelar</button>
              <button type="button" class="btn btn-primary" style="flex:2" onclick="guardarConfigMedio()">
                <i class="ti ti-device-floppy"></i> Guardar
              </button>
            </div>
          </div>
        </div>

      </div>`;
    }

    // ── CARGAR MEDIOS (tipos globales activos + config del negocio) ──
    async function cargarMedios() {
      const tiposSnap = await db.collection('medios_pago_tipos').where('activo_global','==',true).get();
      const tipos = tiposSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.orden||99) - (b.orden||99));

      const medios = await Promise.all(tipos.map(async t => {
        const docId = NEGOCIO_ID + '_' + t.id;
        const snap = await db.collection('medios_pago_negocio').doc(docId).get();
        const neg = snap.exists ? snap.data() : {};
        let tieneToken = false;
        try {
          const credSnap = await db.collection('medios_pago_negocio').doc(docId).collection('privado').doc('credenciales').get();
          tieneToken = credSnap.exists && !!credSnap.data().mp_access_token;
        } catch(e) { /* sin permiso o no existe aún */ }
        return { ...t, ...neg, neg_activo: !!neg.activo, tieneToken };
      }));

      mediosCache = medios;
      renderMedios(medios);
    }

    function renderMedios(medios) {
      document.getElementById('lista-medios-gerente').innerHTML = medios.length ? medios.map(m => `
        <div style="display:flex;align-items:center;gap:12px;padding:14px;border-radius:10px;background:var(--bg-surface);border:2px solid ${m.neg_activo?'var(--indigo-500)':'var(--border)'};margin-bottom:10px;transition:all 0.2s">
          <div style="width:44px;height:44px;border-radius:12px;background:${(COLORES[m.tipo]||'#c9c9c9')}18;display:flex;align-items:center;justify-content:center;font-size:22px;color:${COLORES[m.tipo]||'#c9c9c9'};flex-shrink:0">
            <i class="ti ${m.icono}"></i>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:14px;color:var(--text-primary)">${limpiar(m.nombre)}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:2px">
              <span style="background:${(COLORES[m.tipo]||'#c9c9c9')}22;color:${COLORES[m.tipo]||'#c9c9c9'};padding:1px 8px;border-radius:20px;font-weight:600;font-size:10px">${LABELS[m.tipo]||m.tipo}</span>
              ${m.neg_activo && m.alias ? `<span style="margin-left:6px">Alias: <strong>${limpiar(m.alias)}</strong></span>` : ''}
              ${m.neg_activo && !m.alias && !m.cbu && !m.cvu && m.tipo!=='efectivo' ? `<span style="margin-left:6px;color:#ffd43b">⚠ Sin datos completos</span>` : ''}
              ${m.anticipo_activo ? `<span style="margin-left:6px;background:rgba(59,91,219,0.15);color:#748ffc;padding:1px 6px;border-radius:10px;font-size:10px">Anticipo activo</span>` : ''}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <span style="font-size:12px;font-weight:700;color:${m.neg_activo?'#69db7c':'var(--text-muted)'}">
              ${m.neg_activo?'● ACTIVO':'○ Inactivo'}
            </span>
            <button onclick="abrirConfig('${m.id}')" class="btn btn-ghost btn-sm" style="${m.neg_activo?'border-color:var(--indigo-500)44':''}">
              <i class="ti ti-settings"></i> ${m.neg_activo?'Editar':'Configurar'}
            </button>
          </div>
        </div>
      `).join('') : `<div style="text-align:center;padding:40px;color:var(--text-muted)">No hay medios de pago disponibles. Pedile al administrador que active alguno.</div>`;
    }

    // ── ABRIR / CERRAR PANEL DE CONFIGURACIÓN ─────────────────
    function abrirConfig(medioId) {
      const m = mediosCache.find(x => x.id === medioId);
      if (!m) return;
      document.getElementById('panel-config-titulo').innerHTML = `<i class="ti ${m.icono}"></i> ${limpiar(m.nombre)}`;
      document.getElementById('panel-config-medio').dataset.medioId = medioId;
      document.getElementById('cfg-activo').checked = !!m.neg_activo;

      let html = '';
      if (m.requiere_cbu || m.requiere_alias || m.requiere_cvu) {
        html += `<div style="padding:12px;background:var(--bg-surface);border-radius:8px;border:1px solid var(--border);margin-bottom:12px">
          <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px"><i class="ti ti-building-bank"></i> Datos bancarios</div>
          <div class="form-group"><label class="form-label">Titular de la cuenta *</label><input type="text" id="cfg-titular" class="form-control" value="${limpiar(m.titular||'')}" placeholder="Nombre completo"></div>`;
        if (m.requiere_cbu)   html += `<div class="form-group"><label class="form-label">CBU (22 dígitos)</label><input type="text" id="cfg-cbu" class="form-control" value="${limpiar(m.cbu||'')}" placeholder="0000000000000000000000" maxlength="22"></div>`;
        if (m.requiere_cvu)   html += `<div class="form-group"><label class="form-label">CVU</label><input type="text" id="cfg-cvu" class="form-control" value="${limpiar(m.cvu||'')}" placeholder="CVU de la billetera"></div>`;
        if (m.requiere_alias) html += `<div class="form-group"><label class="form-label">Alias</label><input type="text" id="cfg-alias" class="form-control" value="${limpiar(m.alias||'')}" placeholder="mi.alias.banco"></div>`;
        html += `<div class="form-group" style="margin-bottom:0"><label class="form-label">Banco / Entidad</label><input type="text" id="cfg-banco" class="form-control" value="${limpiar(m.banco||'')}" placeholder="Nombre del banco o billetera"></div></div>`;
      }
      if (m.requiere_mp) {
        html += `<div style="padding:12px;background:rgba(0,158,227,0.06);border-radius:8px;border:1px solid rgba(0,158,227,0.25);margin-bottom:12px">
          <div style="font-size:11px;font-weight:700;color:#009ee3;text-transform:uppercase;margin-bottom:10px"><i class="ti ti-brand-paypal"></i> Credenciales MercadoPago</div>
          <div class="form-group"><label class="form-label">Public Key</label><input type="text" id="cfg-mpkey" class="form-control" value="${limpiar(m.mp_public_key||'')}" placeholder="APP_USR-..."></div>
          <div class="form-group" style="margin-bottom:0"><label class="form-label">Access Token</label><input type="text" id="cfg-mptoken" class="form-control" placeholder="${m.tieneToken ? '••••• (dejar vacío para no cambiar)' : 'APP_USR-...'}"></div>
        </div>`;
      }
      document.getElementById('cfg-campos-dinamicos').innerHTML = html;

      document.getElementById('cfg-ant-activo').checked = !!m.anticipo_activo;
      document.getElementById('cfg-ant-tipo').value      = m.anticipo_tipo || 'fijo';
      document.getElementById('cfg-ant-monto').value     = m.anticipo_monto || 0;
      document.getElementById('cfg-ant-porc').value      = m.anticipo_porc || 0;
      document.getElementById('cfg-notas').value         = m.notas_cliente || '';
      toggleAnticipo();

      document.getElementById('panel-config-medio').style.display = 'block';
      document.getElementById('panel-config-medio').scrollIntoView({ behavior:'smooth', block:'start' });
    }

    function cerrarPanelConfig() {
      document.getElementById('panel-config-medio').style.display = 'none';
    }

    function toggleAnticipo() {
      const act  = document.getElementById('cfg-ant-activo').checked;
      const tipo = document.getElementById('cfg-ant-tipo').value;
      document.getElementById('cfg-anticipo-campos').style.display = act ? 'block' : 'none';
      document.getElementById('cfg-monto-wrap').style.display = (act && tipo === 'fijo') ? 'block' : 'none';
      document.getElementById('cfg-porc-wrap').style.display  = (act && tipo === 'porcentaje') ? 'block' : 'none';
    }

    async function guardarConfigMedio() {
      const medioId = document.getElementById('panel-config-medio').dataset.medioId;
      if (!medioId) return;
      const docId = NEGOCIO_ID + '_' + medioId;

      const tokenInput = document.getElementById('cfg-mptoken')?.value || '';
      const datos = {
        negocio_id: NEGOCIO_ID,
        medio_id:   medioId,
        activo:     document.getElementById('cfg-activo').checked,
        titular:    document.getElementById('cfg-titular')?.value || '',
        cbu:        document.getElementById('cfg-cbu')?.value     || '',
        cvu:        document.getElementById('cfg-cvu')?.value     || '',
        alias:      document.getElementById('cfg-alias')?.value   || '',
        banco:      document.getElementById('cfg-banco')?.value   || '',
        mp_public_key:   document.getElementById('cfg-mpkey')?.value || '',
        anticipo_activo: document.getElementById('cfg-ant-activo').checked,
        anticipo_tipo:   document.getElementById('cfg-ant-tipo').value,
        anticipo_monto:  parseFloat(document.getElementById('cfg-ant-monto').value) || 0,
        anticipo_porc:   parseFloat(document.getElementById('cfg-ant-porc').value)  || 0,
        notas_cliente:   document.getElementById('cfg-notas').value || '',
        // El access_token NO va acá — vive aparte, en una sub-colección privada
        // (este documento es de lectura pública, lo lee el público al reservar).
      };

      try {
        await db.collection('medios_pago_negocio').doc(docId).set(datos, { merge: true });
        if (tokenInput) {
          await db.collection('medios_pago_negocio').doc(docId)
            .collection('privado').doc('credenciales')
            .set({ mp_access_token: tokenInput }, { merge: true });
        }
        Toast.success('Configuración guardada correctamente.');
        cerrarPanelConfig();
        await cargarMedios();
      } catch(e) { Toast.error('Error al guardar: ' + e.message); }
    }

    // ── COMPROBANTES ───────────────────────────────────────────
    async function cargarComprobantes() {
      const estado = document.getElementById('f-estado-comp').value;
      const lista  = document.getElementById('lista-comprobantes');
      lista.innerHTML = `<div style="text-align:center;padding:20px"><span class="spinner"></span></div>`;

      const snap = await db.collection('reservas').where('negocio_id','==',NEGOCIO_ID).get();
      let comprobantes = snap.docs
        .map(d => ({ docId: d.id, ...d.data() }))
        .filter(r => !!r.comprobante_url)
        .map(r => ({ ...r, estadoComp: r.pago_validado ? 'aprobado' : 'pendiente' }))
        .sort((a,b) => (b.creado_en||'').localeCompare(a.creado_en||''));

      if (estado) comprobantes = comprobantes.filter(c => c.estadoComp === estado);

      if (!comprobantes.length) {
        lista.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted)"><i class="ti ti-circle-check" style="font-size:40px;display:block;opacity:0.3;color:#69db7c;margin-bottom:10px"></i>Sin comprobantes en este filtro.</div>`;
        return;
      }

      lista.innerHTML = comprobantes.map(c => {
        const fechaFmt = (c.fecha||'').split('-').reverse().join('/');
        return `
        <div style="padding:14px;border-radius:10px;border:1px solid ${c.estadoComp==='pendiente'?'rgba(245,159,0,0.3)':'var(--border)'};background:${c.estadoComp==='pendiente'?'rgba(245,159,0,0.04)':'var(--bg-surface)'};margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
            <div>
              <div style="font-weight:700;font-size:15px">${limpiar(c.cliente_nombre)}</div>
              <div style="font-size:12px;color:var(--text-muted)">${limpiar(c.cliente_email||'')} ${c.cliente_telefono?'· '+limpiar(c.cliente_telefono):''}</div>
              <div style="font-size:13px;color:var(--indigo-300);margin-top:4px">${limpiar(c.servicio_nombre||'—')} · ${fechaFmt} ${(c.hora_inicio||'').slice(0,5)}</div>
              <div style="font-size:11px;color:var(--text-faint);margin-top:2px">${limpiar(c.metodo_pago_label||c.metodo_pago||'')}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:20px;font-weight:800;color:#69db7c">$${parseFloat(c.precio_cobrado||0).toLocaleString('es-AR')}</div>
            </div>
          </div>
          <div style="margin-bottom:12px"><a href="${c.comprobante_url}" target="_blank"><img src="${c.comprobante_url}" style="max-width:100%;max-height:180px;border-radius:8px;border:1px solid var(--border);cursor:pointer" title="Ver comprobante"></a></div>
          ${c.estadoComp === 'pendiente' ? `
          <div style="display:flex;gap:8px">
            <button onclick="validarComp('${c.docId}')" class="btn btn-primary" style="flex:1"><i class="ti ti-check"></i> Validar pago</button>
            <button onclick="rechazarComp('${c.docId}')" class="btn btn-ghost" style="color:#ff8787;border-color:#ff878744"><i class="ti ti-x"></i> Rechazar</button>
          </div>` : `
          <div style="display:flex;gap:8px;align-items:center">
            <div style="flex:1;padding:8px 12px;border-radius:6px;background:rgba(47,158,68,0.1);color:#69db7c;font-size:13px;font-weight:600;text-align:center"><i class="ti ti-circle-check"></i> Pago validado</div>
            <button onclick="anularValidacion('${c.docId}')" class="btn btn-ghost btn-icon btn-sm" title="Anular validación"><i class="ti ti-rotate"></i></button>
          </div>`}
        </div>`;
      }).join('');
    }

    async function validarComp(docId) {
      try {
        await db.collection('reservas').doc(docId).update({ pago_validado: true, estado: 'confirmada', actualizado_en: new Date().toISOString() });
        Toast.success('Comprobante aprobado. Reserva confirmada.');
        await cargarComprobantes();
        await actualizarKPIsLuegoDeAccion();
      } catch(e) { Toast.error('Error: ' + e.message); }
    }

    async function rechazarComp(docId) {
      confirmar('¿Rechazar este comprobante? La reserva volverá a pendiente y se borrará el comprobante.', async () => {
        try {
          await db.collection('reservas').doc(docId).update({ pago_validado: false, comprobante_url: null, estado: 'pendiente', actualizado_en: new Date().toISOString() });
          Toast.success('Comprobante rechazado.');
          await cargarComprobantes();
          await actualizarKPIsLuegoDeAccion();
        } catch(e) { Toast.error('Error: ' + e.message); }
      });
    }

    async function anularValidacion(docId) {
      confirmar('¿Anular la validación? La reserva volverá a estado Pago Pendiente pero se conserva el comprobante.', async () => {
        try {
          await db.collection('reservas').doc(docId).update({ pago_validado: false, estado: 'pendiente_pago', actualizado_en: new Date().toISOString() });
          Toast.success('Validación anulada.');
          await cargarComprobantes();
          await actualizarKPIsLuegoDeAccion();
        } catch(e) { Toast.error('Error: ' + e.message); }
      });
    }

    async function actualizarKPIsLuegoDeAccion() {
      const { pendientes, validados, ingresos } = await calcularKPIs();
      const elP = document.getElementById('kpi-pendientes');
      const elV = document.getElementById('kpi-validados');
      const elI = document.getElementById('kpi-ingresos');
      if (elP) elP.textContent = pendientes;
      if (elV) elV.textContent = validados;
      if (elI) elI.textContent = '$' + ingresos.toLocaleString('es-AR');
    }
  </script>
</body>
</html>
