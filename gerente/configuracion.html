<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuración — ReservaSystem</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/img/favicon-16x16.png">
  <link rel="shortcut icon" href="../assets/img/favicon.ico">
  <link rel="apple-touch-icon" href="../assets/img/apple-touch-icon.png">
  <link rel="stylesheet" href="../assets/css/dark.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
</head>
<body>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/helpers.js"></script>
  <script src="../assets/js/sidebar.js?v=2"></script>
  <script src="../assets/js/app.js?v=2"></script>

  <script>
    let NEGOCIO_ID = '';
    let NEGOCIO_ACTUAL = null;
    let LINK_PUBLICO = '';
    let CFG = {};
    let usuarioActual = null;
    let MONEDAS_ACTIVAS = [];
    let MONEDAS_SELECCIONADAS = [];

    auth.onAuthStateChanged(async user => {
      if (!user) { window.location.href = '../index.html'; return; }
      const snap = await db.collection('usuarios').doc(user.uid).get();
      if (!snap.exists || !snap.data().activo) { auth.signOut(); window.location.href = '../index.html'; return; }
      usuarioActual = { uid: user.uid, ...snap.data() };
      NEGOCIO_ID = usuarioActual.negocio_id || '';

      try {
        const negSnap = await db.collection('negocios').doc(NEGOCIO_ID).get();
        NEGOCIO_ACTUAL = negSnap.exists ? { id: negSnap.id, ...negSnap.data() } : {};
        LINK_PUBLICO = `https://app-reservas.github.io/reservas/public/reserva.html?negocio=${NEGOCIO_ACTUAL.slug||NEGOCIO_ID}`;
      } catch(e) { NEGOCIO_ACTUAL = {}; }

      try {
        const cfgSnap = await db.collection('configuracion').doc(NEGOCIO_ID).get();
        CFG = cfgSnap.exists ? cfgSnap.data() : {};
      } catch(e) { CFG = {}; }

      try {
        const monSnap = await db.collection('monedas').where('activa', '==', true).get();
        const lista = [];
        monSnap.forEach(d => lista.push({ id: d.id, ...d.data() }));
        lista.sort((a, b) => (a.orden ?? 0) - (b.orden ?? 0));
        MONEDAS_ACTIVAS = lista;
      } catch(e) { MONEDAS_ACTIVAS = []; }
      MONEDAS_SELECCIONADAS = (NEGOCIO_ACTUAL.monedas_habilitadas && NEGOCIO_ACTUAL.monedas_habilitadas.length)
        ? [...NEGOCIO_ACTUAL.monedas_habilitadas]
        : (MONEDAS_ACTIVAS[0] ? [MONEDAS_ACTIVAS.find(m => m.codigo === 'ARS')?.codigo || MONEDAS_ACTIVAS[0].codigo] : ['ARS']);

      renderLayoutAdmin({
        titulo: 'Configuración',
        subtitulo: 'Ajustes de tu negocio',
        nombreUsuario: usuarioActual.nombre,
        rolLabel: 'Gerente',
        rol: 'gerente',
        negocio: NEGOCIO_ACTUAL,
      });

      document.getElementById('page-content').innerHTML = buildHTML();
    });

    function buildHTML() {
      const n = NEGOCIO_ACTUAL || {};
      const cfg = CFG || {};
      return `
      <!-- FOTO DEL NEGOCIO -->
      <div class="card mb-4">
        <div class="card-title" style="margin-bottom:14px"><i class="ti ti-photo"></i> Foto del negocio</div>
        <div style="display:flex;align-items:center;gap:20px">
          <div id="logo-preview" style="width:100px;height:100px;border-radius:16px;border:2px dashed var(--border);background:var(--bg-surface);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">
            ${n.logo
              ? `<img src="${n.logo}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`
              : `<i class="ti ti-building-store" style="font-size:36px;color:var(--text-muted);opacity:0.4"></i>`}
          </div>
          <div>
            <div style="font-size:14px;font-weight:600;margin-bottom:4px">Foto o logo del negocio</div>
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Formatos: JPG, PNG o WEBP. Máx. 5MB</div>
            <label class="btn btn-ghost btn-sm" style="cursor:pointer">
              <i class="ti ti-upload"></i> Seleccionar imagen
              <input type="file" id="input-logo" accept=".jpg,.jpeg,.png,.webp" style="display:none" onchange="subirLogo(this)">
            </label>
            <span id="logo-status" style="font-size:12px;color:var(--text-muted);margin-left:10px"></span>
          </div>
        </div>
      </div>

      <div class="grid-2 mb-4">

        <!-- DATOS DEL NEGOCIO -->
        <div class="card">
          <div class="card-title" style="margin-bottom:14px"><i class="ti ti-building-store"></i> Información del negocio</div>
          <div class="form-group">
            <label class="form-label">Nombre del negocio *</label>
            <input type="text" id="neg-nombre" class="form-control" value="${limpiar(n.nombre||'')}">
          </div>
          <div class="form-group">
            <label class="form-label">Descripción <span style="color:var(--text-muted)">(máx. 500 caracteres)</span></label>
            <textarea id="neg-desc" class="form-control" rows="3" maxlength="500" oninput="document.getElementById('cnt-desc').textContent=this.value.length+'/500'">${limpiar(n.descripcion||'')}</textarea>
            <div style="text-align:right;font-size:11px;color:var(--text-muted)" id="cnt-desc">${(n.descripcion||'').length}/500</div>
          </div>
          <div class="form-group">
            <label class="form-label">Dirección del local</label>
            <input type="text" id="neg-dir" class="form-control" value="${limpiar(n.direccion||'')}" placeholder="Ingresá la dirección de tu local">
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">Teléfono</label>
              <input type="text" id="neg-tel" class="form-control" value="${limpiar(n.telefono||'')}">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Email</label>
              <input type="email" id="neg-email" class="form-control" value="${limpiar(n.email||'')}">
            </div>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Color del negocio</label>
            <div style="display:flex;align-items:center;gap:8px">
              <input type="color" id="neg-color" value="${n.color_primario||'#3B5BDB'}" style="width:44px;height:38px;border-radius:8px;border:1px solid var(--border);background:var(--bg-surface);padding:2px;cursor:pointer">
              <span style="font-size:12px;color:var(--text-muted)">Se usa en la página pública y en tu panel</span>
            </div>
          </div>
          <button class="btn btn-primary" style="margin-top:14px" onclick="guardarNegocio()">
            <i class="ti ti-device-floppy"></i> Guardar información
          </button>
        </div>

        <!-- CONFIGURACIÓN DE TURNOS -->
        <div class="card">
          <div class="card-title" style="margin-bottom:14px"><i class="ti ti-settings"></i> Configuración de turnos</div>
          <div class="form-group">
            <label class="form-label">Anticipación mínima para reservar</label>
            <select id="cfg-anticipacion-min" class="form-control">
              ${[0,30,60,120,240,1440,2880].map(v => `
              <option value="${v}" ${(cfg.anticipacion_min||60)==v?'selected':''}>
                ${v===0?'Sin límite':v<60?v+' min':v/60<24?(v/60)+' hora(s)':(v/1440)+' día(s)'}
              </option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Reservas con hasta X días de anticipación</label>
            <select id="cfg-anticipacion-max" class="form-control">
              ${[7,15,30,60,90,180].map(v => `<option value="${v}" ${(cfg.anticipacion_max||30)==v?'selected':''}>${v} días</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Intervalo entre turnos</label>
            <select id="cfg-intervalo" class="form-control">
              ${[10,15,20,30,45,60].map(v => `<option value="${v}" ${(cfg.intervalo_min||30)==v?'selected':''}>${v} minutos</option>`).join('')}
            </select>
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:10px">
            <input type="checkbox" id="cfg-cancelar" ${cfg.permitir_cancelar!==false?'checked':''} style="width:18px;height:18px;cursor:pointer;accent-color:var(--indigo-500)">
            <label for="cfg-cancelar" style="cursor:pointer;color:var(--text-secondary);font-size:14px">Permitir que el cliente cancele su reserva</label>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Horas mínimas antes para cancelar</label>
            <input type="number" id="cfg-horas-cancelar" class="form-control" value="${cfg.horas_cancelar||24}" min="1" max="72">
          </div>
          <button class="btn btn-primary" style="margin-top:14px" onclick="guardarConfig()">
            <i class="ti ti-device-floppy"></i> Guardar configuración
          </button>
        </div>
      </div>

      <!-- MONEDA DEL NEGOCIO -->
      <div class="card mb-4">
        <div class="card-title" style="margin-bottom:6px"><i class="ti ti-coin"></i> Moneda de tu negocio</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">
          Elegí con qué moneda(s) van a cobrar los turnos. Podés activar hasta 2 al mismo tiempo (por ejemplo pesos y dólares) — si activás las 2, vas a poder cargar un precio en cada una para tus servicios.
        </div>
        <div id="monedas-negocio-wrap">${renderMonedasNegocioHTML()}</div>
        <button class="btn btn-primary" style="margin-top:14px" onclick="guardarMonedasNegocio()">
          <i class="ti ti-device-floppy"></i> Guardar moneda(s)
        </button>
      </div>

      <!-- MENSAJES AUTOMÁTICOS -->
      <div class="card mb-4">
        <div class="card-title" style="margin-bottom:14px"><i class="ti ti-message"></i> Mensajes automáticos</div>
        <div class="grid-2">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Mensaje de confirmación</label>
            <textarea id="cfg-msg-confirmacion" class="form-control" rows="3" placeholder="Ej: ¡Tu turno fue confirmado! Te esperamos...">${limpiar(cfg.mensaje_confirmacion||'')}</textarea>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Mensaje de cancelación</label>
            <textarea id="cfg-msg-cancelacion" class="form-control" rows="3" placeholder="Ej: Tu turno fue cancelado...">${limpiar(cfg.mensaje_cancelacion||'')}</textarea>
          </div>
        </div>
        <button class="btn btn-primary" style="margin-top:14px" onclick="guardarMensajes()">
          <i class="ti ti-device-floppy"></i> Guardar mensajes
        </button>
      </div>

      <!-- LINK PÚBLICO -->
      <div class="card mb-4" style="background:rgba(59,91,219,0.06);border-color:rgba(59,91,219,0.25)">
        <div class="card-title" style="margin-bottom:10px"><i class="ti ti-brand-whatsapp" style="color:#25d366"></i> Link público para tus clientes</div>
        <div style="display:flex;gap:8px;align-items:center">
          <code style="flex:1;font-size:12px;background:var(--bg-surface);padding:10px 14px;border-radius:8px;border:1px solid var(--border);color:var(--indigo-300)">${LINK_PUBLICO}</code>
          <button onclick="copiarLink()" class="btn btn-primary"><i class="ti ti-copy"></i> Copiar</button>
          <a href="${LINK_PUBLICO}" target="_blank" class="btn btn-ghost"><i class="ti ti-external-link"></i> Ver</a>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:8px">Compartí este link por WhatsApp para que tus clientes reserven solos.</div>
      </div>

      <!-- MI PERFIL / CAMBIAR CONTRASEÑA -->
      <div class="card">
        <div class="card-title" style="margin-bottom:14px"><i class="ti ti-lock"></i> Cambiar contraseña</div>
        <div class="grid-2">
          <div>
            <div class="form-group">
              <label class="form-label">Contraseña actual *</label>
              <input type="password" id="pass-actual" class="form-control">
            </div>
            <div class="form-group">
              <label class="form-label">Nueva contraseña *</label>
              <input type="password" id="pass-nueva" class="form-control" minlength="6">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Repetir contraseña *</label>
              <input type="password" id="pass-repetir" class="form-control">
            </div>
          </div>
          <div style="display:flex;flex-direction:column;justify-content:flex-end">
            <div class="alert alert-info" style="background:rgba(59,91,219,0.1);border-color:rgba(59,91,219,0.3);color:var(--indigo-300);margin-bottom:12px">
              <i class="ti ti-info-circle"></i>
              <div>Usá mínimo 6 caracteres. Tu sesión no se cerrará al cambiar la contraseña.</div>
            </div>
            <button class="btn btn-primary" onclick="cambiarPassword()">
              <i class="ti ti-lock-check"></i> Cambiar contraseña
            </button>
          </div>
        </div>
      </div>`;
    }

    function renderMonedasNegocioHTML() {
      if (!MONEDAS_ACTIVAS.length) {
        return `<div style="font-size:12px;color:var(--text-muted);padding:10px 0">El superadmin todavía no activó ninguna moneda. Por ahora tu negocio opera en pesos por defecto.</div>`;
      }
      const principal = NEGOCIO_ACTUAL.moneda_default || MONEDAS_SELECCIONADAS[0];
      return MONEDAS_ACTIVAS.map(m => {
        const elegida = MONEDAS_SELECCIONADAS.includes(m.codigo);
        const esPrincipal = elegida && principal === m.codigo;
        return `
        <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;margin-bottom:8px;border-radius:10px;border:1px solid ${elegida ? 'var(--indigo-500)' : 'var(--border)'};background:${elegida ? 'rgba(76,110,245,0.08)' : 'var(--bg-surface)'}">
          <label style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer">
            <input type="checkbox" ${elegida ? 'checked' : ''} onchange="toggleMonedaNegocio('${m.codigo}')" style="width:18px;height:18px;cursor:pointer;accent-color:var(--indigo-500)">
            <span style="width:34px;height:34px;border-radius:8px;background:rgba(76,110,245,0.12);display:flex;align-items:center;justify-content:center;font-weight:800;color:#748ffc;flex-shrink:0">${limpiar(m.simbolo)}</span>
            <span>
              <div style="font-weight:600;color:var(--text-primary)">${limpiar(m.nombre)} <span style="color:var(--text-muted);font-weight:400;font-size:12px">(${limpiar(m.codigo)})</span></div>
            </span>
          </label>
          ${elegida && MONEDAS_SELECCIONADAS.length > 1 ? `
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);cursor:pointer;flex-shrink:0">
              <input type="radio" name="moneda-principal" ${esPrincipal ? 'checked' : ''} onchange="setMonedaPrincipal('${m.codigo}')" style="accent-color:var(--indigo-500)"> Principal
            </label>` : ''}
        </div>`;
      }).join('');
    }

    function toggleMonedaNegocio(codigo) {
      if (MONEDAS_SELECCIONADAS.includes(codigo)) {
        if (MONEDAS_SELECCIONADAS.length === 1) { Toast.error('Tenés que tener al menos 1 moneda activa.'); return; }
        MONEDAS_SELECCIONADAS = MONEDAS_SELECCIONADAS.filter(c => c !== codigo);
      } else {
        if (MONEDAS_SELECCIONADAS.length >= 2) { Toast.error('Como máximo podés usar 2 monedas en tu negocio.'); return; }
        MONEDAS_SELECCIONADAS.push(codigo);
      }
      if (!MONEDAS_SELECCIONADAS.includes(NEGOCIO_ACTUAL.moneda_default)) {
        NEGOCIO_ACTUAL.moneda_default = MONEDAS_SELECCIONADAS[0];
      }
      document.getElementById('monedas-negocio-wrap').innerHTML = renderMonedasNegocioHTML();
    }

    function setMonedaPrincipal(codigo) {
      NEGOCIO_ACTUAL.moneda_default = codigo;
      document.getElementById('monedas-negocio-wrap').innerHTML = renderMonedasNegocioHTML();
    }

    async function guardarMonedasNegocio() {
      if (!MONEDAS_SELECCIONADAS.length) { Toast.error('Elegí al menos 1 moneda.'); return; }
      const principal = NEGOCIO_ACTUAL.moneda_default || MONEDAS_SELECCIONADAS[0];
      try {
        await db.collection('negocios').doc(NEGOCIO_ID).update({
          monedas_habilitadas: MONEDAS_SELECCIONADAS,
          moneda_default: principal,
        });
        NEGOCIO_ACTUAL.monedas_habilitadas = MONEDAS_SELECCIONADAS;
        NEGOCIO_ACTUAL.moneda_default = principal;
        Toast.success('Moneda(s) del negocio guardada(s).');
      } catch(e) { Toast.error('Error: ' + e.message); }
    }

    async function guardarNegocio() {
      try {
        await db.collection('negocios').doc(NEGOCIO_ID).update({
          nombre:        document.getElementById('neg-nombre').value.trim(),
          descripcion:   document.getElementById('neg-desc').value.trim(),
          direccion:     document.getElementById('neg-dir').value.trim(),
          telefono:      document.getElementById('neg-tel').value.trim(),
          email:         document.getElementById('neg-email').value.trim(),
          color_primario:document.getElementById('neg-color').value,
          actualizado_en:new Date().toISOString(),
        });
        Toast.success('Información del negocio guardada.');
      } catch(e) { Toast.error('Error: ' + e.message); }
    }

    async function guardarConfig() {
      try {
        await db.collection('configuracion').doc(NEGOCIO_ID).set({
          anticipacion_min: parseInt(document.getElementById('cfg-anticipacion-min').value)||60,
          anticipacion_max: parseInt(document.getElementById('cfg-anticipacion-max').value)||30,
          intervalo_min:    parseInt(document.getElementById('cfg-intervalo').value)||30,
          permitir_cancelar:document.getElementById('cfg-cancelar').checked,
          horas_cancelar:   parseInt(document.getElementById('cfg-horas-cancelar').value)||24,
        }, { merge: true });
        Toast.success('Configuración de turnos guardada.');
      } catch(e) { Toast.error('Error: ' + e.message); }
    }

    async function guardarMensajes() {
      try {
        await db.collection('configuracion').doc(NEGOCIO_ID).set({
          mensaje_confirmacion: document.getElementById('cfg-msg-confirmacion').value.trim(),
          mensaje_cancelacion:  document.getElementById('cfg-msg-cancelacion').value.trim(),
        }, { merge: true });
        Toast.success('Mensajes guardados.');
      } catch(e) { Toast.error('Error: ' + e.message); }
    }

    async function cambiarPassword() {
      const actual   = document.getElementById('pass-actual').value;
      const nueva    = document.getElementById('pass-nueva').value;
      const repetir  = document.getElementById('pass-repetir').value;
      if (!actual) return Toast.error('Ingresá la contraseña actual.');
      if (nueva !== repetir) return Toast.error('Las contraseñas nuevas no coinciden.');
      if (nueva.length < 6) return Toast.error('Mínimo 6 caracteres.');
      try {
        const credential = firebase.auth.EmailAuthProvider.credential(usuarioActual.email, actual);
        await auth.currentUser.reauthenticateWithCredential(credential);
        await auth.currentUser.updatePassword(nueva);
        Toast.success('Contraseña cambiada correctamente.');
        document.getElementById('pass-actual').value = '';
        document.getElementById('pass-nueva').value  = '';
        document.getElementById('pass-repetir').value = '';
      } catch(e) {
        const msg = e.code === 'auth/wrong-password' ? 'La contraseña actual es incorrecta.' : e.message;
        Toast.error(msg);
      }
    }

    async function subirLogo(input) {
      const file = input.files[0];
      if (!file) return;
      const status = document.getElementById('logo-status');
      status.textContent = 'Subiendo...';
      try {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', CLOUDINARY_PRESET);
        fd.append('folder', 'reservas/logos');
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method:'POST', body: fd });
        const data = await res.json();
        if (data.secure_url) {
          await db.collection('negocios').doc(NEGOCIO_ID).update({ logo: data.secure_url });
          document.getElementById('logo-preview').innerHTML = `<img src="${data.secure_url}" style="width:100%;height:100%;object-fit:cover">`;
          status.textContent = '✓ Imagen guardada'; status.style.color = '#69db7c';
          Toast.success('Logo actualizado.');
        } else {
          status.textContent = '✗ Error al subir'; status.style.color = '#ff8787';
        }
      } catch(e) { status.textContent = '✗ Error'; status.style.color = '#ff8787'; }
    }

    function copiarLink() {
      navigator.clipboard.writeText(LINK_PUBLICO).then(() => Toast.success('¡Link copiado!'));
    }
  </script>
</body>
</html>
