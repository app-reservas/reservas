<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extras — ReservaSystem</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/img/favicon-16x16.png">
  <link rel="shortcut icon" href="../assets/img/favicon.ico">
  <link rel="apple-touch-icon" href="../assets/img/apple-touch-icon.png">
  <link rel="stylesheet" href="../assets/css/dark.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
</head>
<body>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/helpers.js"></script>
  <script src="../assets/js/sidebar.js"></script>
  <script src="../assets/js/app.js"></script>

  <script>
    let NEGOCIO_ID = '';
    let NEGOCIO_ACTUAL = null;
    let LINK_PUBLICO = '';
    let CFG = {};

    auth.onAuthStateChanged(async user => {
      if (!user) { window.location.href = '../index.html'; return; }
      const snap = await db.collection('usuarios').doc(user.uid).get();
      if (!snap.exists || !snap.data().activo) { auth.signOut(); window.location.href = '../index.html'; return; }
      const usuario = { uid: user.uid, ...snap.data() };
      NEGOCIO_ID = usuario.negocio_id || '';

      try {
        const negSnap = await db.collection('negocios').doc(NEGOCIO_ID).get();
        NEGOCIO_ACTUAL = negSnap.exists ? { id: negSnap.id, ...negSnap.data() } : null;
        LINK_PUBLICO = `https://app-reservas.github.io/reservas/public/reserva.html?negocio=${NEGOCIO_ACTUAL?.slug||NEGOCIO_ID}`;
      } catch(e) { NEGOCIO_ACTUAL = null; }

      // Config global
      try {
        const cfgSnap = await db.collection('configuracion').doc('global').get();
        CFG = cfgSnap.exists ? cfgSnap.data() : {};
      } catch(e) { CFG = {}; }

      renderLayoutAdmin({
        titulo: 'Extras',
        subtitulo: 'Configuración avanzada e integraciones',
        nombreUsuario: usuario.nombre,
        rolLabel: 'Gerente',
        rol: 'gerente',
        negocio: NEGOCIO_ACTUAL,
      });

      document.getElementById('page-content').innerHTML = buildHTML();
      aplicarCFG();
    });

    function buildHTML() {
      return `
      <div class="grid-2 mb-6">

        <!-- COMPORTAMIENTO -->
        <div class="card">
          <div class="card-title" style="margin-bottom:14px"><i class="ti ti-adjustments"></i> Comportamiento de reservas</div>
          <div style="display:flex;flex-direction:column;gap:12px">

            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
              <div>
                <div style="font-weight:600;color:var(--text-primary);font-size:13px">Selección automática de profesional</div>
                <div style="font-size:11px;color:var(--text-muted)">Si solo hay uno disponible, se asigna solo</div>
              </div>
              <label class="toggle"><input type="checkbox" id="tog-autopro"><span class="toggle-slider"></span></label>
            </div>

            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
              <div>
                <div style="font-weight:600;color:var(--text-primary);font-size:13px">Mostrar duración del servicio</div>
                <div style="font-size:11px;color:var(--text-muted)">El cliente ve cuánto dura en la página pública</div>
              </div>
              <label class="toggle"><input type="checkbox" id="tog-dur"><span class="toggle-slider"></span></label>
            </div>

            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
              <div>
                <div style="font-weight:600;color:var(--text-primary);font-size:13px">Mostrar descripción completa</div>
                <div style="font-size:11px;color:var(--text-muted)">Descripción del servicio visible al reservar</div>
              </div>
              <label class="toggle"><input type="checkbox" id="tog-desc"><span class="toggle-slider"></span></label>
            </div>

            <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
              <div>
                <div style="font-weight:600;color:var(--text-primary);font-size:13px">Permitir cancelar desde el link</div>
                <div style="font-size:11px;color:var(--text-muted)">El cliente puede cancelar su reserva con el código</div>
              </div>
              <label class="toggle"><input type="checkbox" id="tog-cancelar" checked><span class="toggle-slider"></span></label>
            </div>
          </div>
          <button class="btn btn-primary" style="margin-top:14px" onclick="guardarComportamiento()">
            <i class="ti ti-device-floppy"></i> Guardar ajustes
          </button>
        </div>

        <!-- SEGURIDAD -->
        <div class="card">
          <div class="card-title" style="margin-bottom:14px"><i class="ti ti-shield-check"></i> Seguridad anti-spam</div>
          <div style="display:flex;flex-direction:column;gap:12px">

            <div style="padding:12px 14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <div>
                  <div style="font-weight:600;color:var(--text-primary);font-size:13px">Límite de reservas por email</div>
                  <div style="font-size:11px;color:var(--text-muted)">Máximo de reservas pendientes por correo</div>
                </div>
                <label class="toggle"><input type="checkbox" id="tog-email-lim" checked><span class="toggle-slider"></span></label>
              </div>
              <div style="display:flex;align-items:center;gap:10px">
                <input type="number" id="max-email" class="form-control" value="3" min="1" max="10" style="width:80px">
                <span style="font-size:12px;color:var(--text-muted)">reservas máximas pendientes</span>
              </div>
            </div>

            <div style="padding:12px 14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
              <div style="font-weight:600;color:var(--text-primary);font-size:13px;margin-bottom:4px">Anticipación mínima</div>
              <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">Cuánto antes puede reservar el cliente</div>
              <select id="anticipacion-min" class="form-control" style="width:160px">
                <option value="0">Sin límite</option>
                <option value="30">30 minutos</option>
                <option value="60" selected>1 hora</option>
                <option value="120">2 horas</option>
                <option value="1440">24 horas</option>
              </select>
            </div>
          </div>
          <button class="btn btn-primary" style="margin-top:14px" onclick="guardarSeguridad()">
            <i class="ti ti-device-floppy"></i> Guardar seguridad
          </button>
        </div>
      </div>

      <!-- INTEGRACIONES -->
      <div class="card mb-6">
        <div class="card-title" style="margin-bottom:14px"><i class="ti ti-plug"></i> Integraciones</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

          <div style="padding:14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <i class="ti ti-brand-whatsapp" style="font-size:24px;color:#25d366"></i>
              <div>
                <div style="font-weight:600;color:var(--text-primary)">Notificaciones WhatsApp</div>
                <div style="font-size:11px;color:var(--text-muted)">Confirmaciones automáticas al cliente</div>
              </div>
              <label class="toggle" style="margin-left:auto"><input type="checkbox" id="tog-wa"><span class="toggle-slider"></span></label>
            </div>
            <input type="text" id="int-wa-key" class="form-control" placeholder="API Key de WhatsApp Business" style="font-size:12px">
          </div>

          <div style="padding:14px;background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <i class="ti ti-brand-facebook" style="font-size:24px;color:#1877f2"></i>
              <div>
                <div style="font-weight:600;color:var(--text-primary)">Meta Pixel</div>
                <div style="font-size:11px;color:var(--text-muted)">Rastreá conversiones de Facebook/Instagram</div>
              </div>
            </div>
            <input type="text" id="int-meta-pixel" class="form-control" placeholder="Pixel ID (10-20 dígitos)" style="font-size:12px">
          </div>
        </div>
        <button class="btn btn-primary" style="margin-top:14px" onclick="guardarIntegraciones()">
          <i class="ti ti-device-floppy"></i> Guardar integraciones
        </button>
      </div>

      <!-- TU LINK PÚBLICO -->
      <div class="card" style="background:rgba(59,91,219,0.06);border-color:rgba(59,91,219,0.25)">
        <div class="card-title" style="margin-bottom:12px"><i class="ti ti-brand-whatsapp" style="color:#25d366"></i> Tu link de reservas</div>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
          <code style="flex:1;font-size:12px;background:var(--bg-surface);padding:10px 14px;border-radius:8px;border:1px solid var(--border);color:var(--indigo-300);word-break:break-all">
            ${LINK_PUBLICO}
          </code>
          <button onclick="copiarLink()" class="btn btn-primary"><i class="ti ti-copy"></i> Copiar</button>
          <a href="${LINK_PUBLICO}" target="_blank" class="btn btn-ghost"><i class="ti ti-external-link"></i></a>
        </div>
        <div style="font-size:12px;color:var(--text-muted)">
          Compartí este link en WhatsApp, Instagram o donde quieras. Tus clientes podrán reservar solos las 24 horas.
        </div>
      </div>`;
    }

    function aplicarCFG() {
      if (!CFG) return;
      const set = (id, val) => { const el = document.getElementById(id); if(el) el.checked = !!val; };
      const setVal = (id, val) => { const el = document.getElementById(id); if(el && val !== undefined) el.value = val; };
      set('tog-autopro',   CFG.autopro ?? true);
      set('tog-dur',       CFG.mostrar_duracion ?? true);
      set('tog-desc',      CFG.mostrar_descripcion ?? false);
      set('tog-cancelar',  CFG.permitir_cancelar ?? true);
      set('tog-email-lim', CFG.limite_email_activo ?? true);
      setVal('max-email',  CFG.limite_email ?? 3);
      set('tog-wa',        CFG.wa_activo ?? false);
      setVal('int-wa-key', CFG.wa_key ?? '');
      setVal('int-meta-pixel', CFG.meta_pixel ?? '');
      setVal('anticipacion-min', CFG.anticipacion_min ?? 60);
    }

    async function guardarComportamiento() {
      try {
        await db.collection('configuracion').doc('global').set({
          autopro:            document.getElementById('tog-autopro')?.checked ?? true,
          mostrar_duracion:   document.getElementById('tog-dur')?.checked ?? true,
          mostrar_descripcion:document.getElementById('tog-desc')?.checked ?? false,
          permitir_cancelar:  document.getElementById('tog-cancelar')?.checked ?? true,
          actualizado_en:     new Date().toISOString(),
        }, { merge: true });
        Toast.success('Ajustes guardados correctamente.');
      } catch(e) { Toast.error('Error: ' + e.message); }
    }

    async function guardarSeguridad() {
      try {
        await db.collection('configuracion').doc('global').set({
          limite_email_activo: document.getElementById('tog-email-lim')?.checked ?? true,
          limite_email:        parseInt(document.getElementById('max-email')?.value) || 3,
          anticipacion_min:    parseInt(document.getElementById('anticipacion-min')?.value) || 60,
          actualizado_en:      new Date().toISOString(),
        }, { merge: true });
        Toast.success('Configuración guardada.');
      } catch(e) { Toast.error('Error: ' + e.message); }
    }

    async function guardarIntegraciones() {
      try {
        await db.collection('configuracion').doc('global').set({
          wa_activo:   document.getElementById('tog-wa')?.checked ?? false,
          wa_key:      document.getElementById('int-wa-key')?.value ?? '',
          meta_pixel:  document.getElementById('int-meta-pixel')?.value ?? '',
          actualizado_en: new Date().toISOString(),
        }, { merge: true });
        Toast.success('Integraciones guardadas.');
      } catch(e) { Toast.error('Error: ' + e.message); }
    }

    function copiarLink() {
      navigator.clipboard.writeText(LINK_PUBLICO).then(() => Toast.success('¡Link copiado! Pegalo en WhatsApp.'));
    }
  </script>
</body>
</html>
