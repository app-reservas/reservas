<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas — Ingresar</title>
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">📅</span>
      <h1>ReservasApp</h1>
    </div>

    <!-- TABS -->
    <div class="auth-tabs">
      <button class="tab-btn active" data-tab="login">Ingresar</button>
      <button class="tab-btn" data-tab="registro">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <div class="tab-content active" id="tab-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="admin@ejemplo.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <div id="login-error" class="msg-error hidden"></div>
      <button class="btn-primary full" id="btn-login">Ingresar</button>
    </div>

    <!-- REGISTRO -->
    <div class="tab-content hidden" id="tab-registro">
      <p class="info-text">El registro crea una cuenta de <strong>gerente</strong>. El superadmin deberá asignarte un negocio.</p>
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" id="reg-nombre" placeholder="Juan García">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="tel" id="reg-telefono" placeholder="+54 9 351 ...">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres">
      </div>
      <div id="reg-error" class="msg-error hidden"></div>
      <div id="reg-ok" class="msg-ok hidden"></div>
      <button class="btn-primary full" id="btn-registro">Crear cuenta</button>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script>
    // ── TABS ──────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => { c.classList.add('hidden'); c.classList.remove('active'); });
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
      });
    });

    // ── REDIRIGIR SI YA ESTÁ LOGUEADO ────────────────────
    auth.onAuthStateChanged(async user => {
      if (!user) return;
      const snap = await db.collection('usuarios').doc(user.uid).get();
      if (!snap.exists) return;
      const u = snap.data();
      if (u.activo === false) {
        await auth.signOut();
        showError('login-error', 'Tu cuenta está pendiente de aprobación.');
        return;
      }
      if (u.rol === 'superadmin') { location.href = 'admin/index.html'; return; }
      if (u.rol === 'gerente')    { location.href = 'admin/negocio.html'; return; }
    });

    // ── LOGIN ─────────────────────────────────────────────
    document.getElementById('btn-login').addEventListener('click', async () => {
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-pass').value;
      hideMsg('login-error');
      if (!email || !pass) { showError('login-error', 'Completá todos los campos.'); return; }
      try {
        await auth.signInWithEmailAndPassword(email, pass);
        // onAuthStateChanged se encarga de redirigir
      } catch(e) {
        showError('login-error', tradError(e.code));
      }
    });

    // ── REGISTRO ──────────────────────────────────────────
    document.getElementById('btn-registro').addEventListener('click', async () => {
      const nombre   = document.getElementById('reg-nombre').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const telefono = document.getElementById('reg-telefono').value.trim();
      const pass     = document.getElementById('reg-pass').value;
      hideMsg('reg-error'); hideMsg('reg-ok');
      if (!nombre || !email || !pass) { showError('reg-error', 'Completá nombre, email y contraseña.'); return; }
      if (pass.length < 6)            { showError('reg-error', 'La contraseña debe tener al menos 6 caracteres.'); return; }
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await db.collection('usuarios').doc(cred.user.uid).set({
          nombre, email, telefono,
          rol: 'gerente',
          negocio_id: null,
          activo: false,   // ← superadmin debe activar
          creado_en: firebase.firestore.FieldValue.serverTimestamp()
        });
        await auth.signOut();
        document.getElementById('reg-ok').textContent = '✅ Cuenta creada. Esperá que el administrador la active.';
        document.getElementById('reg-ok').classList.remove('hidden');
      } catch(e) {
        showError('reg-error', tradError(e.code));
      }
    });

    // ── HELPERS ───────────────────────────────────────────
    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function hideMsg(id) { document.getElementById(id).classList.add('hidden'); }
    function tradError(code) {
      const map = {
        'auth/user-not-found':    'No existe una cuenta con ese email.',
        'auth/wrong-password':    'Contraseña incorrecta.',
        'auth/invalid-email':     'Email inválido.',
        'auth/email-already-in-use': 'Ese email ya está registrado.',
        'auth/too-many-requests': 'Demasiados intentos. Esperá unos minutos.',
      };
      return map[code] || 'Error: ' + code;
    }
  </script>
</body>
</html>
